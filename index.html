// ─── Bulk paste / file upload from spreadsheet ──────────────────────────────
function BulkPasteModal({ onClose, onAdd }) {
  const [text, setText] = useState("");
  const [preview, setPreview] = useState([]);
  const [err, setErr] = useState(null);
  const [loadingFile, setLoadingFile] = useState(false);
  const fileInputRef = useRef(null);

  const parse = (raw) => {
    const lines = raw.trim().split(/\r?\n/).filter(l => l.trim());
    if (lines.length === 0) return [];
    const firstLower = lines[0].toLowerCase();
    const hasHeader = firstLower.includes("name") || firstLower.includes("email") || firstLower.includes("title");
    const headers = hasHeader ? lines[0].split(/\t|,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(h => h.trim().toLowerCase().replace(/^"|"$/g, "")) : null;
    const dataLines = hasHeader ? lines.slice(1) : lines;

    const findIdx = (...names) => {
      if (!headers) return -1;
      for (const n of names) {
        const i = headers.findIndex(h => h.includes(n));
        if (i >= 0) return i;
      }
      return -1;
    };
    // If we have headers, map columns by name. Otherwise positional.
    const idx = headers ? {
      name: findIdx("name"),
      email: findIdx("email"),
      title: findIdx("title", "role"),
      company: findIdx("company", "organization", "employer"),
      phone: findIdx("phone", "mobile", "tel"),
      jobFunction: findIdx("function", "department"),
      vertical: findIdx("vertical", "industry"),
      tags: findIdx("tag"),
    } : { name: 0, email: 1, title: 2, company: 3, phone: 4, jobFunction: 5, vertical: 6, tags: 7 };

    return dataLines.map(line => {
      const parts = line.includes("\t")
        ? line.split("\t")
        : line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
      const get = (i) => {
        if (i < 0 || i >= parts.length) return "";
        return parts[i].replace(/^"|"$/g, "").replace(/""/g, '"').trim();
      };
      return {
        name: get(idx.name),
        email: get(idx.email),
        title: get(idx.title),
        company: get(idx.company),
        phone: get(idx.phone),
        jobFunction: get(idx.jobFunction),
        vertical: get(idx.vertical),
        tags: get(idx.tags).split(/[;|]/).map(s => s.trim()).filter(Boolean),
      };
    }).filter(p => p.name || p.email);
  };

  const updateText = (val) => {
    setText(val);
    try { setPreview(parse(val)); setErr(null); }
    catch (e) { setErr(e.message); setPreview([]); }
  };

  // Lazy-load SheetJS so we can also accept .xlsx / .xls uploads.
  const loadSheetJS = () => {
    if (window.XLSX) return Promise.resolve(window.XLSX);
    if (window.__sheetjsPromise) return window.__sheetjsPromise;
    window.__sheetjsPromise = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
      s.onload = () => resolve(window.XLSX);
      s.onerror = () => reject(new Error("Couldn't load XLSX parser. Save your file as CSV and try again."));
      document.head.appendChild(s);
    });
    return window.__sheetjsPromise;
  };

  const handleFile = async (f) => {
    if (!f) return;
    setErr(null);
    setLoadingFile(true);
    try {
      const name = f.name.toLowerCase();
      const isExcel = name.endsWith(".xlsx") || name.endsWith(".xls") || name.endsWith(".xlsm");
      if (isExcel) {
        const XLSX = await loadSheetJS();
        const buf = await f.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        // Convert to CSV so our existing parser can handle it
        const csv = XLSX.utils.sheet_to_csv(sheet);
        updateText(csv);
      } else {
        // Treat as plain text (CSV/TSV/etc.)
        const txt = await f.text();
        updateText(txt);
      }
    } catch (e) {
      setErr(e.message || "Couldn't read that file.");
    } finally {
      setLoadingFile(false);
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    e.currentTarget.classList.remove("is-over");
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) handleFile(f);
  };

  const submit = () => {
    if (preview.length === 0) { setErr("No rows detected. Use one prospect per line."); return; }
    onAdd(preview);
  };

  return (
    <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 160 }}>
      <div className="cn-modal" style={{ maxWidth: 760, maxHeight: "90vh", display: "flex", flexDirection: "column" }} onClick={(e) => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">Bulk import</div>
            <h2 className="cn-modal-title">Add prospects from a file or paste</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>
        <div className="cn-modal-body" style={{ overflow: "auto" }}>
          <div
            className="cn-doc-drop"
            style={{ marginBottom: 14 }}
            onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add("is-over"); }}
            onDragLeave={(e) => e.currentTarget.classList.remove("is-over")}
            onDrop={onDrop}
            onClick={() => fileInputRef.current?.click()}
          >
            <div className="cn-doc-drop-empty">
              <div className="cn-doc-drop-icon-lg">{loadingFile ? "…" : "⤴"}</div>
              <div className="cn-doc-drop-title">{loadingFile ? "Reading file…" : "Drop a CSV or Excel file, or click to upload"}</div>
              <div className="cn-doc-drop-sub">.csv, .tsv, .xlsx, .xls — first row treated as headers if it contains "Name" or "Email"</div>
            </div>
            <input
              ref={fileInputRef}
              type="file"
              accept=".csv,.tsv,.txt,.xls,.xlsx,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel"
              style={{ display: "none" }}
              onChange={(e) => handleFile(e.target.files?.[0])}
            />
          </div>

          <div style={{ color: "var(--cn-mute)", fontSize: 12.5, marginBottom: 8 }}>
            …or paste directly. Columns (tab- or comma-separated):
            <span className="cn-mono" style={{ display: "block", marginTop: 4 }}>Name, Email, Title, Company, Phone, Job function, Vertical, Tags</span>
            <span style={{ display: "block", marginTop: 4 }}>If your headers are named, we'll match them automatically. Tags can be separated by <span className="cn-mono">;</span> or <span className="cn-mono">|</span>.</span>
          </div>
          <textarea
            className="cn-textarea cn-mono"
            style={{ minHeight: 140, fontSize: 12.5 }}
            value={text}
            onChange={(e) => updateText(e.target.value)}
            placeholder={"Jane Doe, jane@acme.com, VP Procurement, Acme Corp, 555-1234, Procurement, Cloud / Compute, hot-lead\nJohn Smith\tjohn@globex.com\tCFO\tGlobex\t555-9999\tFinance\tFinance / Trading"}
          />
          {preview.length > 0 && (
            <div style={{ marginTop: 14 }}>
              <div className="cn-card-eyebrow" style={{ marginBottom: 6 }}>
                Preview · {preview.length} row{preview.length === 1 ? "" : "s"}
              </div>
              <div style={{ maxHeight: 240, overflow: "auto", border: "1px solid var(--cn-line)", borderRadius: "var(--cn-r)" }}>
                <table className="cn-table" style={{ fontSize: 11.5 }}>
                  <thead>
                    <tr><th>Name</th><th>Email</th><th>Title</th><th>Company</th><th>Function</th></tr>
                  </thead>
                  <tbody>
                    {preview.slice(0, 12).map((p, i) => (
                      <tr key={i}>
                        <td>{p.name || "—"}</td>
                        <td className="cn-mono">{p.email || "—"}</td>
                        <td>{p.title || "—"}</td>
                        <td>{p.company || "—"}</td>
                        <td>{p.jobFunction || "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {preview.length > 12 && (
                  <div style={{ padding: 8, textAlign: "center", color: "var(--cn-mute)", fontSize: 11.5 }}>
                    + {preview.length - 12} more
                  </div>
                )}
              </div>
            </div>
          )}
          {err && <div className="cn-login-error" style={{ marginTop: 12 }}>{err}</div>}
        </div>
        <footer className="cn-modal-foot">
          <button className="cn-btn cn-btn--ghost" onClick={onClose}>Cancel</button>
          <div style={{ marginLeft: "auto" }}>
            <button className="cn-btn cn-btn--primary" onClick={submit} disabled={preview.length === 0}>
              Add {preview.length} prospect{preview.length === 1 ? "" : "s"}
            </button>
          </div>
        </footer>
      </div>
    </div>
  );
}

// ─── Send campaign from prospects ───────────────────────────────────────────
// Injects selected prospects into scenario.contacts as one-off synthetic
// records, then mounts the existing CampaignBuilder with manual recipients
// pre-selected.
function CampaignFromProspects({ prospects, scenario, currentUser, onClose }) {
  // Memoize so we don't keep adding contacts on re-renders.
  const ids = React.useMemo(() => {
    return prospects.map(p => {
      const id = "prospect-" + Math.random().toString(36).slice(2, 9);
      scenario.contacts.push({
        id,
        name: p.name || p.email || "Unnamed prospect",
        email: p.email,
        title: p.title || "Prospect",
        accountId: null,
        tier: "Influencer",
      });
      return id;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  if (!window.CampaignBuilder) {
    return (
      <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 160 }}>
        <div className="cn-modal" onClick={(e) => e.stopPropagation()}>
          <div className="cn-modal-body">Couldn't open campaign builder.</div>
        </div>
      </div>
    );
  }
  return <window.CampaignBuilder
    scenario={scenario}
    currentUser={currentUser}
    onClose={onClose}
    onSaved={() => onClose()}
    initialManualIds={ids}
  />;
}

Object.assign(window, { ProspectingScreen, ProspectListView, ProspectFormModal, BulkPasteModal, CampaignFromProspects });

</script>
<script type="text/babel" data-source="compose.jsx">
// Unified "Compose" email drawer.
// Entry points: contact detail "Email" button, deal detail, prospect list.
// Flow: To → Template → Subject + Body → Attach/Create quotes → Review → Send.

// ─── Local helpers (mirror outreach.jsx) ────────────────────────────────────
function _csNewId(p) { return p + "-" + Math.random().toString(36).slice(2, 10); }
function _csMerge(text, ctx) {
  return (text || "").replace(/\{\{(\w+)\}\}/g, (_, k) => ctx[k] != null ? ctx[k] : `{{${k}}}`);
}
function _csQuoteShareUrl(quote) {
  return window.location.origin + window.location.pathname + "?quote=" + quote.shareToken;
}
function _csCurrency(cents) {
  const v = (cents || 0) / 100;
  return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(v);
}

// Find all quotes (across all opps) where this contact is involved.
function findQuotesForContact(contactId, scenario) {
  const opps = scenario.opps.filter(o => o.contactId === contactId);
  const out = [];
  opps.forEach(opp => {
    const quotes = (window.cnQuotes?.readQuotes?.(opp.id)) || [];
    quotes.forEach(q => out.push({ quote: q, opp }));
  });
  return out.sort((a, b) => new Date(b.quote.updatedAt || b.quote.createdAt || 0) - new Date(a.quote.updatedAt || a.quote.createdAt || 0));
}

// ─── Main compose drawer ────────────────────────────────────────────────────
function ContactComposeDrawer({ scenario, currentUser, initialContactId, initialQuoteIds, onClose, onSaved }) {
  const initialContact = scenario.contacts.find(c => c.id === initialContactId);
  const [recipients, setRecipients] = useState(initialContact ? [initialContact.id] : []);
  const [subject, setSubject] = useState("");
  const [body, setBody] = useState(initialContact ? `Hi ${(initialContact.name || "").split(" ")[0]},\n\n` : "");
  const [imageUrl, setImageUrl] = useState("");
  const [ctaText, setCtaText] = useState("");
  const [ctaUrl, setCtaUrl] = useState("");
  const [signature, setSignature] = useState(() => (window.cnOutreach?.readSignature?.() ?? localStorage.getItem("cn-signature") ?? ""));
  const [saveSig, setSaveSig] = useState(false);
  const [attachedQuoteRefs, setAttachedQuoteRefs] = useState(initialQuoteIds ? initialQuoteIds.map(q => ({ oppId: q.oppId, quoteId: q.quoteId })) : []);
  const [templatePickerOpen, setTemplatePickerOpen] = useState(false);
  const [createQuoteFor, setCreateQuoteFor] = useState(null); // oppId | "ask" | null
  const [sending, setSending] = useState(false);
  const [sentResult, setSentResult] = useState(null);
  const [step, setStep] = useState(0); // 0 = compose, 1 = review
  const [refreshTick, setRefreshTick] = useState(0); // bump to re-read quote lists

  // Quote list refresh
  useEffect(() => {
    if (createQuoteFor !== null) return;
    setRefreshTick(t => t + 1);
  }, [createQuoteFor]);

  const primaryContact = scenario.contacts.find(c => c.id === recipients[0]);
  const primaryAcct = window.accountOf(primaryContact?.accountId, scenario);

  // Quotes available to attach: from any opp where any selected recipient is involved.
  const availableQuotes = (() => {
    const refs = [];
    const seen = new Set();
    recipients.forEach(cid => {
      const list = findQuotesForContact(cid, scenario);
      list.forEach(({ quote, opp }) => {
        const key = quote.id;
        if (seen.has(key)) return;
        seen.add(key);
        refs.push({ quote, opp });
      });
    });
    return refs;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  })();
  // refreshTick is used to force re-evaluation
  void refreshTick;

  const isAttached = (q) => attachedQuoteRefs.find(r => r.quoteId === q.id);
  const toggleAttach = (opp, quote) => {
    if (isAttached(quote)) {
      setAttachedQuoteRefs(attachedQuoteRefs.filter(r => r.quoteId !== quote.id));
    } else {
      setAttachedQuoteRefs([...attachedQuoteRefs, { oppId: opp.id, quoteId: quote.id }]);
      // Auto-set CTA if there's no other CTA yet
      if (!ctaText && !ctaUrl) {
        setCtaText("View & respond to quote →");
        setCtaUrl(_csQuoteShareUrl(quote));
      }
    }
  };

  const applyTemplate = (t) => {
    if (!t) return;
    if (t.subject) setSubject(t.subject);
    if (t.body) setBody(t.body);
    if (t.imageUrl) setImageUrl(t.imageUrl);
    if (t.ctaText && !ctaText) setCtaText(t.ctaText);
    if (t.ctaUrl && !ctaUrl) setCtaUrl(t.ctaUrl);
    setTemplatePickerOpen(false);
  };

  const startCreateQuote = () => {
    // Resolve which opp to attach the new quote to.
    const eligibleOpps = scenario.opps.filter(o => recipients.includes(o.contactId));
    if (eligibleOpps.length === 0) {
      alert("This contact has no open deals yet. Create one from the contact's page first, then come back to quote.");
      return;
    }
    if (eligibleOpps.length === 1) {
      setCreateQuoteFor(eligibleOpps[0].id);
    } else {
      setCreateQuoteFor("ask");
    }
  };

  const removeRecipient = (id) => {
    if (recipients.length <= 1) return;
    setRecipients(recipients.filter(x => x !== id));
  };

  const addRecipient = (c) => {
    if (recipients.includes(c.id)) return;
    setRecipients([...recipients, c.id]);
  };

  // Construct ctx for preview
  const previewCtx = primaryContact ? {
    first_name: (primaryContact.name || "").split(" ")[0],
    last_name: (primaryContact.name || "").split(" ").slice(1).join(" "),
    company: primaryAcct?.name || "",
    title: primaryContact.title || "",
    sender_name: currentUser?.fullName || currentUser?.name || "",
  } : { first_name: "Friend", company: "", sender_name: currentUser?.name || "" };

  // Quote attachments rendered in preview as a list of links
  const attachedQuotes = attachedQuoteRefs
    .map(r => {
      const list = window.cnQuotes?.readQuotes?.(r.oppId) || [];
      return list.find(q => q.id === r.quoteId);
    })
    .filter(Boolean);

  const quoteLinksMarkup = attachedQuotes.length > 0
    ? "\n\n" + attachedQuotes.map(q => `Quote ${q.quoteNumber} (v${q.version}) — ${_csQuoteShareUrl(q)}`).join("\n")
    : "";

  const previewBody = _csMerge(body, previewCtx) + quoteLinksMarkup + (signature.trim() ? "\n\n" + _csMerge(signature, previewCtx) : "");

  const send = async () => {
    if (sending) return;
    if (recipients.length === 0) { alert("Add at least one recipient."); return; }
    if (!subject.trim()) { alert("Add a subject line."); return; }
    setSending(true);
    if (saveSig) {
      if (window.cnOutreach?.writeSignature) window.cnOutreach.writeSignature(signature);
      else localStorage.setItem("cn-signature", signature);
    }
    const builtRecipients = recipients
      .map(id => scenario.contacts.find(c => c.id === id))
      .filter(c => c && c.email)
      .map(c => {
        const acct = window.accountOf(c.accountId, scenario);
        return {
          contactId: c.id,
          email: c.email,
          ctx: {
            first_name: (c.name || "").split(" ")[0],
            last_name: (c.name || "").split(" ").slice(1).join(" "),
            company: acct?.name || "",
            title: c.title || "",
            sender_name: currentUser?.fullName || currentUser?.name || "",
          },
        };
      });
    if (builtRecipients.length === 0) {
      setSending(false);
      alert("None of your recipients have an email address on file.");
      return;
    }
    const fullBody = body + quoteLinksMarkup + (signature.trim() ? "\n\n" + signature : "");
    const finalC = {
      id: _csNewId("c"),
      name: subject.slice(0, 80) + " · " + (primaryContact?.name || "compose"),
      audienceMode: "manual",
      manualIds: recipients,
      audience: { hasEmail: true },
      subject,
      fromName: currentUser?.fullName || currentUser?.name || "",
      preheader: "",
      body: fullBody,
      imageUrl,
      ctaText,
      ctaUrl,
      signature,
      attachedQuoteIds: attachedQuoteRefs.map(r => r.quoteId),
      kind: "compose",
      status: "sent",
      sentAt: new Date().toISOString(),
      events: [],
      createdAt: new Date().toISOString(),
      senderEmail: currentUser?.email || null,
      recipients: builtRecipients,
    };

    // Mark each attached quote as "sent" if it isn't already.
    attachedQuoteRefs.forEach(ref => {
      const list = window.cnQuotes?.readQuotes?.(ref.oppId) || [];
      const next = list.map(q => q.id === ref.quoteId && (q.status === "draft")
        ? { ...q, status: "sent", sentAt: new Date().toISOString() }
        : q);
      window.cnQuotes?.writeQuotes?.(ref.oppId, next);
    });

    let viaResend = false;
    if (window.SEND_VIA_RESEND) {
      try {
        await window.sendCampaignViaResend(finalC, builtRecipients);
        finalC.viaResend = true;
        viaResend = true;
      } catch (err) {
        console.error("Resend send failed:", err);
        alert("Live send failed — falling back to simulation. Check the console.");
        finalC.events = window.cnOutreach?.simulateSend ? window.cnOutreach.simulateSend(finalC) : [];
      }
    } else {
      // Use the campaign module's simulator if available, otherwise no events.
      finalC.events = [];
    }

    // Save the campaign so it shows up in Outreach → Campaigns analytics
    if (window.cnOutreach?.saveCampaign) {
      window.cnOutreach.saveCampaign(finalC);
    } else {
      // Direct fallback
      try {
        const arr = JSON.parse(localStorage.getItem("cn-campaigns") || "[]");
        arr.unshift(finalC);
        localStorage.setItem("cn-campaigns", JSON.stringify(arr));
      } catch {}
    }

    // Log an activity per recipient so it shows up on the contact timeline.
    if (window.insertActivity) {
      for (const r of builtRecipients) {
        try {
          await window.insertActivity({
            type: "email",
            owner_id: currentUser?.id || null,
            contact_id: r.contactId,
            subject,
            summary: body.slice(0, 280),
            occurred_at: new Date().toISOString(),
          });
        } catch (e) {
          console.warn("Couldn't log email activity:", e);
        }
      }
    }

    setSending(false);
    setSentResult({ count: builtRecipients.length, viaResend });
    onSaved && onSaved();
  };

  if (sentResult) {
    return (
      <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 170 }}>
        <div className="cn-modal cn-compose-modal" onClick={(e) => e.stopPropagation()}>
          <div className="cn-modal-body" style={{ textAlign: "center", padding: "60px 30px" }}>
            <div className="cn-success-tick" style={{ display: "inline-flex", marginBottom: 14, width: 56, height: 56, fontSize: 26 }}>✓</div>
            <h2 style={{ fontFamily: "var(--cn-serif)", fontSize: 26, margin: "0 0 8px" }}>
              Sent to {sentResult.count} {sentResult.count === 1 ? "recipient" : "recipients"}
            </h2>
            <div style={{ color: "var(--cn-mute)", fontSize: 13, marginBottom: 24 }}>
              {sentResult.viaResend ? "Delivered live via Resend — tracking opens & clicks." : "Logged on the contact's timeline; analytics will appear in Campaigns."}
            </div>
            <button className="cn-btn cn-btn--primary" onClick={onClose}>Done</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 170 }}>
      <div className="cn-modal cn-compose-modal" onClick={(e) => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div style={{ flex: 1 }}>
            <div className="cn-card-eyebrow">{step === 0 ? "Compose email" : "Review & send"}</div>
            <h2 className="cn-modal-title">{subject || (primaryContact ? `To ${primaryContact.name}` : "New email")}</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-compose-steps">
          {["Compose", "Review"].map((label, i) => (
            <div key={label} className={`cn-camp-step ${i === step ? "is-current" : i < step ? "is-done" : ""}`} onClick={() => i < step && setStep(i)}>
              <span className="cn-camp-step-num">{i < step ? "✓" : i + 1}</span>
              <span>{label}</span>
            </div>
          ))}
        </div>

        <div className="cn-modal-body cn-compose-body">
          {step === 0 ? (
            <Fragment>
              {/* RECIPIENTS */}
              <div className="cn-field">
                <label>To</label>
                <div className="cn-compose-to">
                  {recipients.map(id => {
                    const c = scenario.contacts.find(x => x.id === id);
                    if (!c) return null;
                    return (
                      <span key={id} className="cn-rp-chip">
                        <span className="cn-avatar cn-avatar--xs">{(c.name || "?").split(" ").map(n => n[0]).join("").slice(0, 2)}</span>
                        <span className="cn-rp-chip-text">
                          <span className="cn-rp-chip-name">{c.name}</span>
                          <span className="cn-rp-chip-email">{c.email || "no email"}</span>
                        </span>
                        {recipients.length > 1 && (
                          <button className="cn-rp-chip-x" onClick={() => removeRecipient(id)} title="Remove">✕</button>
                        )}
                      </span>
                    );
                  })}
                  <AddRecipientInline scenario={scenario} excludeIds={recipients} onPick={addRecipient} />
                </div>
              </div>

              {/* SUBJECT / TEMPLATE */}
              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 2 }}>
                  <label>Subject</label>
                  <input className="cn-input" value={subject} onChange={(e) => setSubject(e.target.value)} placeholder="A line that gets it opened…" />
                </div>
                <div className="cn-field" style={{ flex: "none", display: "flex", alignItems: "flex-end" }}>
                  <button className="cn-btn cn-btn--ghost" style={{ height: 36 }} onClick={() => setTemplatePickerOpen(true)}>↺ Use template</button>
                </div>
              </div>

              {/* BODY */}
              <div className="cn-field">
                <label>Body</label>
                <textarea className="cn-textarea" style={{ minHeight: 180 }} value={body} onChange={(e) => setBody(e.target.value)} placeholder="Write the message…" />
                <div className="cn-merge-help" style={{ marginTop: 8 }}>
                  <div className="cn-card-eyebrow">Merge fields</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
                    {["first_name", "last_name", "company", "title", "sender_name"].map(f => (
                      <button key={f} className="cn-chip-btn" onClick={() => setBody(body + ` {{${f}}}`)}>{`{{${f}}}`}</button>
                    ))}
                  </div>
                </div>
              </div>

              {/* QUOTES */}
              <ComposeQuotesSection
                scenario={scenario}
                availableQuotes={availableQuotes}
                attachedQuoteIds={attachedQuoteRefs.map(r => r.quoteId)}
                onToggle={toggleAttach}
                onCreateNew={startCreateQuote}
              />

              {/* BANNER */}
              {window.BannerImagePicker
                ? <window.BannerImagePicker value={imageUrl} onChange={setImageUrl} />
                : null}

              {/* CTA */}
              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>CTA button text</label>
                  <input className="cn-input" value={ctaText} onChange={(e) => setCtaText(e.target.value)} placeholder="View quote, Book a call, …" />
                </div>
                <div className="cn-field" style={{ flex: 2 }}>
                  <label>CTA URL</label>
                  <input className="cn-input cn-mono" style={{ fontSize: 12 }} value={ctaUrl} onChange={(e) => setCtaUrl(e.target.value)} placeholder="https://…" />
                </div>
              </div>

              {/* SIGNATURE */}
              {window.SignatureField
                ? <window.SignatureField value={signature} onChange={(s, save) => { setSignature(s); setSaveSig(save); }} />
                : null}
            </Fragment>
          ) : (
            // REVIEW STEP
            <Fragment>
              <div className="cn-camp-review-strip">
                <div><div className="cn-strip-label">To</div><div className="cn-strip-value" style={{ fontSize: 14 }}>{recipients.length} {recipients.length === 1 ? "recipient" : "recipients"}</div></div>
                <div><div className="cn-strip-label">From</div><div className="cn-strip-value" style={{ fontSize: 14 }}>{currentUser?.fullName || currentUser?.name || "—"}</div></div>
                <div><div className="cn-strip-label">Attached</div><div className="cn-strip-value" style={{ fontSize: 14 }}>{attachedQuotes.length} quote{attachedQuotes.length === 1 ? "" : "s"}</div></div>
              </div>

              <div className="cn-card-eyebrow" style={{ marginTop: 18, marginBottom: 8 }}>Preview</div>
              <div className="cn-email-preview">
                <div className="cn-email-header">
                  <div>
                    <span className="cn-email-from">{currentUser?.fullName || currentUser?.name || "Sender name"}</span>
                    <span className="cn-email-to"> to {primaryContact?.email || "—"}{recipients.length > 1 && <span> + {recipients.length - 1} more</span>}</span>
                  </div>
                  <div className="cn-email-subject">{_csMerge(subject, previewCtx) || "(no subject)"}</div>
                </div>
                <div className="cn-email-body">
                  {imageUrl && (
                    <div className="cn-email-image">
                      <img src={imageUrl} alt="" onError={(e) => { e.target.style.display = "none"; e.target.nextSibling.style.display = "block"; }} />
                      <div className="cn-email-image-fallback">⊞ Banner image (preview failed — will still send)</div>
                    </div>
                  )}
                  <div className="cn-email-text">{previewBody || "(empty body)"}</div>
                  {attachedQuotes.length > 0 && (
                    <div className="cn-compose-quote-block">
                      <div className="cn-card-eyebrow">Attached quotes</div>
                      {attachedQuotes.map(q => (
                        <a key={q.id} href={_csQuoteShareUrl(q)} className="cn-compose-quote-link" target="_blank" rel="noopener" onClick={(e) => e.preventDefault()}>
                          <span style={{ fontSize: 18 }}>📄</span>
                          <span style={{ flex: 1 }}>
                            <div style={{ fontWeight: 500 }}>Quote {q.quoteNumber} · v{q.version}</div>
                            <div style={{ color: "var(--cn-mute)", fontSize: 12 }}>Total {_csCurrency(Math.round(window.cnQuotes && window.cnQuotes.readQuotes ? (window.cnQuotes.readQuotes(attachedQuoteRefs.find(r => r.quoteId === q.id).oppId).find(x => x.id === q.id) ? 0 : 0) : 0))} · valid through {q.expiresDate}</div>
                          </span>
                          <span style={{ color: "var(--cn-copper)" }}>Open →</span>
                        </a>
                      ))}
                    </div>
                  )}
                  {ctaText && (
                    <div style={{ textAlign: "center", margin: "24px 0 8px" }}>
                      <a href={ctaUrl || "#"} className="cn-email-cta" onClick={(e) => e.preventDefault()}>{ctaText}</a>
                    </div>
                  )}
                </div>
              </div>
            </Fragment>
          )}
        </div>

        <footer className="cn-modal-foot">
          {step === 0 ? (
            <Fragment>
              <button className="cn-btn cn-btn--ghost" onClick={onClose}>Cancel</button>
              <div style={{ marginLeft: "auto" }}>
                <button className="cn-btn cn-btn--primary" onClick={() => setStep(1)} disabled={!subject.trim() || recipients.length === 0}>
                  Next: Review →
                </button>
              </div>
            </Fragment>
          ) : (
            <Fragment>
              <button className="cn-btn cn-btn--ghost" onClick={() => setStep(0)} disabled={sending}>← Edit</button>
              <div style={{ marginLeft: "auto" }}>
                <button className="cn-btn cn-btn--primary" onClick={send} disabled={sending}>
                  {sending ? (<Fragment><span className="cn-spinner"></span>Sending…</Fragment>) : `Send to ${recipients.length} ${recipients.length === 1 ? "person" : "people"} →`}
                </button>
              </div>
            </Fragment>
          )}
        </footer>

        {templatePickerOpen && window.TemplatePicker && (
          <window.TemplatePicker
            onClose={() => setTemplatePickerOpen(false)}
            onPick={applyTemplate}
          />
        )}

        {createQuoteFor && (
          <InlineQuoteCreator
            scenario={scenario}
            createQuoteFor={createQuoteFor}
            recipientIds={recipients}
            currentUser={currentUser}
            onClose={() => setCreateQuoteFor(null)}
            onCreated={(opp, quote) => {
              setAttachedQuoteRefs(prev => [...prev, { oppId: opp.id, quoteId: quote.id }]);
              if (!ctaText && !ctaUrl) {
                setCtaText("View & respond to quote →");
                setCtaUrl(_csQuoteShareUrl(quote));
              }
              setCreateQuoteFor(null);
            }}
          />
        )}
      </div>
    </div>
  );
}

// ─── Add-a-recipient inline input ───────────────────────────────────────────
function AddRecipientInline({ scenario, excludeIds, onPick }) {
  const [q, setQ] = useState("");
  const [showProspect, setShowProspect] = useState(false);
  const [pn, setPn] = useState("");
  const [pe, setPe] = useState("");
  const search = q.trim().toLowerCase();
  const matches = search
    ? scenario.contacts
        .filter(c => !excludeIds.includes(c.id))
        .filter(c => (c.name || "").toLowerCase().includes(search)
          || (c.email || "").toLowerCase().includes(search)
          || (window.accountOf(c.accountId, scenario)?.name || "").toLowerCase().includes(search))
        .slice(0, 6)
    : [];

  if (showProspect) {
    return (
      <form
        className="cn-rp-prospect-form"
        style={{ width: "100%", marginTop: 6 }}
        onSubmit={(e) => {
          e.preventDefault();
          if (!pn.trim() || !pe.trim()) return;
          if (!/.+@.+\..+/.test(pe)) { alert("Enter a valid email"); return; }
          const pid = "prospect-" + Math.random().toString(36).slice(2, 9);
          scenario.contacts.push({ id: pid, name: pn.trim(), email: pe.trim(), title: "Prospect", accountId: null, tier: "Influencer" });
          onPick(scenario.contacts.find(c => c.id === pid));
          setPn(""); setPe(""); setShowProspect(false);
        }}
      >
        <div className="cn-field-row">
          <div className="cn-field" style={{ flex: 1 }}>
            <label>Name</label>
            <input className="cn-input" value={pn} onChange={(e) => setPn(e.target.value)} autoFocus />
          </div>
          <div className="cn-field" style={{ flex: 1.4 }}>
            <label>Email</label>
            <input className="cn-input cn-mono" style={{ fontSize: 12.5 }} value={pe} onChange={(e) => setPe(e.target.value)} placeholder="jane@company.com" />
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, justifyContent: "flex-end" }}>
          <button type="button" className="cn-btn cn-btn--ghost" onClick={() => setShowProspect(false)}>Cancel</button>
          <button type="submit" className="cn-btn cn-btn--primary">Add</button>
        </div>
      </form>
    );
  }

  return (
    <div className="cn-compose-add-recipient">
      <input
        className="cn-input"
        placeholder="+ Add contact or prospect…"
        value={q}
        onChange={(e) => setQ(e.target.value)}
        style={{ height: 32, fontSize: 12.5, minWidth: 220 }}
      />
      {matches.length > 0 && (
        <div className="cn-rp-suggest" style={{ marginTop: 4 }}>
          {matches.map(c => {
            const acct = window.accountOf(c.accountId, scenario);
            return (
              <button key={c.id} className="cn-rp-sug-item" onClick={() => { onPick(c); setQ(""); }}>
                <span className="cn-avatar cn-avatar--xs">{c.name.split(" ").map(n => n[0]).join("").slice(0, 2)}</span>
                <span className="cn-rp-sug-text">
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{c.name}</div>
                  <div style={{ fontSize: 11.5, color: "var(--cn-mute)" }}>{c.email || "no email"}{acct ? " · " + acct.name : ""}</div>
                </span>
                <span className="cn-sr-kind">+ Add</span>
              </button>
            );
          })}
        </div>
      )}
      {search && matches.length === 0 && (
        <div className="cn-rp-empty" style={{ marginTop: 4 }}>
          No matches. <button className="cn-link" onClick={() => { setShowProspect(true); setPn(q); setQ(""); }}>+ Add "{q}" as a prospect</button>
        </div>
      )}
    </div>
  );
}

// ─── Attached quotes section in the composer ───────────────────────────────
function ComposeQuotesSection({ scenario, availableQuotes, attachedQuoteIds, onToggle, onCreateNew }) {
  return (
    <div className="cn-compose-quotes">
      <div className="cn-compose-quotes-head">
        <label style={{ margin: 0 }}>Attach quote(s)</label>
        <button className="cn-btn cn-btn--ghost" style={{ height: 28, fontSize: 12, padding: "4px 10px" }} onClick={onCreateNew}>+ Create new quote</button>
      </div>
      {availableQuotes.length === 0 ? (
        <div className="cn-compose-quotes-empty">No existing quotes for this contact. Create one above to attach it.</div>
      ) : (
        <div className="cn-compose-quotes-list">
          {availableQuotes.map(({ quote, opp }) => {
            const total = window.cnQuotes && window.quoteTotal ? window.quoteTotal(quote) : 0;
            const checked = attachedQuoteIds.includes(quote.id);
            return (
              <label key={quote.id} className={`cn-compose-quote-row ${checked ? "is-on" : ""}`}>
                <input type="checkbox" checked={checked} onChange={() => onToggle(opp, quote)} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>
                    Quote {quote.quoteNumber} · v{quote.version}
                    <span className={`cn-q-pill ${
                      quote.status === "accepted" ? "cn-q-accepted"
                      : quote.status === "declined" ? "cn-q-declined"
                      : quote.status === "viewed" ? "cn-q-viewed"
                      : quote.status === "sent" ? "cn-q-sent"
                      : ""}`} style={{ marginLeft: 8, fontSize: 10 }}>{quote.status || "draft"}</span>
                  </div>
                  <div style={{ color: "var(--cn-mute)", fontSize: 11.5 }}>
                    {opp.title} · {_csCurrency(Math.round(total * 100))} · valid through {quote.expiresDate}
                  </div>
                </div>
              </label>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── Inline quote creator ───────────────────────────────────────────────────
// When user has 1 eligible opp, creates a blank quote immediately and opens
// the existing QuoteBuilderModal. With multiple, asks which opp first.
function InlineQuoteCreator({ scenario, createQuoteFor, recipientIds, currentUser, onClose, onCreated }) {
  const eligibleOpps = scenario.opps.filter(o => recipientIds.includes(o.contactId));
  const [pickedOppId, setPickedOppId] = useState(createQuoteFor !== "ask" ? createQuoteFor : null);
  const [createdQuoteId, setCreatedQuoteId] = useState(null);

  // Create a blank quote in storage as soon as oppId is known
  useEffect(() => {
    if (!pickedOppId || createdQuoteId) return;
    const opp = scenario.opps.find(o => o.id === pickedOppId);
    const contact = scenario.contacts.find(c => c.id === opp?.contactId);
    const account = window.accountOf(opp?.accountId, scenario);
    if (!opp || !window.cnQuotes) return;
    const list = window.cnQuotes.readQuotes(opp.id);
    const num = "Q-" + String(2026000 + list.length + 1).slice(-4);
    const today = new Date();
    const exp = new Date(); exp.setDate(today.getDate() + 30);
    const newQuote = {
      id: "q-" + Math.random().toString(36).slice(2, 10),
      quoteNumber: num,
      version: 1,
      issuedDate: today.toISOString().slice(0, 10),
      expiresDate: exp.toISOString().slice(0, 10),
      billToName: account?.name || "",
      billToAddress: account?.hq || "",
      attentionName: contact?.name || "",
      attentionEmail: contact?.email || "",
      preparedBy: opp.ownerId || currentUser?.id || null,
      reference: opp.title || "",
      lineItems: [{ id: "l-" + Math.random().toString(36).slice(2, 8), description: "", qty: 1, unitPrice: 0, leadTime: "" }],
      notes: "",
      terms: "Net 30 unless otherwise noted.",
      taxRate: 0,
      shippingCost: 0,
      createdAt: today.toISOString(),
      updatedAt: today.toISOString(),
      sentAt: null,
      viewedAt: null,
      viewCount: 0,
      shareToken: "qt-" + Math.random().toString(36).slice(2, 14) + Math.random().toString(36).slice(2, 8),
      status: "draft",
    };
    const next = [newQuote, ...list];
    window.cnQuotes.writeQuotes(opp.id, next);
    setCreatedQuoteId(newQuote.id);
  }, [pickedOppId]);

  // Show opp picker if "ask"
  if (createQuoteFor === "ask" && !pickedOppId) {
    return (
      <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 180 }}>
        <div className="cn-modal" style={{ maxWidth: 520 }} onClick={(e) => e.stopPropagation()}>
          <header className="cn-modal-head">
            <div>
              <div className="cn-card-eyebrow">Pick a deal</div>
              <h2 className="cn-modal-title">Which deal is this quote for?</h2>
            </div>
            <button className="cn-icon-btn" onClick={onClose}>✕</button>
          </header>
          <div className="cn-modal-body">
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {eligibleOpps.map(opp => {
                const acct = window.accountOf(opp.accountId, scenario);
                return (
                  <button key={opp.id} className="cn-tp-card" onClick={() => setPickedOppId(opp.id)}>
                    <div className="cn-tp-name">{opp.title}</div>
                    <div className="cn-tp-subject">{acct?.name || ""} · {opp.stage}</div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Once a quote is created, mount the QuoteBuilderModal
  if (pickedOppId && createdQuoteId && window.QuoteBuilderModal) {
    const opp = scenario.opps.find(o => o.id === pickedOppId);
    const account = window.accountOf(opp?.accountId, scenario);
    const contact = scenario.contacts.find(c => c.id === opp?.contactId);
    const quote = (window.cnQuotes.readQuotes(opp.id) || []).find(q => q.id === createdQuoteId);
    if (!quote) return null;
    return (
      <window.QuoteBuilderModal
        quote={quote}
        opp={opp}
        account={account}
        contact={contact}
        onChange={(patch) => {
          const list = window.cnQuotes.readQuotes(opp.id);
          const next = list.map(x => x.id === createdQuoteId ? { ...x, ...patch, updatedAt: new Date().toISOString() } : x);
          window.cnQuotes.writeQuotes(opp.id, next);
        }}
        onClose={() => {
          const list = window.cnQuotes.readQuotes(opp.id);
          const final = list.find(x => x.id === createdQuoteId);
          if (final) onCreated(opp, final);
          else onClose();
        }}
        onDelete={() => {
          const list = window.cnQuotes.readQuotes(opp.id).filter(x => x.id !== createdQuoteId);
          window.cnQuotes.writeQuotes(opp.id, list);
          onClose();
        }}
      />
    );
  }

  return null;
}

// ─── Wrapper used by ContactDetail "Quote" button ──────────────────────────
function QuickQuoteFromContact({ scenario, contact, oppId, currentUser, onClose }) {
  return (
    <InlineQuoteCreator
      scenario={scenario}
      createQuoteFor={oppId}
      recipientIds={[contact.id]}
      currentUser={currentUser}
      onClose={onClose}
      onCreated={(_opp, _quote) => onClose()}
    />
  );
}

Object.assign(window, { ContactComposeDrawer, AddRecipientInline, QuickQuoteFromContact });

</script>
<script type="text/babel" data-source="app.jsx">
// Main app — auth + Supabase data + routing + tweaks
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("ErrorBoundary:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div className="cn-loading">
          <div style={{ maxWidth: 600, padding: 20 }}>
            <h2 style={{ fontFamily: "var(--cn-serif)" }}>Something went wrong</h2>
            <pre style={{ whiteSpace: "pre-wrap", color: "var(--cn-neg)", fontSize: 12 }}>
              {this.state.error.message}{"\n\n"}{this.state.error.stack}
            </pre>
            <button className="cn-btn cn-btn--primary" onClick={() => location.reload()}>Reload</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "currentUserId": null,
  "permissions": "strict"
}/*EDITMODE-END*/;

function App() {
  // Public share route — no auth required
  const shareToken = new URLSearchParams(window.location.search).get("quote");
  if (shareToken) {
    return <window.QuoteShareView token={shareToken} />;
  }

  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [authState, setAuthState] = useState("checking"); // checking | signed-out | signed-in
  const [data, setData] = useState(null);
  const [dataState, setDataState] = useState("idle"); // idle | loading | empty | ready | error
  const [dataError, setDataError] = useState(null);
  const [skipEmpty, setSkipEmpty] = useState(false);

  const [view, setView] = useState("dashboard");
  const [contactId, setContactId] = useState(null);
  const [oppId, setOppId] = useState(null);
  const [logCallOpen, setLogCallOpen] = useState(false);
  const [newOppOpen, setNewOppOpen] = useState(false);
  const [newOppPrefillContact, setNewOppPrefillContact] = useState(null);
  const [newContactOpen, setNewContactOpen] = useState(false);
  const [newAccountOpen, setNewAccountOpen] = useState(false);
  const [editAccount, setEditAccount] = useState(null);
  const [editActivity, setEditActivity] = useState(null);

  // Check session on mount
  useEffect(() => {
    let mounted = true;
    (async () => {
      const session = await window.getSession();
      if (!mounted) return;
      setAuthState(session ? "signed-in" : "signed-out");
    })();
    const { data: sub } = window.sb.auth.onAuthStateChange((_event, session) => {
      setAuthState(session ? "signed-in" : "signed-out");
    });
    return () => { mounted = false; sub?.subscription?.unsubscribe(); };
  }, []);

  // Load data when signed in
  const reload = async () => {
    setDataState("loading");
    setDataError(null);
    try {
      const d = await window.loadCRMData();
      setData(d);
      if (d.opps.length === 0 && d.accounts.length === 0 && !skipEmpty) {
        setDataState("empty");
      } else {
        setDataState("ready");
        // Auto-set current user to whoever's logged in
        const session = await window.getSession();
        if (session && d.reps.length > 0) {
          const me = d.reps.find(r => r.auth_user_id === session.user.id);
          if (me) {
            // attach login email to the rep record so campaigns can send from it
            me.email = session.user.email;
            if (t.currentUserId !== me.id) setTweak("currentUserId", me.id);
          }
        }
      }
    } catch (e) {
      setDataError(e.message);
      setDataState("error");
    }
  };

  useEffect(() => {
    if (authState === "signed-in") reload();
  }, [authState]);

  if (authState === "checking") return <LoadingScreen message="Checking session…" />;
  if (authState === "signed-out") return <LoginScreen onAuthed={() => setAuthState("signed-in")} />;
  if (dataState === "loading" || dataState === "idle") return <LoadingScreen message="Loading your CRM…" />;
  if (dataState === "error") return (
    <div className="cn-loading">
      <div className="cn-loading-text" style={{ color: "var(--cn-neg)" }}>Error: {dataError}</div>
      <button className="cn-btn cn-btn--ghost" onClick={reload} style={{ marginTop: 16 }}>Retry</button>
      <button className="cn-link" onClick={() => window.signOut()} style={{ marginTop: 8 }}>Sign out</button>
    </div>
  );
  if (dataState === "empty") return <EmptyState onSeed={reload} onSkip={() => { setSkipEmpty(true); setDataState("ready"); }} onSignOut={() => window.signOut()} />;

  const scenario = data;
  // Inject reps into window so existing helpers work
  window.REPS = data.reps;

  const currentUser = data.reps.find(r => r.id === t.currentUserId) || data.reps[0];
  const isFounder = currentUser && (currentUser.role || "").toLowerCase().includes("founder");

  const openContact = (id) => { setContactId(id); setView("contact-detail"); };
  const openOpp = (id) => { setOppId(id); };
  const switchUser = () => {
    if (data.reps.length < 2) return;
    const idx = data.reps.findIndex(r => r.id === currentUser.id);
    const next = data.reps[(idx + 1) % data.reps.length];
    setTweak("currentUserId", next.id);
  };

  const firstName = (currentUser?.name || "there").split(" ")[0];
  const titleMap = {
    "dashboard": { title: `Good morning, ${firstName}`, bc: ["Workspace", "Dashboard"] },
    "pipeline": { title: "Pipeline", bc: ["Workspace", "Pipeline"] },
    "contacts": { title: "Contacts", bc: ["Workspace", "Contacts"] },
    "accounts": { title: "Accounts", bc: ["Workspace", "Accounts"] },
    "activity": { title: "Activity", bc: ["Workspace", "Activity"] },
    "reports": { title: "Reports & Commission", bc: ["Workspace", "Reports"] },
    "outreach": { title: "Outreach", bc: ["Workspace", "Outreach"] },
    "prospecting": { title: "Prospecting", bc: ["Workspace", "Prospecting"] },
    "documents": { title: "Sales documents", bc: ["Workspace", "Documents"] },
    "contact-detail": { title: "Contact", bc: ["Contacts", scenario.contacts.find(c => c.id === contactId)?.name || "Contact"] },
  };
  const t2 = titleMap[view] || titleMap["dashboard"];

  return (
    <div className="cn-app" data-screen-label="Chief Negotiators CRM">
      <Sidebar view={view} setView={setView} scenario={scenario} currentUser={currentUser} onUserSwitch={switchUser} onSignOut={() => window.signOut()} />
      <main className="cn-main">
        {view !== "contact-detail" && (
          <Topbar
            title={t2.title}
            breadcrumb={t2.bc}
            onLogCall={() => setLogCallOpen(true)}
            onAddOpp={() => setNewOppOpen(true)}
            scenario={scenario}
            onOpenContact={openContact}
            onOpenOpp={openOpp}
            onSetView={setView}
          />
        )}
        <div className="cn-content" data-screen-label={`${t2.title} screen`}>
          {view === "dashboard" && <Dashboard scenario={scenario} currentUser={currentUser} isFounder={isFounder} onLogCall={() => setLogCallOpen(true)} onOpenContact={openContact} onOpenOpp={openOpp} onEditActivity={setEditActivity} />}
          {view === "pipeline" && <Pipeline scenario={scenario} currentUser={currentUser} isFounder={isFounder} onOpenOpp={openOpp} onAddOpp={() => setNewOppOpen(true)} />}
          {view === "contacts" && <Contacts scenario={scenario} onOpenContact={openContact} onNewContact={() => setNewContactOpen(true)} />}
          {view === "accounts" && <Accounts scenario={scenario} onOpenContact={openContact} onNewAccount={() => setNewAccountOpen(true)} onEditAccount={(a) => setEditAccount(a)} />}
          {view === "activity" && <ActivityScreen scenario={scenario} currentUser={currentUser} onOpenContact={openContact} onOpenOpp={openOpp} onLogCall={() => setLogCallOpen(true)} onEditActivity={setEditActivity} />}
          {view === "reports" && <Reports scenario={scenario} currentUser={currentUser} isFounder={isFounder} permissions={t.permissions} />}
          {view === "outreach" && <Outreach scenario={scenario} currentUser={currentUser} />}
          {view === "prospecting" && <window.ProspectingScreen scenario={scenario} currentUser={currentUser} />}
          {view === "documents" && <window.DocumentsScreen scenario={scenario} currentUser={currentUser} onOpenContact={openContact} onOpenOpp={openOpp} />}
          {view === "contact-detail" && contactId && <ContactDetail scenario={scenario} currentUser={currentUser} contactId={contactId} onBack={() => setView("contacts")} onOpenOpp={openOpp} onLogCall={() => setLogCallOpen(true)} onSaved={reload} onEditActivity={setEditActivity} onNewOpp={(cid) => { setNewOppPrefillContact(cid); setNewOppOpen(true); }} />}
        </div>
      </main>

      <LogCallDrawer open={logCallOpen} onClose={() => setLogCallOpen(false)} scenario={scenario} currentUser={currentUser} onSaved={reload} />
      <NewOppModal open={newOppOpen} onClose={() => { setNewOppOpen(false); setNewOppPrefillContact(null); }} scenario={scenario} currentUser={currentUser} onSaved={reload} prefillContactId={newOppPrefillContact} />
      <NewContactModal open={newContactOpen} onClose={() => setNewContactOpen(false)} scenario={scenario} currentUser={currentUser} onSaved={reload} />
      <NewAccountModal open={newAccountOpen} onClose={() => setNewAccountOpen(false)} currentUser={currentUser} onSaved={reload} />
      <NewAccountModal open={!!editAccount} onClose={() => setEditAccount(null)} account={editAccount} currentUser={currentUser} onSaved={reload} />
      <EditActivityModal open={!!editActivity} onClose={() => setEditActivity(null)} activity={editActivity} scenario={scenario} onSaved={reload} />
      <OppDetailDrawer open={!!oppId} onClose={() => setOppId(null)} oppId={oppId} scenario={scenario} onOpenContact={openContact} onSaved={reload} />

      {window.ToastHost && <window.ToastHost />}
      {window.SaleBannerHost && <window.SaleBannerHost scenario={scenario} currentUser={currentUser} onReload={reload} />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Viewing as" />
        <TweakSelect
          label="User"
          value={t.currentUserId}
          options={data.reps.map(r => ({ value: r.id, label: r.name }))}
          onChange={(v) => setTweak("currentUserId", v)}
        />
        <TweakRadio
          label="Employee perms"
          value={t.permissions}
          options={[
            { value: "strict", label: "Strict" },
            { value: "open", label: "Open" },
          ]}
          onChange={(v) => setTweak("permissions", v)}
        />
        <TweakSection label="Data" />
        <TweakButton label="Reload from database" onClick={reload} />
        <TweakButton label="Wipe sample data" onClick={async () => {
          if (!confirm("Delete ALL accounts, contacts, deals and activities?")) return;
          await window.wipeSampleData();
          reload();
        }} />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

</script>
