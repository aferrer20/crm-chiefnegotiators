  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  box-shadow: 0 16px 40px -12px rgba(26, 22, 18, 0.22);
  max-height: 480px;
  overflow-y: auto;
  z-index: 50;
}
.cn-sr-group {
  padding: 6px 4px;
  border-bottom: 1px solid var(--cn-line-2);
}
.cn-sr-group:last-child { border-bottom: none; }
.cn-sr-group-name {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  padding: 6px 10px 4px;
  font-weight: 500;
}
.cn-sr-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  background: none; border: none; font: inherit;
  text-align: left;
  padding: 8px 10px;
  border-radius: 4px;
  cursor: pointer;
}
.cn-sr-item:hover, .cn-sr-item.is-highlight {
  background: var(--cn-paper-2);
}
.cn-sr-item-text { flex: 1; min-width: 0; }
.cn-sr-item-title {
  font-size: 13px; font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.cn-sr-item-sub {
  font-size: 11.5px; color: var(--cn-mute);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.cn-sr-kind {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  padding: 2px 6px;
  border: 1px solid var(--cn-line);
  border-radius: 3px;
  background: var(--cn-paper-2);
  flex: none;
}
.cn-sr-empty {
  padding: 20px;
  text-align: center;
  color: var(--cn-mute);
  font-size: 12.5px;
}

/* ─────────── Scrollbar ─────────── */
.cn-content::-webkit-scrollbar { width: 12px; }
.cn-content::-webkit-scrollbar-track { background: transparent; }
.cn-content::-webkit-scrollbar-thumb {
  background: var(--cn-line);
  border-radius: 100px;
  border: 3px solid var(--cn-paper);
}
/* ── Sales Documents ──────────────────────────────────────────────── */
.cn-docs-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px; padding: 8px 4px 0;
}
.cn-docs-head-actions { display: flex; gap: 10px; align-items: center; }
.cn-docs-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 22px;
  align-items: start;
}
.cn-docs-rail {
  display: flex; flex-direction: column; gap: 2px;
  position: sticky; top: 16px;
}
.cn-docs-rail-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: var(--cn-r);
  background: none; border: none;
  font: inherit; font-size: 13px;
  color: var(--cn-ink);
  cursor: pointer;
  text-align: left;
  transition: background .12s ease;
}
.cn-docs-rail-item:hover { background: var(--cn-card); }
.cn-docs-rail-item.is-active {
  background: var(--cn-card);
  box-shadow: inset 2px 0 0 var(--cn-copper);
}
.cn-docs-rail-icon { font-size: 14px; width: 18px; text-align: center; }
.cn-docs-rail-label { flex: 1; }
.cn-docs-rail-count {
  font-size: 11px; color: var(--cn-mute);
  font-family: var(--cn-mono);
}
.cn-docs-main { min-width: 0; }
.cn-docs-empty {
  background: var(--cn-card);
  border: 1px dashed var(--cn-line);
  border-radius: var(--cn-r);
  padding: 48px 20px;
  text-align: center;
}
.cn-docs-empty-title { font-family: var(--cn-serif); font-size: 18px; }
.cn-docs-empty-sub { color: var(--cn-mute); font-size: 13px; margin-top: 4px; }

.cn-docs-group { margin-bottom: 30px; }
.cn-docs-group-head {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 12px;
  padding: 0 4px;
}
.cn-docs-group-icon { font-size: 16px; }
.cn-docs-group-title {
  margin: 0;
  font-family: var(--cn-serif);
  font-size: 17px;
  font-weight: 500;
}
.cn-docs-group-count {
  font-size: 11px; color: var(--cn-mute);
  font-family: var(--cn-mono);
  background: var(--cn-card);
  padding: 2px 7px;
  border-radius: 999px;
}
.cn-docs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.cn-doc-card {
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  padding: 14px 14px 10px;
  display: flex; flex-direction: column; gap: 10px;
  transition: border-color .12s ease, box-shadow .12s ease;
}
.cn-doc-card:hover {
  border-color: var(--cn-copper);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.cn-doc-card-head { display: flex; gap: 12px; align-items: flex-start; }
.cn-doc-icon {
  font-size: 26px; line-height: 1;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--cn-paper-2);
  border-radius: 8px;
  flex: none;
}
.cn-doc-title {
  background: none; border: none; padding: 0;
  font: inherit;
  font-family: var(--cn-serif);
  font-size: 15.5px; font-weight: 500;
  text-align: left;
  cursor: pointer;
  color: var(--cn-ink);
  display: block;
  width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cn-doc-title:hover { color: var(--cn-copper); text-decoration: underline; }
.cn-doc-meta {
  font-size: 11.5px;
  color: var(--cn-mute);
  margin-top: 3px;
}
.cn-doc-desc {
  font-size: 12.5px;
  color: var(--cn-ink);
  margin: 0;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.cn-doc-attachments {
  padding: 8px 0 4px;
  border-top: 1px solid var(--cn-line);
}
.cn-doc-att-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.cn-doc-att-chip {
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: 999px;
  padding: 3px 8px;
  font-size: 11.5px;
  cursor: pointer;
  font: inherit;
  color: var(--cn-ink);
  transition: border-color .12s ease;
}
.cn-doc-att-chip:hover:not(:disabled) { border-color: var(--cn-copper); color: var(--cn-copper); }
.cn-doc-att-chip:disabled { cursor: default; opacity: 0.7; }
.cn-doc-card-foot {
  display: flex; gap: 6px; align-items: center;
  padding-top: 6px; border-top: 1px solid var(--cn-line);
}
.cn-icon-btn--danger { color: var(--cn-mute); }
.cn-icon-btn--danger:hover { color: var(--cn-neg); }

/* Upload modal */
.cn-doc-source-tabs {
  display: flex; gap: 6px; margin-top: 6px;
}
.cn-doc-source-tab {
  flex: 1;
  padding: 8px 12px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  font: inherit; font-size: 13px;
  cursor: pointer;
  transition: border-color .12s ease, background .12s ease;
}
.cn-doc-source-tab:hover { border-color: var(--cn-copper); }
.cn-doc-source-tab.is-active {
  border-color: var(--cn-copper);
  background: var(--cn-copper-wash);
  color: var(--cn-copper-deep);
  font-weight: 500;
}
.cn-doc-drop {
  border: 2px dashed var(--cn-line);
  border-radius: var(--cn-r);
  padding: 20px;
  background: var(--cn-paper-2);
  cursor: pointer;
  transition: border-color .12s ease, background .12s ease;
}
.cn-doc-drop.is-over,
.cn-doc-drop:hover {
  border-color: var(--cn-copper);
  background: var(--cn-copper-wash);
}
.cn-doc-drop-empty {
  text-align: center;
  padding: 16px 8px;
}
.cn-doc-drop-icon-lg { font-size: 32px; opacity: 0.6; margin-bottom: 6px; }
.cn-doc-drop-title { font-size: 14px; font-weight: 500; }
.cn-doc-drop-sub { font-size: 12px; color: var(--cn-mute); margin-top: 4px; }
.cn-doc-drop-have { display: flex; align-items: center; gap: 12px; }
.cn-doc-drop-icon { font-size: 28px; }
.cn-doc-drop-name {
  font-size: 13.5px; font-weight: 500;
  word-break: break-all;
}
.cn-doc-drop-meta { font-size: 11.5px; color: var(--cn-mute); margin-top: 2px; }

.cn-doc-attach-picker {
  display: flex; flex-direction: column; gap: 10px;
}
.cn-doc-attach-group { display: flex; flex-direction: column; gap: 4px; }
.cn-doc-attach-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  font: inherit; font-size: 12.5px;
  text-align: left;
  cursor: pointer;
  color: var(--cn-ink);
  transition: border-color .12s ease;
}
.cn-doc-attach-row:hover { border-color: var(--cn-copper); }
.cn-doc-attach-row.is-on {
  border-color: var(--cn-pos);
  background: #ECF2EE;
}
.cn-doc-attach-tag {
  font-size: 11px;
  color: var(--cn-mute);
  font-family: var(--cn-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.cn-doc-attach-row.is-on .cn-doc-attach-tag { color: var(--cn-pos); }
.cn-doc-attach-current {
  margin-top: 6px;
  padding: 10px 12px;
  background: var(--cn-paper-2);
  border-radius: var(--cn-r);
}
.cn-doc-attach-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: 999px;
  padding: 3px 4px 3px 10px;
  font-size: 12px;
}
.cn-doc-attach-pill button {
  background: none; border: none;
  cursor: pointer;
  color: var(--cn-mute);
  font-size: 11px;
  padding: 0 4px;
}
.cn-doc-attach-pill button:hover { color: var(--cn-neg); }

@media (max-width: 900px) {
  .cn-docs-layout { grid-template-columns: 1fr; }
  .cn-docs-rail { position: static; flex-direction: row; flex-wrap: wrap; }
}

/* Document viewer (in-app PDF/image preview) */
.cn-doc-viewer-scrim { padding: 24px; align-items: stretch; justify-content: center; }
.cn-doc-viewer {
  background: var(--cn-paper);
  border-radius: var(--cn-r);
  width: min(1100px, 100%);
  height: 100%;
  max-height: calc(100vh - 48px);
  display: flex; flex-direction: column;
  box-shadow: 0 12px 40px rgba(0,0,0,0.32);
  overflow: hidden;
}
.cn-doc-viewer-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--cn-line);
  background: var(--cn-card);
}
.cn-doc-viewer-title {
  font-family: var(--cn-serif);
  font-size: 16px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cn-doc-viewer-sub { font-size: 11.5px; color: var(--cn-mute); margin-top: 2px; }
.cn-doc-viewer-body {
  flex: 1;
  background: #2A2622;
  position: relative;
  display: flex;
  overflow: hidden;
}
.cn-doc-viewer-body > iframe,
.cn-doc-viewer-body > img { flex: 1; }
.cn-doc-viewer-msg {
  margin: auto;
  text-align: center;
  color: var(--cn-paper);
  padding: 40px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.cn-doc-viewer-msg-title { font-family: var(--cn-serif); font-size: 18px; color: var(--cn-paper); }
.cn-doc-viewer-msg-sub { font-size: 13px; color: rgba(244, 238, 227, 0.7); max-width: 380px; }

/* ── Prospecting ──────────────────────────────────────────────────── */
.cn-prospect-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 22px;
  align-items: start;
}
.cn-prospect-rail {
  display: flex; flex-direction: column; gap: 2px;
  position: sticky; top: 16px;
}
.cn-prospect-rail-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px 8px;
}
.cn-prospect-rail-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: var(--cn-r);
  background: none; border: none;
  font: inherit; font-size: 13px;
  color: var(--cn-ink);
  cursor: pointer;
  text-align: left;
}
.cn-prospect-rail-item:hover { background: var(--cn-card); }
.cn-prospect-rail-item.is-active {
  background: var(--cn-card);
  box-shadow: inset 2px 0 0 var(--cn-copper);
}
.cn-prospect-rail-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cn-prospect-rail-count { font-size: 11px; color: var(--cn-mute); font-family: var(--cn-mono); }
.cn-prospect-rail-newform {
  padding: 6px 8px 0;
  display: flex; flex-direction: column;
}
.cn-prospect-main { min-width: 0; }
.cn-prospect-listhead {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 14px; padding: 0 4px;
}
.cn-prospect-toolbar {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 12px;
}
.cn-prospect-table tr.is-selected { background: var(--cn-copper-wash); }
.cn-prospect-table tr.is-selected td { border-color: #E5CCAF; }
.cn-prospect-group-row td {
  background: var(--cn-paper-2);
  padding: 8px 16px;
  border-top: 1px solid var(--cn-line);
  border-bottom: 1px solid var(--cn-line);
}
.cn-prospect-group-label {
  font-family: var(--cn-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;

// ── Data loaders ────────────────────────────────────────────────────────────
// Returns data in the same shape the components expect (matches the
// hardcoded Q2_* arrays in data.jsx — { accounts, contacts, opps, activities, period }).

async function loadCRMData() {
  const [repsR, accountsR, contactsR, oppsR, activitiesR] = await Promise.all([
    sb.from("reps").select("*"),
    sb.from("accounts").select("*"),
    sb.from("contacts").select("*"),
    sb.from("opportunities").select("*"),
    sb.from("activities").select("*").order("occurred_at", { ascending: false }),
  ]);

  // Email/full names — the CRM shows just first names for friendliness,
  // but outbound emails should sign with the full name. The DB row could
  // contain "Dan", "Daniel", "DanR", "Dan Ravaioli", an email handle, etc.
  // We normalize all of them to display "Dan" / send as "Dan Ravaioli".
  const normalizeRepName = (raw) => {
    const n = (raw || "").trim();
    const lower = n.toLowerCase();
    // matches: "dan", "daniel", "dan ravaioli", "daniel ravaioli", "danr",
    // "dan r", "ravaioli", "dan.ravaioli", "danr@…"
    const isDan = /(^|[^a-z])dan(iel)?($|[^a-z])/.test(lower)
      || lower.startsWith("dan")
      || lower.startsWith("ravaioli")
      || lower.includes("ravaioli");
    if (isDan) return { name: "Dan", fullName: "Dan Ravaioli" };
    return { name: n, fullName: n };
  };

  const reps = (repsR.data || []).map(r => {
    const { name, fullName } = normalizeRepName(r.name);
    return {
      id: r.id,
      name,
      fullName,
      initials: r.initials || name.split(" ").map(n => n[0]).join("").slice(0, 2),
      role: r.role,
      auth_user_id: r.auth_user_id,
    };
  });

  const accounts = (accountsR.data || []).map(a => ({
    id: a.id, name: a.name, industry: a.industry, hq: a.hq, size: a.size, website: a.website,
    ownerId: a.owner_id,
  }));

  const contacts = (contactsR.data || []).map(c => ({
    id: c.id, name: c.name, title: c.title, email: c.email, phone: c.phone, tier: c.tier,
    accountId: c.account_id,
    ownerId: c.owner_id,
    lastTouch: c.last_touch || "—",
  }));

  const opps = (oppsR.data || []).map(o => ({
    id: o.id, title: o.title, product: o.product,
    value: (o.value_cents || 0) / 100,
    commissionRate: parseFloat(o.commission_rate) || 0,
    stage: o.stage,
    accountId: o.account_id,
    contactId: o.contact_id,
    ownerId: o.owner_id,
    close: o.expected_close ? new Date(o.expected_close).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—",
    created: o.created_at ? new Date(o.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—",
  }));

  const activities = (activitiesR.data || []).map(a => ({
    id: a.id, type: a.type,
    contactId: a.contact_id,
    oppId: a.opportunity_id,
    ownerId: a.owner_id,
    when: a.occurred_at ? formatWhen(a.occurred_at) : "—",
    duration: a.duration_min,
    subject: a.subject,
    summary: a.summary,
    sentiment: a.sentiment,
    recording: a.recording_url,
    snippet: a.summary,
  }));

  return {
    reps,
    label: "Live data",
    accounts, contacts, opps, activities,
    period: `Live · ${new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" })}`,
  };
}

function formatWhen(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffH = diffMs / (1000 * 60 * 60);
  if (diffH < 1) return "Just now";
  if (diffH < 24) return d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  if (diffH < 48) return "Yesterday · " + d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  if (diffH < 24 * 7) return Math.floor(diffH / 24) + " days ago";
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-source="login.jsx">
// Login screen + auth wrapper
function LoginScreen({ onAuthed }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError(null);
    try {
      await window.signIn(email, password);
      onAuthed();
    } catch (err) {
      setError(err.message || "Login failed.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="cn-login">
      <div className="cn-login-card">

// ─────────────────────────────────────────────────────────────────────────────
// Global toast helper — call window.cnToast({ title, sub, kind })
// Mounted once at app root via <ToastHost />.
window.__cnToastListeners = window.__cnToastListeners || [];
window.cnToast = function (input) {
  const t = typeof input === "string" ? { title: input } : (input || {});
  const item = { id: Math.random().toString(36).slice(2), kind: "success", ...t };
  window.__cnToastListeners.forEach(fn => fn(item));
};
function ToastHost() {
  const [items, setItems] = useState([]);
  useEffect(() => {
    const handler = (it) => {
      setItems(list => [...list, it]);
      setTimeout(() => setItems(list => list.filter(x => x.id !== it.id)), it.duration || 5200);
    };
    window.__cnToastListeners.push(handler);
    return () => {
      const i = window.__cnToastListeners.indexOf(handler);
      if (i >= 0) window.__cnToastListeners.splice(i, 1);
    };
  }, []);
  const dismiss = (id) => setItems(list => list.filter(x => x.id !== id));
  if (items.length === 0) return null;
  return (
    <div className="cn-toast-stack">
      {items.map(t => (
        <div key={t.id} className={`cn-toast cn-toast--${t.kind || "success"}`} role="status" aria-live="polite">
          <span className={`cn-toast-tick cn-toast-tick--${t.kind || "success"}`}>{t.kind === "error" ? "!" : "✓"}</span>
          <div style={{ flex: 1 }}>
            <div className="cn-toast-title">{t.title}</div>
            {t.sub && <div className="cn-toast-sub">{t.sub}</div>}
          </div>
          <button className="cn-toast-x" onClick={() => dismiss(t.id)} aria-label="Dismiss">✕</button>
        </div>
      ))}
    </div>
  );
}
window.ToastHost = ToastHost;

// ── Sale banner host ───────────────────────────────────────────────────────
// Watches `cn-pending-sales` (written by the customer's quote-share view).
// For each new pending sale: moves the opp to Won, logs an activity, and
// shows an animated banner at the top with an Undo button.
function SaleBannerHost({ scenario, currentUser, onReload }) {
  const [banners, setBanners] = useState([]);
  const processingRef = useRef(false);

  const fmtMoney = (cents) => {
    const v = (cents || 0) / 100;
    return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(v);
  };

  // Process any unprocessed pending sales: update opp, log activity, push to banner.
  const processPending = async () => {
    if (processingRef.current) return;
    let pending;
    try { pending = JSON.parse(localStorage.getItem("cn-pending-sales") || "[]"); }
    catch { pending = []; }
    const unprocessed = pending.filter(p => !p.processed);
    if (unprocessed.length === 0) return;
    processingRef.current = true;
    const newBanners = [];
    for (const p of unprocessed) {
      try {
        const opp = scenario?.opps?.find(o => o.id === p.oppId);
        const prevStage = opp?.stage || null;
        const prevValueCents = opp ? Math.round((opp.value || 0) * 100) : null;
        // Update opportunity → Won, set value from quote
        if (opp && window.updateOpportunity) {
          await window.updateOpportunity(p.oppId, { stage: "won", value_cents: p.totalCents });
        }
        // Log activity on the timeline
        let activityId = null;
        if (opp && window.insertActivity) {
          const a = await window.insertActivity({
            type: "won",
            owner_id: opp.ownerId || currentUser?.id || null,
            contact_id: opp.contactId || null,
            opportunity_id: opp.id,
            subject: `Quote ${p.quoteNumber || ""} accepted — deal won`,
            summary: `${p.accountName || "Customer"} accepted v${p.quoteVersion || ""} for ${fmtMoney(p.totalCents)}.`,
            occurred_at: new Date().toISOString(),
          });
          activityId = a?.id || null;
        }
        newBanners.push({
          id: p.id,
          accountName: p.accountName || "A customer",
          contactName: p.contactName || "",
          quoteNumber: p.quoteNumber || "",
          totalCents: p.totalCents || 0,
          oppId: p.oppId,
          quoteId: p.quoteId,
          activityId,
          prevStage,
          prevValueCents,
          prevQuoteStatus: p.prevQuoteStatus || "sent",
          undone: false,
        });
        p.processed = true;
      } catch (err) {
        console.error("Failed to process pending sale:", err);
        p.processed = true; // avoid hot loop on a broken entry
      }
    }
    // Drop processed entries from the queue
    const remaining = pending.filter(p => !p.processed);
    localStorage.setItem("cn-pending-sales", JSON.stringify(remaining));
    processingRef.current = false;
    if (newBanners.length) {
      setBanners((bs) => [...newBanners, ...bs]);
      onReload && onReload();
    }
  };

  useEffect(() => {
    processPending();
    const onStorage = (e) => { if (e.key === "cn-pending-sales") processPending(); };
    const onFocus = () => processPending();
    window.addEventListener("storage", onStorage);
    window.addEventListener("focus", onFocus);
    // Also poll occasionally as a safety net (storage events don't fire same-tab)
    const id = setInterval(processPending, 4000);
    return () => {
      window.removeEventListener("storage", onStorage);
      window.removeEventListener("focus", onFocus);
      clearInterval(id);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [scenario?.opps?.length]);

  const dismiss = (id) => setBanners((bs) => bs.filter(b => b.id !== id));

  const undo = async (b) => {
    if (b.undone) return;
    try {
      // 1. Revert opp stage + value
      if (window.updateOpportunity && b.prevStage) {
        await window.updateOpportunity(b.oppId, {
          stage: b.prevStage,
          ...(b.prevValueCents != null ? { value_cents: b.prevValueCents } : {}),
        });
      }
      // 2. Delete the activity row
      if (b.activityId && window.deleteActivity) {
        try { await window.deleteActivity(b.activityId); } catch (e) { console.warn("delete activity failed", e); }
      }
      // 3. Revert quote status back to its pre-accept state
      try {
        const all = window.cnQuotes?.readQuotes?.(b.oppId) || [];
        const reverted = all.map(q => q.id === b.quoteId
          ? { ...q, status: b.prevQuoteStatus || "sent", decidedAt: null }
          : q);
        window.cnQuotes?.writeQuotes?.(b.oppId, reverted);
      } catch (e) { console.warn("revert quote failed", e); }

      setBanners((bs) => bs.map(x => x.id === b.id ? { ...x, undone: true } : x));
      onReload && onReload();
      window.cnToast && window.cnToast({ title: "Sale undone", sub: `${b.accountName} reverted to ${b.prevStage}` });
      setTimeout(() => dismiss(b.id), 2200);
    } catch (e) {
      alert("Undo failed: " + (e.message || e));
    }
  };

  if (banners.length === 0) return null;

  return (
    <div className="cn-sale-stack" role="status" aria-live="polite">
      {banners.map(b => (
        <div key={b.id} className={`cn-sale-banner ${b.undone ? "is-undone" : ""}`}>
          <div className="cn-sale-marquee" aria-hidden="true">
            <div className="cn-sale-marquee-track">
              {Array.from({ length: 8 }).map((_, i) => (
                <span key={i} className="cn-sale-marquee-item">
                  <span className="cn-sale-marquee-icon">★</span>
                  You got a sale!
                  <span className="cn-sale-marquee-icon">★</span>
                  {b.accountName} · {fmtMoney(b.totalCents)}
                </span>
              ))}
            </div>
          </div>
          <div className="cn-sale-body">
            <div className="cn-sale-body-left">
              <div className="cn-sale-eyebrow">{b.undone ? "Sale undone" : "Sale closed · moved to Won"}</div>
              <div className="cn-sale-headline">
                {b.undone ? (
                  <Fragment>{b.accountName} reverted</Fragment>
                ) : (
                  <Fragment>{b.accountName} accepted {b.quoteNumber ? `quote ${b.quoteNumber}` : "your quote"} for <span className="cn-sale-amount">{fmtMoney(b.totalCents)}</span></Fragment>
                )}
              </div>
              {b.contactName && !b.undone && (
                <div className="cn-sale-sub">Confirmed by {b.contactName} · logged on the deal timeline</div>
              )}
            </div>
            <div className="cn-sale-actions">
              {!b.undone && (
                <button className="cn-sale-btn cn-sale-btn--ghost" onClick={() => undo(b)}>Undo</button>
              )}
              <button className="cn-sale-x" onClick={() => dismiss(b.id)} aria-label="Dismiss">✕</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}
window.SaleBannerHost = SaleBannerHost;

// Backdrop-click handler that asks before discarding dirty changes.
// Use on modal scrims: <div onClick={makeBackdropHandler(isDirty, onClose)}>
window.makeBackdropHandler = function (isDirty, onClose) {
  return (e) => {
    if (e.target !== e.currentTarget) return; // only when clicking the scrim itself
    if (typeof isDirty === "function" ? isDirty() : isDirty) {
      if (!confirm("You have unsaved changes. Discard and close?")) return;

    onClose();
  };
};

function Topbar({ title, breadcrumb, onLogCall, onAddOpp, scenario, onOpenContact, onOpenOpp, onSetView }) {
  const [q, setQ] = useState("");
  const [open, setOpen] = useState(false);
  const [hi, setHi] = useState(0);
  const wrapRef = useRef(null);
  const inputRef = useRef(null);

  // Cmd+K / Ctrl+K to focus
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")) {
        e.preventDefault();
        inputRef.current?.focus();
        inputRef.current?.select();
      }
      if (e.key === "Escape" && document.activeElement === inputRef.current) {
        inputRef.current.blur();
        setOpen(false);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // Click outside to close
  useEffect(() => {
    const onDoc = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);

  // Search across contacts, accounts, opps
  const results = useMemo(() => {
    if (!q || !scenario) return { contacts: [], accounts: [], opps: [] };
    const needle = q.toLowerCase();
    const match = (s) => (s || "").toLowerCase().includes(needle);
    return {
      contacts: scenario.contacts.filter(c =>
        match(c.name) || match(c.title) || match(c.email) || match(c.phone)
      ).slice(0, 6),
      accounts: scenario.accounts.filter(a =>
        match(a.name) || match(a.industry) || match(a.hq) || match(a.website)
      ).slice(0, 5),
      opps: scenario.opps.filter(o =>
        match(o.title) || match(o.product)
      ).slice(0, 6),
    };
  }, [q, scenario]);

  const flat = [
    ...results.contacts.map(c => ({ kind: "contact", id: c.id, item: c })),
    ...results.accounts.map(a => ({ kind: "account", id: a.id, item: a })),
    ...results.opps.map(o => ({ kind: "opp", id: o.id, item: o })),
  ];
  const total = flat.length;

  useEffect(() => { setHi(0); }, [q]);

  const pick = (entry) => {
    setQ("");
    setOpen(false);
    if (entry.kind === "contact") onOpenContact && onOpenContact(entry.id);
    else if (entry.kind === "opp") onOpenOpp && onOpenOpp(entry.id);
    else if (entry.kind === "account") onSetView && onSetView("accounts");
  };

  const onKeyInput = (e) => {
    if (!open || total === 0) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setHi(h => Math.min(h + 1, total - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setHi(h => Math.max(h - 1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); pick(flat[hi]); }
  };

  return (
    <header className="cn-topbar">
      <div className="cn-topbar-left">
        {breadcrumb && (
          <div className="cn-breadcrumb">
            {breadcrumb.map((b, i) => (
              <span key={i} className="cn-bc-wrap">
                {i > 0 && <span className="cn-bc-sep">/</span>}
                <span className={i === breadcrumb.length - 1 ? "cn-bc-current" : "cn-bc-link"}>{b}</span>
              </span>
            ))}
          </div>
        )}
        <h1 className="cn-page-title">{title}</h1>
      </div>

      <div className="cn-topbar-right">
        <div className="cn-search" ref={wrapRef}>
          <span className="cn-search-icon">⌕</span>
          <input
            ref={inputRef}
            value={q}
            onChange={(e) => { setQ(e.target.value); setOpen(true); }}
            onFocus={() => q && setOpen(true)}
            onKeyDown={onKeyInput}
            placeholder="Search accounts, contacts, deals…"
          />
          <span className="cn-search-kbd">⌘K</span>
          {open && q && (
            <div className="cn-search-results">
              {total === 0 ? (
                <div className="cn-sr-empty">No matches for "{q}"</div>
              ) : (
                <Fragment>
                  {results.contacts.length > 0 && (
                    <div className="cn-sr-group">
                      <div className="cn-sr-group-name">Contacts</div>
                      {results.contacts.map((c, i) => {
                        const acct = window.accountOf(c.accountId, scenario);
                        const idx = i;
                        return (
                          <button key={c.id} className={`cn-sr-item ${hi === idx ? "is-highlight" : ""}`}
                            onMouseEnter={() => setHi(idx)} onClick={() => pick({ kind: "contact", id: c.id })}>
                            <span className="cn-avatar cn-avatar--xs">{c.name.split(" ").map(n => n[0]).join("").slice(0, 2)}</span>
                            <span className="cn-sr-item-text">
                              <div className="cn-sr-item-title">{c.name}</div>
                              <div className="cn-sr-item-sub">{c.title}{acct ? " · " + acct.name : ""}</div>
                            </span>
                            <span className="cn-sr-kind">Contact</span>
                          </button>
                        );
                      })}
                    </div>
                  )}
                  {results.opps.length > 0 && (
                    <div className="cn-sr-group">
                      <div className="cn-sr-group-name">Deals</div>
                      {results.opps.map((o, i) => {
                        const idx = results.contacts.length + i;
                        const acct = window.accountOf(o.accountId, scenario);
                        return (
                          <button key={o.id} className={`cn-sr-item ${hi === idx ? "is-highlight" : ""}`}
                            onMouseEnter={() => setHi(idx)} onClick={() => pick({ kind: "opp", id: o.id })}>
                            <span className="cn-avatar cn-avatar--xs cn-avatar--copper" style={{ background: "linear-gradient(135deg, var(--cn-copper-soft), var(--cn-copper))" }}>▤</span>
                            <span className="cn-sr-item-text">
                              <div className="cn-sr-item-title">{o.title}</div>
                              <div className="cn-sr-item-sub">{acct?.name} · {window.fmtUSD(o.value, { compact: true })}</div>
                            </span>
                            <span className="cn-sr-kind">Deal</span>
                          </button>
                        );
                      })}
                    </div>
                  )}
                  {results.accounts.length > 0 && (
                    <div className="cn-sr-group">
                      <div className="cn-sr-group-name">Accounts</div>
                      {results.accounts.map((a, i) => {
                        const idx = results.contacts.length + results.opps.length + i;
                        return (
                          <button key={a.id} className={`cn-sr-item ${hi === idx ? "is-highlight" : ""}`}
                            onMouseEnter={() => setHi(idx)} onClick={() => pick({ kind: "account", id: a.id })}>
                            <span className="cn-avatar cn-avatar--xs">▢</span>
                            <span className="cn-sr-item-text">
                              <div className="cn-sr-item-title">{a.name}</div>
                              <div className="cn-sr-item-sub">{a.industry}{a.hq ? " · " + a.hq : ""}</div>
                            </span>
                            <span className="cn-sr-kind">Account</span>
                          </button>
                        );
                      })}
                    </div>
                  )}
                </Fragment>
              )}
            </div>
          )}
        </div>
        <button className="cn-btn cn-btn--ghost" onClick={onLogCall}>
          <span style={{ fontSize: 14 }}>☎</span> Log call
        </button>
        <button className="cn-btn cn-btn--primary" onClick={onAddOpp}>
          + New opportunity
        </button>
      </div>
    </header>
  );
}

// SearchableSelect — type-ahead picker for lists that may grow large
// Usage: <SearchableSelect value={id} onChange={setId}
//                          options={[{value, label, subtext?}]} />
function SearchableSelect({ value, onChange, options, placeholder = "Search…", emptyText = "No matches.", allowClear = false }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const [highlight, setHighlight] = useState(0);
  const rootRef = useRef(null);
  const inputRef = useRef(null);

  const selected = options.find(o => o.value === value);
  const filtered = q
    ? options.filter(o =>
        (o.label || "").toLowerCase().includes(q.toLowerCase()) ||
        (o.subtext || "").toLowerCase().includes(q.toLowerCase())
      )
    : options;

  useEffect(() => {
    const onDoc = (e) => {
      if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);

  useEffect(() => { setHighlight(0); }, [q, open]);

  const choose = (opt) => {
    onChange(opt.value);
    setQ("");
    setOpen(false);
  };

  const onKey = (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); setHighlight(h => Math.min(h + 1, filtered.length - 1)); setOpen(true); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setHighlight(h => Math.max(h - 1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); if (filtered[highlight]) choose(filtered[highlight]); }
    else if (e.key === "Escape") { setOpen(false); }
  };

  return (
    <div className="cn-ss" ref={rootRef}>
      <div className={`cn-ss-control ${open ? "is-open" : ""}`} onClick={() => { setOpen(true); setTimeout(() => inputRef.current?.focus(), 0); }}>
        {open ? (
          <input
            ref={inputRef}
            className="cn-ss-input"
            value={q}
            placeholder={selected ? selected.label : placeholder}
            onChange={(e) => setQ(e.target.value)}
            onKeyDown={onKey}
            autoFocus
          />
        ) : (
          <Fragment>
            {selected ? (
              <div className="cn-ss-value">
                <span className="cn-ss-label">{selected.label}</span>
                {selected.subtext && <span className="cn-ss-subtext">{selected.subtext}</span>}
              </div>
            ) : (
              <span className="cn-ss-placeholder">{placeholder}</span>
            )}
            {allowClear && selected && (
              <button className="cn-ss-clear" onClick={(e) => { e.stopPropagation(); onChange(""); }}>✕</button>
            )}
          </Fragment>
        )}
        <span className="cn-ss-caret">▾</span>
      </div>
      {open && (
        <div className="cn-ss-menu">
          {filtered.length === 0 ? (
            <div className="cn-ss-empty">{emptyText}</div>
          ) : (
            filtered.map((o, i) => (
              <div
                key={o.value}
                className={`cn-ss-item ${i === highlight ? "is-highlight" : ""} ${o.value === value ? "is-selected" : ""}`}
                onMouseEnter={() => setHighlight(i)}
                onMouseDown={(e) => { e.preventDefault(); choose(o); }}
              >
                <div className="cn-ss-item-label">{o.label}</div>
                {o.subtext && <div className="cn-ss-item-sub">{o.subtext}</div>}
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

window.SearchableSelect = SearchableSelect;

</script>
<script type="text/babel" data-source="dashboard.jsx">

const { useState: useStateDash, useMemo: useMemoDash } = React;

function fmtUSD(n, { compact = false } = {}) {
  if (compact) {
    if (n >= 1_000_000) return "$" + (n / 1_000_000).toFixed(n >= 10_000_000 ? 1 : 2).replace(/\.0+$/, "") + "M";
    if (n >= 1_000) return "$" + (n / 1_000).toFixed(0) + "K";
    return "$" + n.toLocaleString();
  }
  return "$" + n.toLocaleString();
}

function stageOf(id) { return window.STAGES.find(s => s.id === id); }
function repOf(id) { return window.REPS.find(r => r.id === id); }
function accountOf(id, scenario) { return scenario.accounts.find(a => a.id === id); }
function contactOf(id, scenario) { return scenario.contacts.find(c => c.id === id); }

function Dashboard({ scenario, currentUser, isFounder, onLogCall, onOpenContact, onOpenOpp, onEditActivity }) {
  const allOpps = scenario.opps;
  const opps = isFounder ? allOpps : allOpps.filter(o => o.ownerId === currentUser.id);
  const open = opps.filter(o => o.stage !== "won" && o.stage !== "lost");
  const won = opps.filter(o => o.stage === "won");
  const lost = opps.filter(o => o.stage === "lost");

  const pipelineValue = open.reduce((s, o) => s + o.value, 0);
  const weightedValue = open.reduce((s, o) => s + o.value * stageOf(o.stage).prob, 0);
  const closedRevenue = won.reduce((s, o) => s + o.value, 0);
  const commissionEarned = won.reduce((s, o) => s + o.value * o.commissionRate, 0);
  const commissionProjected = open.reduce((s, o) => s + o.value * o.commissionRate * stageOf(o.stage).prob, 0);
  const winRate = won.length + lost.length > 0 ? won.length / (won.length + lost.length) : 0;

  const scopeLabel = isFounder ? "Team" : "Mine";

  // Pipeline by stage
  const byStage = window.STAGES.filter(s => s.id !== "lost").map(s => {
    const stageOpps = opps.filter(o => o.stage === s.id);
    return { ...s, count: stageOpps.length, value: stageOpps.reduce((sum, o) => sum + o.value, 0) };

  const maxStageVal = Math.max(...byStage.map(s => s.value), 1);

  const upcomingTasks = scenario.activities.filter(a => a.type === "task" && (isFounder || a.ownerId === currentUser.id));

            <span className="cn-pos">▲ 18.2%</span>
            <span className="cn-kpi-foot-sep">vs Q1</span>
          </div>
        </div>
        <div className="cn-kpi">
          <div className="cn-kpi-eyebrow">{isFounder ? "Team commission" : "Your commission"}</div>
          <div className="cn-kpi-value cn-kpi-value--copper">{fmtUSD(commissionEarned, { compact: true })}</div>
          <div className="cn-kpi-foot">
            <span>Projected +{fmtUSD(commissionProjected, { compact: true })}</span>
          </div>
        </div>
        <div className="cn-kpi">
          <div className="cn-kpi-eyebrow">{scopeLabel} · Win rate</div>
          <div className="cn-kpi-value">{(winRate * 100).toFixed(0)}<span className="cn-kpi-unit">%</span></div>

            </div>

          <div className="cn-stagebars">

                  </span>

                      {acct && <span className="cn-feed-acct">· {acct.name}</span>}

              {open.sort((a, b) => b.value - a.value).slice(0, 6).map((o) => {

function StagePill({ stage }) {

Object.assign(window, { Dashboard, StagePill, fmtUSD, stageOf, repOf, accountOf, contactOf });
