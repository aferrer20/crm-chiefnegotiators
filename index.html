// ── Quick send: a one-off email from a template ────────────────────────────
function QuickSendModal({ template, scenario, currentUser, onClose }) {
  const [recipient, setRecipient] = useState(null);
  const [subject, setSubject] = useState(template.subject || "");
  const [body, setBody] = useState(template.body || "");
  const [imageUrl, setImageUrl] = useState(template.imageUrl || "");
  const [ctaText, setCtaText] = useState(template.ctaText || "");
  const [ctaUrl, setCtaUrl] = useState(template.ctaUrl || "");
  const [signature, setSignature] = useState(() => readSignature());
  const [saveSig, setSaveSig] = useState(false);
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(null);

  const pickContact = (c) => setRecipient({ contact: c, isProspect: false });
  const addProspect = ({ name, email, note }) => {
    const pid = "prospect-" + Math.random().toString(36).slice(2, 9);
    const c = { id: pid, name, email, title: note || "Prospect", accountId: null, tier: "Influencer" };
    scenario.contacts.push(c);
    setRecipient({ contact: c, isProspect: true });
  };

  const ctx = recipient ? {
    first_name: (recipient.contact.name || "").split(" ")[0],
    last_name: (recipient.contact.name || "").split(" ").slice(1).join(" "),
    company: window.accountOf(recipient.contact.accountId, scenario)?.name || "",
    title: recipient.contact.title || "",
    sender_name: currentUser?.fullName || currentUser?.name || "",
  } : { first_name: "Friend", company: "Acme Corp", sender_name: currentUser?.fullName || currentUser?.name || "" };

  const previewSubject = mergeFields(subject, ctx);
  const sigForPreview = signature.trim() ? "\n\n" + mergeFields(signature, ctx) : "";
  const previewBody = mergeFields(body, ctx) + sigForPreview;

  const send = async () => {
    if (!recipient || sending) return;
    if (saveSig) writeSignature(signature);
    setSending(true);
    const finalC = {
      id: newId("c"),
      name: template.name + " → " + recipient.contact.name,
      audienceMode: "manual",
      manualIds: [recipient.contact.id],
      audience: { hasEmail: true },
      subject,
      fromName: currentUser?.fullName || currentUser?.name || "",
      preheader: "",
      body: body + (signature.trim() ? "\n\n" + signature : ""),
      imageUrl,
      ctaText,
      ctaUrl,
      signature,
      kind: "single",
      status: "sent",
      sentAt: new Date().toISOString(),
      events: [],
      createdAt: new Date().toISOString(),
      senderEmail: currentUser?.email || null,
      recipients: [{
        contactId: recipient.contact.id,
        email: recipient.contact.email,
        ctx,
      }],
    };
    let viaResend = false;
    if (window.SEND_VIA_RESEND) {
      try {
        await window.sendCampaignViaResend(finalC, finalC.recipients);
        finalC.viaResend = true;
        viaResend = true;
      } catch (err) {
        console.error("Resend send failed:", err);
        alert("Live send failed — falling back to simulation. Check the console for details.");
        finalC.events = simulateSend(finalC);
      }
    } else {
      finalC.events = simulateSend(finalC);
    }
    saveCampaign(finalC);
    setSending(false);
    setSent({ viaResend, to: recipient.contact });
  };

  return (
    <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 180 }}>
      <div className="cn-modal cn-camp-modal" onClick={e => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">Send email · from template</div>
            <h2 className="cn-modal-title">{template.name}</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>
        <div className="cn-modal-body cn-camp-body">
          {!sent ? (
            <Fragment>
              <div className="cn-field">
                <label>To</label>
                {recipient ? (
                  <div className="cn-qs-to">
                    <span className="cn-avatar cn-avatar--xs">{recipient.contact.name.split(" ").map(n => n[0]).join("").slice(0, 2)}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 500 }}>{recipient.contact.name}</div>
                      <div style={{ color: "var(--cn-mute)", fontSize: 12 }}>{recipient.contact.email || "no email"}</div>
                    </div>
                    <button className="cn-btn cn-btn--ghost" style={{ height: 30, fontSize: 12 }} onClick={() => setRecipient(null)}>Change</button>
                  </div>
                ) : (
                  <QuickRecipientPicker scenario={scenario} onPick={pickContact} onAddProspect={addProspect} />
                )}
              </div>
              <div className="cn-field">
                <label>Subject</label>
                <input className="cn-input" value={subject} onChange={e => setSubject(e.target.value)} />
              </div>
              <div className="cn-field">
                <label>Body</label>
                <textarea className="cn-textarea" style={{ minHeight: 200 }} value={body} onChange={e => setBody(e.target.value)} />
              </div>
              <BannerImagePicker value={imageUrl} onChange={setImageUrl} />
              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>CTA button text</label>
                  <input className="cn-input" value={ctaText} onChange={e => setCtaText(e.target.value)} placeholder="Book a 15-min call" />
                </div>
                <div className="cn-field" style={{ flex: 2 }}>
                  <label>CTA URL</label>
                  <input className="cn-input cn-mono" style={{ fontSize: 12 }} value={ctaUrl} onChange={e => setCtaUrl(e.target.value)} placeholder="https://..." />
                </div>
              </div>
              <SignatureField value={signature} onChange={(s, save) => { setSignature(s); setSaveSig(save); }} />
              <div className="cn-card-eyebrow" style={{ marginTop: 18, marginBottom: 8 }}>Preview</div>
              <div className="cn-email-preview">
                <div className="cn-email-header">
                  <div>
                    <span className="cn-email-from">{currentUser?.fullName || currentUser?.name || "Sender name"}</span>
                    <span className="cn-email-to"> to {recipient?.contact?.email || "—"}</span>
                  </div>
                  <div className="cn-email-subject">{previewSubject || "(no subject)"}</div>
                </div>
                <div className="cn-email-body">
                  {imageUrl && (
                    <div className="cn-email-image">
                      <img src={imageUrl} alt="" onError={(e) => { e.target.style.display = "none"; e.target.nextSibling.style.display = "block"; }} />
                      <div className="cn-email-image-fallback">⊞ Banner image (preview failed — will still send)</div>
                    </div>
                  )}
                  <div className="cn-email-text">{previewBody || "(empty body)"}</div>
                  {ctaText && (
                    <div style={{ textAlign: "center", margin: "24px 0 8px" }}>
                      <a href={ctaUrl || "#"} className="cn-email-cta" onClick={e => e.preventDefault()}>{ctaText}</a>
                    </div>
                  )}
                </div>
              </div>
            </Fragment>
          ) : (
            <div style={{ textAlign: "center", padding: "40px 10px" }}>
              <div className="cn-success-tick" style={{ display: "inline-flex", marginBottom: 14, width: 48, height: 48, fontSize: 22 }}>✓</div>
              <h3 style={{ fontFamily: "var(--cn-serif)", fontSize: 24, margin: "0 0 8px" }}>Email sent to {sent.to.name}</h3>
              <div style={{ color: "var(--cn-mute)", fontSize: 13 }}>
                {sent.viaResend ? "Delivered live via Resend — tracking opens and clicks." : "Simulated send — analytics will appear in Campaigns."}
              </div>
            </div>
          )}
        </div>
        <footer className="cn-modal-foot">
          {!sent ? (
            <Fragment>
              <button className="cn-btn cn-btn--ghost" onClick={onClose} disabled={sending}>Cancel</button>
              <div style={{ marginLeft: "auto" }}>
                <button
                  className="cn-btn cn-btn--primary"
                  onClick={send}
                  disabled={sending || !recipient || !subject || !body}
                  title={!recipient ? "Pick a recipient first" : ""}
                >
                  {sending ? (<Fragment><span className="cn-spinner"></span>Sending…</Fragment>) : "Send email →"}
                </button>
              </div>
            </Fragment>
          ) : (
            <button className="cn-btn cn-btn--primary" style={{ marginLeft: "auto" }} onClick={onClose}>Done</button>
          )}
        </footer>
      </div>
    </div>
  );
}

      )}
      <button className="cn-rp-add-prospect" onClick={() => setShowProspect(true)} type="button">
        + Send to a prospect not in CRM

    </div>
  );

}

function saveDoc(doc) {
  const list = readDocs();
  const idx = list.findIndex(d => d.id === doc.id);
  const stamped = { ...doc, updatedAt: new Date().toISOString() };
  if (idx >= 0) list[idx] = stamped; else list.unshift(stamped);
  writeDocs(list);
  return list;
}

function deleteDoc(id) {
  const list = readDocs().filter(d => d.id !== id);
  writeDocs(list);
  return list;
}

// ─── Helpers ────────────────────────────────────────────────────────────────
function fileIcon(typeOrName) {
  const t = (typeOrName || "").toLowerCase();
  if (t.includes("pdf")) return "📕";
  if (t.includes("word") || t.endsWith(".doc") || t.endsWith(".docx") || t.includes("officedocument.wordprocessing")) return "📘";
  if (t.includes("sheet") || t.endsWith(".xls") || t.endsWith(".xlsx") || t.includes("officedocument.spreadsheet")) return "📗";
  if (t.includes("presentation") || t.endsWith(".ppt") || t.endsWith(".pptx")) return "📙";
  if (t.includes("image")) return "🖼";
  if (t.includes("video")) return "🎬";
  return "📄";
}

function formatBytes(n) {
  if (!n && n !== 0) return "";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / 1024 / 1024).toFixed(1) + " MB";
}

function dateAgo(iso) {
  if (!iso) return "—";
  const ms = Date.now() - new Date(iso).getTime();
  const d = Math.floor(ms / 86_400_000);
  if (d < 1) return "today";
  if (d === 1) return "yesterday";
  if (d < 30) return d + " days ago";
  if (d < 365) return Math.floor(d / 30) + " months ago";
  return Math.floor(d / 365) + " years ago";
}

function isInlineable(typeOrName) {
  const t = (typeOrName || "").toLowerCase();
  return t.includes("pdf") || t.includes("image") || /\.(png|jpg|jpeg|gif|webp|svg)$/.test(t);
}

// Returns a Promise<string> resolving to a blob URL. For data URLs, returns
// the data URL directly. Caller is responsible for revoking blob URLs.
async function resolveDocBlobURL(doc) {
  if (doc.kind === "file" && doc.data) {
    // Convert data: URL to a proper blob so iframes don't refuse to render it.
    const res = await fetch(doc.data);
    const blob = await res.blob();
    const typed = new Blob([blob], { type: doc.fileType || blob.type || "application/octet-stream" });
    return URL.createObjectURL(typed);
  }
  if (doc.kind === "url" && doc.url) {
    const isAbsolute = /^https?:\/\//i.test(doc.url);
    if (isAbsolute) return doc.url; // outside link, just use as-is
    const r = await fetch(doc.url);
    if (!r.ok) throw new Error("Couldn't load (" + r.status + ")");
    const blob = await r.blob();
    const typed = new Blob([blob], { type: doc.fileType || blob.type || "application/octet-stream" });
    return URL.createObjectURL(typed);
  }
  throw new Error("Nothing to open");
}

function downloadDoc(doc) {
  const trigger = (href, revoke) => {
    const a = document.createElement("a");
    a.href = href;
    a.download = doc.fileName || doc.title;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      a.remove();
      if (revoke) URL.revokeObjectURL(href);
    }, 800);
  };
  if (doc.kind === "file" && doc.data) { trigger(doc.data, false); return; }
  if (doc.kind === "url" && doc.url) {
    const isAbsolute = /^https?:\/\//i.test(doc.url);
    if (isAbsolute) { trigger(doc.url, false); return; }
    fetch(doc.url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.blob(); })
      .then(blob => {
        const objURL = URL.createObjectURL(new Blob([blob], { type: doc.fileType || blob.type }));
        trigger(objURL, true);
      })
      .catch(err => alert("Couldn't download: " + (err.message || err)));
  }
}

// ─── Inline document viewer ─────────────────────────────────────────────────
function DocumentViewer({ doc, onClose }) {
  const [status, setStatus] = useState("loading"); // "loading" | "ready" | "unsupported" | "error"
  const [blobURL, setBlobURL] = useState(null);
  const [errMsg, setErrMsg] = useState("");

  useEffect(() => {
    let url = null;
    let cancelled = false;
    if (!isInlineable(doc.fileType || doc.fileName)) {
      setStatus("unsupported");
      return;
    }
    resolveDocBlobURL(doc)
      .then(u => {
        if (cancelled) { if (u && u.startsWith("blob:")) URL.revokeObjectURL(u); return; }
        url = u; setBlobURL(u); setStatus("ready");
      })
      .catch(e => {
        if (cancelled) return;
        setErrMsg(e.message || String(e));
        setStatus("error");
      });
    return () => {
      cancelled = true;
      if (url && url.startsWith("blob:")) URL.revokeObjectURL(url);
    };
  }, [doc.id]);

  // Keyboard: Esc closes
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  const ext = (doc.fileName || "").split(".").pop().toUpperCase();
  const isImage = (doc.fileType || "").includes("image") || /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(doc.fileName || "");

  return (
    <div className="cn-modal-scrim cn-doc-viewer-scrim" onClick={onClose} style={{ zIndex: 180 }}>
      <div className="cn-doc-viewer" onClick={(e) => e.stopPropagation()}>
        <header className="cn-doc-viewer-head">
          <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0, flex: 1 }}>
            <span style={{ fontSize: 22 }}>{fileIcon(doc.fileType || doc.fileName)}</span>
            <div style={{ minWidth: 0 }}>
              <div className="cn-doc-viewer-title">{doc.title}</div>
              <div className="cn-doc-viewer-sub">
                <span className="cn-mono" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.04 }}>{ext}</span>
                {doc.fileSize ? <span> · {formatBytes(doc.fileSize)}</span> : null}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="cn-btn cn-btn--ghost" style={{ height: 32 }} onClick={() => downloadDoc(doc)}>⤓ Download</button>
            <button className="cn-icon-btn" onClick={onClose} title="Close (Esc)">✕</button>
          </div>
        </header>
        <div className="cn-doc-viewer-body">
          {status === "loading" && (
            <div className="cn-doc-viewer-msg">
              <div className="cn-spinner" style={{ borderColor: "var(--cn-mute)", borderTopColor: "var(--cn-copper)" }}></div>
              <div>Loading…</div>
            </div>
          )}
          {status === "ready" && blobURL && (
            isImage
              ? <img src={blobURL} alt={doc.title} style={{ maxWidth: "100%", maxHeight: "100%", margin: "auto", display: "block" }} />
              : <iframe src={blobURL} title={doc.title} style={{ border: 0, width: "100%", height: "100%" }} />
          )}
          {status === "unsupported" && (
            <div className="cn-doc-viewer-msg">
              <div style={{ fontSize: 40 }}>{fileIcon(doc.fileType || doc.fileName)}</div>
              <div className="cn-doc-viewer-msg-title">No in-app preview for {ext} files</div>
              <div className="cn-doc-viewer-msg-sub">Word & Excel docs can't render in the browser. Download to open in their native app.</div>
              <button className="cn-btn cn-btn--primary" style={{ marginTop: 14 }} onClick={() => downloadDoc(doc)}>⤓ Download {doc.fileName || doc.title}</button>
            </div>
          )}
          {status === "error" && (
            <div className="cn-doc-viewer-msg">
              <div style={{ fontSize: 32, color: "var(--cn-neg)" }}>!</div>
              <div className="cn-doc-viewer-msg-title">Couldn't load this document</div>
              <div className="cn-doc-viewer-msg-sub">{errMsg}</div>
              <button className="cn-btn cn-btn--ghost" style={{ marginTop: 14 }} onClick={() => downloadDoc(doc)}>Try downloading instead</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Main screen ────────────────────────────────────────────────────────────
function DocumentsScreen({ scenario, currentUser, onOpenContact, onOpenOpp }) {
  const [docs, setDocs] = useState(() => readDocs());
  const [q, setQ] = useState("");
  const [activeCat, setActiveCat] = useState("all");
  const [editing, setEditing] = useState(null); // doc object or {category} for new
  const [viewing, setViewing] = useState(null); // doc currently open in the viewer

  const refresh = () => setDocs(readDocs());

  const search = q.trim().toLowerCase();
  const filtered = docs.filter(d => {
    if (activeCat !== "all" && d.category !== activeCat) return false;
    if (!search) return true;
    return (
      (d.title || "").toLowerCase().includes(search) ||
      (d.description || "").toLowerCase().includes(search) ||
      (d.fileName || "").toLowerCase().includes(search)
    );
  });

  // Sort: newest first
  filtered.sort((a, b) => new Date(b.updatedAt || b.uploadedAt || 0) - new Date(a.updatedAt || a.uploadedAt || 0));

  // Count per category for the rail
  const counts = {};
  docs.forEach(d => { counts[d.category] = (counts[d.category] || 0) + 1; });

  const handleDelete = (doc) => {
    if (!confirm(`Delete “${doc.title}”? This can't be undone.`)) return;
    setDocs(deleteDoc(doc.id));
  };

  const handleSave = (doc) => {
    setDocs(saveDoc(doc));
    setEditing(null);
  };

  return (
    <div className="cn-page" style={{ padding: 0, gap: 20 }}>
      <header className="cn-docs-head">
        <div>
          <div className="cn-card-eyebrow">Sales documents</div>
          <h2 className="cn-card-title" style={{ marginTop: 4 }}>Everything the team needs to close</h2>
          <p style={{ color: "var(--cn-mute)", margin: "6px 0 0", maxWidth: 580, fontSize: 13.5 }}>
            Playbooks, BOMs, compliance, contracts. Anyone on the team can upload, edit, or attach a doc to a deal.
          </p>
        </div>
        <div className="cn-docs-head-actions">
          <input
            className="cn-input"
            placeholder="Search documents…"
            value={q}
            onChange={(e) => setQ(e.target.value)}
            style={{ width: 240 }}
          />
          <button className="cn-btn cn-btn--primary" onClick={() => setEditing({ id: null, category: activeCat === "all" ? "playbooks" : activeCat })}>+ New document</button>
        </div>
      </header>

      <div className="cn-docs-layout">
        <aside className="cn-docs-rail">
          <button
            className={`cn-docs-rail-item ${activeCat === "all" ? "is-active" : ""}`}
            onClick={() => setActiveCat("all")}
          >
            <span className="cn-docs-rail-icon">⌘</span>
            <span className="cn-docs-rail-label">All documents</span>
            <span className="cn-docs-rail-count">{docs.length}</span>
          </button>
          {DOC_CATEGORIES.map(cat => (
            <button
              key={cat.id}
              className={`cn-docs-rail-item ${activeCat === cat.id ? "is-active" : ""}`}
              onClick={() => setActiveCat(cat.id)}
            >
              <span className="cn-docs-rail-icon">{cat.icon}</span>
              <span className="cn-docs-rail-label">{cat.label}</span>
              <span className="cn-docs-rail-count">{counts[cat.id] || 0}</span>
            </button>
          ))}
        </aside>

        <section className="cn-docs-main">
          {filtered.length === 0 ? (
            <div className="cn-docs-empty">
              <div className="cn-docs-empty-title">
                {search ? "No documents match." : "No documents in this category yet."}
              </div>
              <div className="cn-docs-empty-sub">Upload one to get started.</div>
              <button className="cn-btn cn-btn--primary" style={{ marginTop: 14 }} onClick={() => setEditing({ id: null, category: activeCat === "all" ? "playbooks" : activeCat })}>+ Upload document</button>
            </div>
          ) : (
            activeCat === "all" ? (
              // Group by category when showing all
              DOC_CATEGORIES.map(cat => {
                const inCat = filtered.filter(d => d.category === cat.id);
                if (inCat.length === 0) return null;
                return (
                  <div key={cat.id} className="cn-docs-group">
                    <div className="cn-docs-group-head">
                      <span className="cn-docs-group-icon">{cat.icon}</span>
                      <h3 className="cn-docs-group-title">{cat.label}</h3>
                      <span className="cn-docs-group-count">{inCat.length}</span>
                    </div>
                    <div className="cn-docs-grid">
                      {inCat.map(doc => (
                        <DocumentCard
                          key={doc.id}
                          doc={doc}
                          scenario={scenario}
                          onOpen={() => setViewing(doc)}
                          onEdit={() => setEditing(doc)}
                          onDelete={() => handleDelete(doc)}
                          onOpenContact={onOpenContact}
                          onOpenOpp={onOpenOpp}
                        />
                      ))}
                    </div>
                  </div>
                );
              })
            ) : (
              <div className="cn-docs-grid">
                {filtered.map(doc => (
                  <DocumentCard
                    key={doc.id}
                    doc={doc}
                    scenario={scenario}
                    onOpen={() => setViewing(doc)}
                    onEdit={() => setEditing(doc)}
                    onDelete={() => handleDelete(doc)}
                    onOpenContact={onOpenContact}
                    onOpenOpp={onOpenOpp}
                  />
                ))}
              </div>
            )
          )}
        </section>
      </div>

      {editing && (
        <DocumentEditor
          doc={editing}
          scenario={scenario}
          currentUser={currentUser}
          onClose={() => setEditing(null)}
          onSave={handleSave}
        />
      )}
      {viewing && (
        <DocumentViewer doc={viewing} onClose={() => setViewing(null)} />
      )}
    </div>
  );
}

// ─── Document card ──────────────────────────────────────────────────────────
function DocumentCard({ doc, scenario, onOpen, onEdit, onDelete, onOpenContact, onOpenOpp }) {
  const attachments = doc.attachments || [];
  return (
    <article className="cn-doc-card">
      <div className="cn-doc-card-head">
        <div className="cn-doc-icon">{fileIcon(doc.fileType || doc.fileName || "")}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <button className="cn-doc-title" onClick={onOpen} title="Open">
            {doc.title}
          </button>
          <div className="cn-doc-meta">
            <span className="cn-mono" style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.04 }}>
              {(doc.fileName || "").split(".").pop() || "—"}
            </span>
            {doc.fileSize ? <span> · {formatBytes(doc.fileSize)}</span> : null}
            <span> · {dateAgo(doc.updatedAt || doc.uploadedAt)}</span>
          </div>
        </div>
      </div>

      {doc.description && <p className="cn-doc-desc">{doc.description}</p>}

      {attachments.length > 0 && (
        <div className="cn-doc-attachments">
          <div className="cn-card-eyebrow" style={{ marginBottom: 4 }}>Attached to</div>
          <div className="cn-doc-att-chips">
            {attachments.map((a, i) => {
              let label = "";
              let onClick = null;
              if (a.kind === "contact") {
                const c = scenario.contacts.find(x => x.id === a.id);
                if (!c) return null;
                label = "◉ " + c.name;
                onClick = () => onOpenContact && onOpenContact(c.id);
              } else if (a.kind === "opp") {
                const o = scenario.opps.find(x => x.id === a.id);
                if (!o) return null;
                label = "▤ " + o.title;
                onClick = () => onOpenOpp && onOpenOpp(o.id);
              } else if (a.kind === "account") {
                const acc = scenario.accounts.find(x => x.id === a.id);
                if (!acc) return null;
                label = "▢ " + acc.name;
              }
              return (
                <button key={i} className="cn-doc-att-chip" onClick={onClick} disabled={!onClick}>{label}</button>
              );
            })}
          </div>
        </div>
      )}

      <footer className="cn-doc-card-foot">
        <button className="cn-btn cn-btn--ghost" style={{ height: 30, fontSize: 12 }} onClick={onOpen}>Open</button>
        <button className="cn-btn cn-btn--ghost" style={{ height: 30, fontSize: 12 }} onClick={() => downloadDoc(doc)}>Download</button>
        <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
          <button className="cn-icon-btn" onClick={onEdit} title="Edit">✎</button>
          <button className="cn-icon-btn cn-icon-btn--danger" onClick={onDelete} title="Delete">✕</button>
        </div>
      </footer>
    </article>
  );
}

// ─── Editor / uploader modal ────────────────────────────────────────────────
function DocumentEditor({ doc, scenario, currentUser, onClose, onSave }) {
  const isNew = !doc.id;
  const [draft, setDraft] = useState({
    id: doc.id || ("ud-" + Math.random().toString(36).slice(2, 10)),
    title: doc.title || "",
    description: doc.description || "",
    category: doc.category || "playbooks",
    kind: doc.kind || (doc.url ? "url" : "file"),
    url: doc.url || "",
    data: doc.data || "",
    fileName: doc.fileName || "",
    fileType: doc.fileType || "",
    fileSize: doc.fileSize || 0,
    uploaderName: doc.uploaderName || currentUser?.name || "",
    uploadedAt: doc.uploadedAt || new Date().toISOString(),
    attachments: doc.attachments || [],
  });
  const [err, setErr] = useState(null);
  const dropRef = useRef(null);

  const update = (patch) => setDraft(d => ({ ...d, ...patch }));

  const handleFile = (f) => {
    if (!f) return;
    setErr(null);
    if (f.size > 8 * 1024 * 1024) {
      setErr("Files over 8MB can't be stored in-browser. Try compressing the PDF or use the external link option.");
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      update({
        kind: "file",
        data: reader.result,
        fileName: f.name,
        fileType: f.type || "",
        fileSize: f.size,
        title: draft.title || f.name.replace(/\.[^.]+$/, ""),
      });
    };
    reader.onerror = () => setErr("Couldn't read that file.");
    reader.readAsDataURL(f);
  };

  const onDrop = (e) => {
    e.preventDefault();
    dropRef.current?.classList.remove("is-over");
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) handleFile(f);
  };

  const save = () => {
    if (!draft.title.trim()) { setErr("Give it a title."); return; }
    if (draft.kind === "file" && !draft.data && isNew) { setErr("Upload a file or switch to external link."); return; }
    if (draft.kind === "url" && !draft.url.trim()) { setErr("Paste a URL or switch to file upload."); return; }
    onSave(draft);
  };

  const toggleAttachment = (kind, id) => {
    const exists = draft.attachments.find(a => a.kind === kind && a.id === id);
    if (exists) {
      update({ attachments: draft.attachments.filter(a => !(a.kind === kind && a.id === id)) });
    } else {
      update({ attachments: [...draft.attachments, { kind, id }] });
    }
  };

  return (
    <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 160 }}>
      <div className="cn-modal" style={{ maxWidth: 720, maxHeight: "88vh", display: "flex", flexDirection: "column" }} onClick={(e) => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">{isNew ? "Upload" : "Edit"} document</div>
            <h2 className="cn-modal-title">{draft.title || "Untitled document"}</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>
        <div className="cn-modal-body" style={{ overflow: "auto" }}>
          <div className="cn-field-row">
            <div className="cn-field" style={{ flex: 2 }}>
              <label>Title</label>
              <input className="cn-input" value={draft.title} onChange={(e) => update({ title: e.target.value })} autoFocus />
            </div>
            <div className="cn-field" style={{ flex: 1 }}>
              <label>Category</label>
              <select className="cn-input" value={draft.category} onChange={(e) => update({ category: e.target.value })}>
                {DOC_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </div>
          </div>
          <div className="cn-field">
            <label>Description <span style={{ color: "var(--cn-mute)", textTransform: "none", letterSpacing: 0, fontSize: 11 }}>· optional, helps the team find it</span></label>
            <textarea className="cn-textarea" style={{ minHeight: 70 }} value={draft.description} onChange={(e) => update({ description: e.target.value })} placeholder="What's in this doc? When should it be used?" />
          </div>

          <div className="cn-field">
            <label>Source</label>
            <div className="cn-doc-source-tabs">
              <button className={`cn-doc-source-tab ${draft.kind === "file" ? "is-active" : ""}`} onClick={() => update({ kind: "file" })}>⤴ Upload file</button>
              <button className={`cn-doc-source-tab ${draft.kind === "url" ? "is-active" : ""}`} onClick={() => update({ kind: "url" })}>🔗 External link</button>
            </div>
          </div>

          {draft.kind === "file" ? (
            <div
              ref={dropRef}
              className="cn-doc-drop"
              onDragOver={(e) => { e.preventDefault(); dropRef.current?.classList.add("is-over"); }}
              onDragLeave={() => dropRef.current?.classList.remove("is-over")}
              onDrop={onDrop}
              onClick={() => document.getElementById("cn-doc-file-input")?.click()}
            >
              {draft.data || (!isNew && draft.url) ? (
                <div className="cn-doc-drop-have">
                  <span className="cn-doc-drop-icon">{fileIcon(draft.fileType || draft.fileName)}</span>
                  <div>
                    <div className="cn-doc-drop-name">{draft.fileName || "Existing file"}</div>
                    <div className="cn-doc-drop-meta">
                      {draft.fileType && <span>{draft.fileType}</span>}
                      {draft.fileSize ? <span> · {formatBytes(draft.fileSize)}</span> : null}
                    </div>
                  </div>
                  <button className="cn-btn cn-btn--ghost" style={{ height: 30, marginLeft: "auto" }} onClick={(e) => { e.stopPropagation(); document.getElementById("cn-doc-file-input")?.click(); }}>Replace</button>
                </div>
              ) : (
                <div className="cn-doc-drop-empty">
                  <div className="cn-doc-drop-icon-lg">⤴</div>
                  <div className="cn-doc-drop-title">Drop a file here or click to upload</div>
                  <div className="cn-doc-drop-sub">PDF, DOCX, XLSX, images, etc. Max ~8MB.</div>
                </div>
              )}
              <input
                id="cn-doc-file-input"
                type="file"
                style={{ display: "none" }}
                onChange={(e) => handleFile(e.target.files?.[0])}
              />
            </div>
          ) : (
            <div className="cn-field">
              <label>External URL</label>
              <input className="cn-input cn-mono" style={{ fontSize: 12.5 }} value={draft.url} onChange={(e) => update({ url: e.target.value })} placeholder="https://drive.google.com/..." />
              <div className="cn-field-help">Anyone with the link should be able to open it. Use this for big files, Google Docs, Notion pages, etc.</div>
            </div>
          )}

          <div className="cn-field" style={{ marginTop: 18 }}>
            <label>Attach to</label>
            <DocAttachmentPicker
              attachments={draft.attachments}
              onToggle={toggleAttachment}
              scenario={scenario}
            />
          </div>

          {err && <div className="cn-login-error" style={{ marginTop: 12 }}>{err}</div>}
        </div>
        <footer className="cn-modal-foot">
          <button className="cn-btn cn-btn--ghost" onClick={onClose}>Cancel</button>
          <div style={{ marginLeft: "auto" }}>
            <button className="cn-btn cn-btn--primary" onClick={save}>{isNew ? "Upload document" : "Save changes"}</button>
          </div>
        </footer>
      </div>
    </div>
  );
}

// ─── Attachment picker ──────────────────────────────────────────────────────
function DocAttachmentPicker({ attachments, onToggle, scenario }) {
  const [q, setQ] = useState("");
  const search = q.trim().toLowerCase();

  const matchedOpps = !search ? [] : scenario.opps.filter(o => (o.title || "").toLowerCase().includes(search)).slice(0, 5);
  const matchedContacts = !search ? [] : scenario.contacts.filter(c => (c.name || "").toLowerCase().includes(search) || (c.email || "").toLowerCase().includes(search)).slice(0, 5);
  const matchedAccounts = !search ? [] : scenario.accounts.filter(a => (a.name || "").toLowerCase().includes(search)).slice(0, 5);

  const isAttached = (kind, id) => !!attachments.find(a => a.kind === kind && a.id === id);

  return (
    <div className="cn-doc-attach-picker">
      <input
        className="cn-input"
        placeholder="Search deals, contacts, or accounts to attach…"
        value={q}
        onChange={(e) => setQ(e.target.value)}
      />
      {search && (matchedOpps.length + matchedContacts.length + matchedAccounts.length === 0) && (
        <div style={{ color: "var(--cn-mute)", fontSize: 12.5, padding: "8px 4px" }}>No matches.</div>
      )}
      {matchedOpps.length > 0 && (
        <div className="cn-doc-attach-group">
          <div className="cn-card-eyebrow">Deals</div>
          {matchedOpps.map(o => (
            <button key={o.id} className={`cn-doc-attach-row ${isAttached("opp", o.id) ? "is-on" : ""}`} onClick={() => onToggle("opp", o.id)}>
              <span>▤ {o.title}</span>
              <span className="cn-doc-attach-tag">{isAttached("opp", o.id) ? "✓ Attached" : "+ Attach"}</span>
            </button>
          ))}
        </div>
      )}
      {matchedContacts.length > 0 && (
        <div className="cn-doc-attach-group">
          <div className="cn-card-eyebrow">Contacts</div>
          {matchedContacts.map(c => (
            <button key={c.id} className={`cn-doc-attach-row ${isAttached("contact", c.id) ? "is-on" : ""}`} onClick={() => onToggle("contact", c.id)}>
              <span>◉ {c.name} <span style={{ color: "var(--cn-mute)", fontSize: 11.5 }}>{c.email || ""}</span></span>
              <span className="cn-doc-attach-tag">{isAttached("contact", c.id) ? "✓ Attached" : "+ Attach"}</span>
            </button>
          ))}
        </div>
      )}
      {matchedAccounts.length > 0 && (
        <div className="cn-doc-attach-group">
          <div className="cn-card-eyebrow">Accounts</div>
          {matchedAccounts.map(a => (
            <button key={a.id} className={`cn-doc-attach-row ${isAttached("account", a.id) ? "is-on" : ""}`} onClick={() => onToggle("account", a.id)}>
              <span>▢ {a.name}</span>
              <span className="cn-doc-attach-tag">{isAttached("account", a.id) ? "✓ Attached" : "+ Attach"}</span>
            </button>
          ))}
        </div>
      )}
      {attachments.length > 0 && (
        <div className="cn-doc-attach-current">
          <div className="cn-card-eyebrow" style={{ marginBottom: 6 }}>Currently attached</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {attachments.map((a, i) => {
              let label = "";
              if (a.kind === "contact") label = "◉ " + (scenario.contacts.find(x => x.id === a.id)?.name || "unknown");
              if (a.kind === "opp") label = "▤ " + (scenario.opps.find(x => x.id === a.id)?.title || "unknown");
              if (a.kind === "account") label = "▢ " + (scenario.accounts.find(x => x.id === a.id)?.name || "unknown");
              return (
                <span key={i} className="cn-doc-attach-pill">
                  {label}
                  <button onClick={() => onToggle(a.kind, a.id)} title="Remove">✕</button>
                </span>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { DocumentsScreen, DocumentCard, DocumentEditor, DocumentViewer, DocAttachmentPicker, readDocs, saveDoc, deleteDoc });

</script>
<script type="text/babel" data-source="prospecting.jsx">
// Prospecting: build & work prospect lists.
// A "prospect" is someone you're chasing but haven't engaged yet —
// not yet a Contact in the CRM. They live in lightweight lists,
// organized by job function / vertical / custom tags, exportable to
// CSV/Excel, sendable as an email campaign (single or in bulk).

const PL_KEY = "cn-prospect-lists";

function readLists() {
  try { return JSON.parse(localStorage.getItem(PL_KEY) || "[]"); }
  catch { return []; }
}
function writeLists(lists) { localStorage.setItem(PL_KEY, JSON.stringify(lists)); }
function saveProspectList(list) {
  const all = readLists();
  const idx = all.findIndex(l => l.id === list.id);
  const stamped = { ...list, updatedAt: new Date().toISOString() };
  if (idx >= 0) all[idx] = stamped; else all.unshift(stamped);
  writeLists(all);
  return all;
}
function deleteProspectList(id) {
  const all = readLists().filter(l => l.id !== id);
  writeLists(all);
  return all;
}

const _pNewId = (p) => p + "-" + Math.random().toString(36).slice(2, 10);

const JOB_FUNCTIONS = ["Procurement", "Engineering", "IT", "Executive", "Finance", "Operations", "Marketing", "Sales", "Other"];
const VERTICALS = ["Cloud / Compute", "Finance / Trading", "Healthcare", "Media / Entertainment", "Defense", "Telecom", "Education", "Research", "Other"];

window.cnProspects = { readLists, writeLists, saveProspectList, deleteProspectList, JOB_FUNCTIONS, VERTICALS };

// ─── Main screen ────────────────────────────────────────────────────────────
function ProspectingScreen({ scenario, currentUser }) {
  const [lists, setLists] = useState(() => readLists());
  const [activeListId, setActiveListId] = useState(() => readLists()[0]?.id || null);
  const [creatingNew, setCreatingNew] = useState(false);

  const activeList = lists.find(l => l.id === activeListId);

  const createList = (name) => {
    const list = { id: _pNewId("pl"), name, createdAt: new Date().toISOString(), prospects: [] };
    setLists(saveProspectList(list));
    setActiveListId(list.id);
  };

  const updateList = (patch) => {
    if (!activeList) return;
    setLists(saveProspectList({ ...activeList, ...patch }));
  };

  const removeList = (id) => {
    if (!confirm("Delete this prospect list? This can't be undone.")) return;
    const next = deleteProspectList(id);
    setLists(next);
    if (activeListId === id) setActiveListId(next[0]?.id || null);
  };

  return (
    <div className="cn-page" style={{ padding: 0, gap: 20 }}>
      <header className="cn-docs-head">
        <div>
          <div className="cn-card-eyebrow">Prospecting</div>
          <h2 className="cn-card-title" style={{ marginTop: 4 }}>People you're chasing</h2>

// ─── List view ──────────────────────────────────────────────────────────────
function ProspectListView({ list, scenario, currentUser, onUpdate, onDelete }) {
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [groupBy, setGroupBy] = useState("none");
  const [search, setSearch] = useState("");
  const [addingProspect, setAddingProspect] = useState(false);
  const [bulkPasteOpen, setBulkPasteOpen] = useState(false);
  const [campaignOpen, setCampaignOpen] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [draftName, setDraftName] = useState(list.name);

  const prospects = list.prospects || [];

  const filtered = prospects.filter(p => {
    if (!search) return true;
    const s = search.toLowerCase();
    return (p.name || "").toLowerCase().includes(s)
      || (p.email || "").toLowerCase().includes(s)
      || (p.company || "").toLowerCase().includes(s)
      || (p.title || "").toLowerCase().includes(s);
  });

  const groups = (() => {
    if (groupBy === "none") return [{ key: null, items: filtered }];
    const map = {};
    filtered.forEach(p => {
      const key = groupBy === "tags"
        ? (p.tags?.[0] || "Untagged")
        : (p[groupBy] || "Unspecified");
      (map[key] = map[key] || []).push(p);
    });
    return Object.entries(map)
      .map(([key, items]) => ({ key, items }))
      .sort((a, b) => a.key.localeCompare(b.key));
  })();

  const allChecked = filtered.length > 0 && filtered.every(p => selectedIds.has(p.id));
  const toggleAll = () => {
    if (allChecked) setSelectedIds(new Set());
    else setSelectedIds(new Set(filtered.map(p => p.id)));
  };
  const toggle = (id) => {
    const next = new Set(selectedIds);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedIds(next);
  };

  const addProspect = (p) => {
    const np = { id: _pNewId("p"), addedAt: new Date().toISOString(), ...p };
    onUpdate({ prospects: [np, ...prospects] });
    setAddingProspect(false);
  };

  const updateProspect = (id, patch) => {
    onUpdate({ prospects: prospects.map(p => p.id === id ? { ...p, ...patch } : p) });
  };

  const removeProspect = (id) => {
    if (!confirm("Remove this prospect from the list?")) return;
    onUpdate({ prospects: prospects.filter(p => p.id !== id) });
    setSelectedIds(prev => { const n = new Set(prev); n.delete(id); return n; });
  };

  const addBulk = (rows) => {
    const newProspects = rows.map(r => ({ ...r, id: _pNewId("p"), addedAt: new Date().toISOString() }));
    onUpdate({ prospects: [...newProspects, ...prospects] });
    setBulkPasteOpen(false);
  };

  const downloadCsv = () => {
    const rows = selectedIds.size > 0 ? prospects.filter(p => selectedIds.has(p.id)) : prospects;
    if (rows.length === 0) return;
    const headers = ["Name", "Email", "Title", "Company", "Phone", "Job function", "Vertical", "Tags", "Added"];
    const esc = (v) => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`;
    const lines = [headers.join(",")];
    rows.forEach(p => {
      lines.push([
        esc(p.name), esc(p.email), esc(p.title), esc(p.company), esc(p.phone),
        esc(p.jobFunction), esc(p.vertical), esc((p.tags || []).join("; ")),
        esc(p.addedAt ? new Date(p.addedAt).toLocaleDateString() : ""),
      ].join(","));
    });
    const csv = "\uFEFF" + lines.join("\n"); // BOM so Excel reads UTF-8
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${list.name.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const renameList = () => {
    const n = draftName.trim();
    if (!n) { setDraftName(list.name); setEditingName(false); return; }
    onUpdate({ name: n });
    setEditingName(false);
  };

  const sendCampaign = () => {
    const rows = selectedIds.size > 0
      ? prospects.filter(p => selectedIds.has(p.id) && p.email)
      : prospects.filter(p => p.email);
    if (rows.length === 0) {
      alert("None of the selected prospects have an email address.");
      return;
    }
    setCampaignOpen({ recipients: rows });
  };

  const totalSel = selectedIds.size;
  const targetCount = totalSel > 0 ? totalSel : prospects.length;
  const targetVerb = totalSel > 0 ? "selected" : "all";

  return (
    <div className="cn-prospect-listview">
      <header className="cn-prospect-listhead">
        <div style={{ flex: 1, minWidth: 0 }}>
          {editingName ? (
            <form onSubmit={(e) => { e.preventDefault(); renameList(); }} style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <input
                className="cn-input"
                value={draftName}
                onChange={(e) => setDraftName(e.target.value)}
                autoFocus
                onBlur={renameList}
                style={{ maxWidth: 320, fontSize: 16, fontWeight: 500 }}
              />
            </form>
          ) : (
            <h2
              className="cn-card-title"
              onClick={() => { setDraftName(list.name); setEditingName(true); }}
              style={{ cursor: "pointer", margin: 0 }}
              title="Click to rename"
            >{list.name}</h2>
          )}
          <div style={{ color: "var(--cn-mute)", fontSize: 12.5, marginTop: 4 }}>
            {prospects.length} prospect{prospects.length === 1 ? "" : "s"}
            {totalSel > 0 && <span> · {totalSel} selected</span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
          <input
            className="cn-input"
            placeholder="Search…"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            style={{ width: 180 }}
          />
          <select
            className="cn-input"
            value={groupBy}
            onChange={(e) => setGroupBy(e.target.value)}
            style={{ width: 170 }}
          >
            <option value="none">No grouping</option>
            <option value="jobFunction">Group by function</option>
            <option value="vertical">Group by vertical</option>
            <option value="tags">Group by tag</option>
          </select>
          <button className="cn-btn cn-btn--danger" onClick={onDelete}>Delete list</button>
        </div>
      </header>

      <div className="cn-prospect-toolbar">
        <div style={{ display: "flex", gap: 8 }}>
          <button className="cn-btn cn-btn--primary" onClick={() => setAddingProspect(true)}>+ Add prospect</button>
          <button className="cn-btn cn-btn--ghost" onClick={() => setBulkPasteOpen(true)}>↗ Bulk paste</button>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button className="cn-btn cn-btn--ghost" onClick={downloadCsv} disabled={prospects.length === 0}>
            ⤓ Download {targetCount} as Excel/CSV
          </button>
          <button className="cn-btn cn-btn--primary" onClick={sendCampaign} disabled={prospects.length === 0}>
            ✉ Email {targetCount} {targetVerb}
          </button>
        </div>
      </div>

      {prospects.length === 0 ? (
        <div className="cn-docs-empty">
          <div className="cn-docs-empty-title">No prospects yet</div>
          <div className="cn-docs-empty-sub">Add one manually, or paste a list from a spreadsheet.</div>
          <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 14 }}>
            <button className="cn-btn cn-btn--primary" onClick={() => setAddingProspect(true)}>+ Add prospect</button>
            <button className="cn-btn cn-btn--ghost" onClick={() => setBulkPasteOpen(true)}>↗ Bulk paste</button>
          </div>
        </div>
      ) : (
        <section className="cn-card cn-card--flush">
          <table className="cn-table cn-prospect-table">
            <thead>
              <tr>
                <th style={{ width: 36 }}>
                  <input type="checkbox" checked={allChecked} onChange={toggleAll} aria-label="Select all" />
                </th>
                <th>Name</th>
                <th>Email</th>
                <th>Title</th>
                <th>Company</th>
                <th>Phone</th>
                <th>Function</th>
                <th>Vertical</th>
                <th style={{ width: 36 }}></th>
              </tr>
            </thead>
            <tbody>
              {groups.map((group, gi) => (
                <Fragment key={group.key ?? "all-" + gi}>
                  {group.key && (
                    <tr className="cn-prospect-group-row">
                      <td colSpan={9}>
                        <span className="cn-prospect-group-label">{group.key}</span>
                        <span className="cn-prospect-group-count">· {group.items.length}</span>
                      </td>
                    </tr>
                  )}
                  {group.items.map(p => (
                    <ProspectRow
                      key={p.id}
                      p={p}
                      selected={selectedIds.has(p.id)}
                      onToggle={() => toggle(p.id)}
                      onUpdate={(patch) => updateProspect(p.id, patch)}
                      onDelete={() => removeProspect(p.id)}
                    />
                  ))}
                </Fragment>
              ))}
            </tbody>
          </table>
        </section>
      )}

      {addingProspect && (
        <ProspectFormModal onClose={() => setAddingProspect(false)} onSave={addProspect} />
      )}

      {bulkPasteOpen && (
        <BulkPasteModal onClose={() => setBulkPasteOpen(false)} onAdd={addBulk} />
      )}

      {campaignOpen && (
        <CampaignFromProspects
          prospects={campaignOpen.recipients}
          scenario={scenario}
          currentUser={currentUser}
          onClose={() => setCampaignOpen(false)}
        />
      )}
    </div>
  );
}

    jobFunction: "", vertical: "", tags: [],

            <div className="cn-field" style={{ flex: 1 }}>

            <div className="cn-prospect-taginput">
