<script type="text/babel" data-source="quotes.jsx">
// Quoting — version history per opportunity, shareable link, view tracking, PDF print.
// Data stored in localStorage keyed by oppId (swap to Supabase later by replacing get/save helpers).
// (useState/useEffect/useRef/Fragment come from shell.jsx's global destructuring.)

// ── Storage ────────────────────────────────────────────────────────────────
const QK = (oppId) => `cn-quotes-${oppId}`;
const TOKEN_INDEX = "cn-quote-token-index";

function readQuotes(oppId) {
  try { return JSON.parse(localStorage.getItem(QK(oppId)) || "[]"); }
  catch { return []; }
}
function writeQuotes(oppId, list) {
  localStorage.setItem(QK(oppId), JSON.stringify(list));
  // refresh token → oppId index for share lookup
  try {
    const idx = JSON.parse(localStorage.getItem(TOKEN_INDEX) || "{}");
    list.forEach(q => { idx[q.shareToken] = { oppId, quoteId: q.id }; });
    localStorage.setItem(TOKEN_INDEX, JSON.stringify(idx));
  } catch {}
}
function lookupByToken(token) {
  try {
    const idx = JSON.parse(localStorage.getItem(TOKEN_INDEX) || "{}");
    const hit = idx[token];
    if (!hit) return null;
    const quotes = readQuotes(hit.oppId);
    const quote = quotes.find(q => q.id === hit.quoteId);
    return quote ? { ...hit, quote } : null;
  } catch { return null; }
}

window.cnQuotes = { readQuotes, writeQuotes, lookupByToken };

// ── Helpers ────────────────────────────────────────────────────────────────
const newId = (p) => p + "-" + Math.random().toString(36).slice(2, 10);
const CONDITIONS = ["New", "New Surplus", "Factory Refurbished", "Used", "Repaired", "As-Is"];

function newLine() {
  return { id: newId("li"), partNumber: "", description: "", qty: 1, condition: "New", unitPrice: 0 };
}

function newQuote(opp, account, contact, prevVersion) {
  const today = new Date();
  const expires = new Date(today.getTime() + 30 * 86400000);
  const num = "Q-" + today.getFullYear() + "-" + String(Math.floor(Math.random() * 9000) + 1000);
  return {
    id: newId("q"),
    version: (prevVersion || 0) + 1,
    quoteNumber: num,
    issueDate: today.toISOString().slice(0, 10),
    expiresDate: expires.toISOString().slice(0, 10),
    billToName: account?.name || "",
    billToAddress: account?.hq || "",
    attentionName: contact?.name || "",
    attentionEmail: contact?.email || "",
    preparedBy: opp.ownerId,
    reference: opp.title || "",
    lineItems: [newLine()],
    notes: "",
    terms: "Payment Net 30. Prices in USD. Quote valid 30 days from issue date. FOB Origin unless otherwise stated.",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    sentAt: null,
    viewedAt: null,
    viewCount: 0,
    shareToken: "qt-" + Math.random().toString(36).slice(2, 14) + Math.random().toString(36).slice(2, 8),
    status: "draft",
  };
}

function lineTotal(li) {
  return (parseFloat(li.qty) || 0) * (parseFloat(li.unitPrice) || 0);
}
function quoteTotal(q) {
  return (q.lineItems || []).reduce((s, li) => s + lineTotal(li), 0);
}

function timeAgo(iso) {
  if (!iso) return "";
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24);
  return d + "d ago";
}

function fmtCurrency(n) {
  return "$" + (Math.round((n || 0) * 100) / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── Status pill ────────────────────────────────────────────────────────────
function QuoteStatus({ quote }) {
  const status = quote.status || "draft";
  const labels = {
    draft: ["Draft", "cn-q-draft"],
    sent: ["Sent", "cn-q-sent"],
    viewed: ["Viewed", "cn-q-viewed"],
    accepted: ["Accepted", "cn-q-accepted"],
    declined: ["Declined", "cn-q-declined"],
  };
  const [label, cls] = labels[status] || labels.draft;
  return <span className={`cn-q-pill ${cls}`}>{label}</span>;
}

// ── Embedded section: lives in OppDetailDrawer ─────────────────────────────
function QuotesSection({ opp, account, contact, onValueUpdated }) {
  const [versions, setVersions] = useState(() => readQuotes(opp.id));
  const [builderId, setBuilderId] = useState(null);
  const [shareId, setShareId] = useState(null);

  const refresh = () => setVersions(readQuotes(opp.id));

  const createVersion = (basedOnId) => {
    const list = readQuotes(opp.id);
    const last = list[0];
    let q;
    if (basedOnId) {
      const src = list.find(x => x.id === basedOnId) || last;
      q = {
        ...src,
        id: newId("q"),
        version: (list[0]?.version || 0) + 1,
        lineItems: src.lineItems.map(li => ({ ...li, id: newId("li") })),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        sentAt: null,
        viewedAt: null,
        viewCount: 0,
        shareToken: "qt-" + Math.random().toString(36).slice(2, 14) + Math.random().toString(36).slice(2, 8),
        status: "draft",
      };
    } else {
      q = newQuote(opp, account, contact, list[0]?.version || 0);
    }
    const next = [q, ...list];
    writeQuotes(opp.id, next);
    setVersions(next);
    setBuilderId(q.id);
  };

  const updateQuote = (id, patch) => {
    const list = readQuotes(opp.id);
    const next = list.map(q => q.id === id ? { ...q, ...patch, updatedAt: new Date().toISOString() } : q);
    writeQuotes(opp.id, next);
    setVersions(next);
  };

  const deleteQuote = (id) => {
    if (!confirm("Delete this quote version? This cannot be undone.")) return;
    const next = readQuotes(opp.id).filter(q => q.id !== id);
    writeQuotes(opp.id, next);
    setVersions(next);
    if (builderId === id) setBuilderId(null);
  };

  const pushToDeal = (q) => {
    const total = quoteTotal(q);
    if (!confirm(`Set deal value to ${fmtCurrency(total)} based on this quote?`)) return;
    window.updateOpportunity(opp.id, { value_cents: Math.round(total * 100) })
      .then(() => onValueUpdated && onValueUpdated())
      .catch(e => alert("Couldn't update deal: " + e.message));
  };

  const markWon = (q) => {
    const total = quoteTotal(q);
    if (!confirm(`Mark quote v${q.version} as Accepted and close the deal as Won at ${fmtCurrency(total)}?`)) return;
    updateQuote(q.id, { status: "accepted", decidedAt: new Date().toISOString() });
    window.updateOpportunity(opp.id, { stage: "won", value_cents: Math.round(total * 100) })
      .then(() => onValueUpdated && onValueUpdated())
      .catch(e => alert("Couldn't update deal: " + e.message));
  };

  const markLost = (q) => {
    const closeDeal = confirm(`Mark quote v${q.version} as Declined?\n\nClick OK to also mark the whole deal as Closed Lost. Click Cancel to only mark this version declined (other versions can still win).`);
    updateQuote(q.id, { status: "declined", decidedAt: new Date().toISOString() });
    if (closeDeal) {
      window.updateOpportunity(opp.id, { stage: "lost" })
        .then(() => onValueUpdated && onValueUpdated())
        .catch(e => alert("Couldn't update deal: " + e.message));
    }
  };

  const reopen = (q) => {
    updateQuote(q.id, { status: q.sentAt ? (q.viewedAt ? "viewed" : "sent") : "draft", decidedAt: null });
  };

  const editing = builderId ? versions.find(q => q.id === builderId) : null;
  const sharing = shareId ? versions.find(q => q.id === shareId) : null;

  return (
    <section style={{ marginTop: 28 }} className="cn-quotes-section">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
        <h3 className="cn-side-title" style={{ margin: 0 }}>Quotes {versions.length > 0 && <span style={{ color: "var(--cn-mute)", fontFamily: "var(--cn-sans)", fontSize: 13 }}>· {versions.length} version{versions.length === 1 ? "" : "s"}</span>}</h3>
        {versions.length > 0 && (
          <button className="cn-btn cn-btn--ghost" style={{ height: 32, padding: "6px 12px", fontSize: 12.5 }} onClick={() => createVersion(versions[0].id)}>
            + New version (copy v{versions[0].version})
          </button>
        )}
      </div>

      {versions.length > 0 && (() => {
        const accepted = versions.find(v => v.status === "accepted");
        const declined = versions.filter(v => v.status === "declined").length;
        if (!accepted && !declined) return null;
        return (
          <div className="cn-q-summary">
            {accepted && <span><span className="cn-q-status-dot cn-q-status-dot--accepted"></span> v{accepted.version} accepted · <span className="cn-mono">{fmtCurrency(quoteTotal(accepted))}</span></span>}
            {declined > 0 && <span className="cn-q-summary-sep">·</span>}
            {declined > 0 && <span style={{ color: "var(--cn-mute)" }}>{declined} declined</span>}
          </div>
        );
      })()}

      {versions.length === 0 ? (
        <div className="cn-quote-empty">
          <div className="cn-quote-empty-icon">≣</div>
          <div>
            <div style={{ fontWeight: 500, marginBottom: 4 }}>No quote yet</div>
            <div style={{ color: "var(--cn-mute)", fontSize: 12.5, marginBottom: 12 }}>Build a bespoke quote with line items, share a link, track views.</div>
            <button className="cn-btn cn-btn--primary" onClick={() => createVersion(null)}>+ New quote</button>
          </div>
        </div>
      ) : (
        <div className="cn-q-versions">
          {versions.map(q => (
            <article key={q.id} className={`cn-q-row ${builderId === q.id ? "is-editing" : ""}`}>
              <div className="cn-q-row-left">
                <div className="cn-q-vtag">v{q.version}</div>
                <div className="cn-q-row-meta">
                  <div className="cn-q-row-num">
                    <span className="cn-mono">{q.quoteNumber}</span>
                    <QuoteStatus quote={q} />
                  </div>
                  <div className="cn-q-row-sub">
                    {q.lineItems.length} line{q.lineItems.length === 1 ? "" : "s"} · {q.issueDate}
                    {q.sentAt && <Fragment> · Sent {timeAgo(q.sentAt)}</Fragment>}
                    {q.viewedAt && <Fragment> · <span className="cn-q-viewed-inline">Viewed {timeAgo(q.viewedAt)}{q.viewCount > 1 ? ` (${q.viewCount}×)` : ""}</span></Fragment>}
                  </div>
                </div>
              </div>
              <div className="cn-q-row-right">
                <div className="cn-q-row-total cn-mono">{fmtCurrency(quoteTotal(q))}</div>
                <div className="cn-q-row-actions">
                  <button className="cn-link" onClick={() => setBuilderId(q.id)}>Edit</button>
                  <span className="cn-q-actsep">·</span>
                  <button className="cn-link" onClick={() => setShareId(q.id)}>Share</button>
                  {q.status !== "accepted" && q.status !== "declined" ? (
                    <Fragment>
                      <span className="cn-q-actsep">·</span>
                      <button className="cn-link cn-link--pos" onClick={() => markWon(q)} title="Mark this quote as accepted and close the deal as Won">Won</button>
                      <span className="cn-q-actsep">·</span>
                      <button className="cn-link cn-link--neg" onClick={() => markLost(q)} title="Mark this version as declined">Lost</button>
                    </Fragment>
                  ) : (
                    <Fragment>
                      <span className="cn-q-actsep">·</span>
                      <button className="cn-link" onClick={() => reopen(q)} title="Reopen this quote">Reopen</button>
                    </Fragment>
                  )}
                </div>
              </div>
            </article>
          ))}
        </div>
      )}

      {editing && (
        <QuoteBuilderModal
          quote={editing}
          opp={opp}
          account={account}
          contact={contact}
          onChange={(patch) => updateQuote(editing.id, patch)}
          onClose={() => setBuilderId(null)}
          onDelete={() => deleteQuote(editing.id)}
          onShare={() => { setShareId(editing.id); }}
        />
      )}
      {sharing && (
        <QuoteShareModal
          quote={sharing}
          opp={opp}
          account={account}
          contact={contact}
          onClose={() => setShareId(null)}
          onUpdate={(patch) => updateQuote(sharing.id, patch)}
        />
      )}
    </section>
  );
}

// ── Builder modal ──────────────────────────────────────────────────────────
function QuoteBuilderModal({ quote, opp, account, contact, onChange, onClose, onDelete, onShare }) {
  const [q, setQ] = useState(quote);
  const dirtyRef = useRef(false);

  useEffect(() => { setQ(quote); dirtyRef.current = false; }, [quote.id]);

  const update = (patch) => {
    const next = { ...q, ...patch };
    setQ(next);
    dirtyRef.current = true;
    onChange(patch);
  };

  const updateLine = (id, patch) => {
    const next = q.lineItems.map(li => li.id === id ? { ...li, ...patch } : li);
    update({ lineItems: next });
  };

  const addLine = () => update({ lineItems: [...q.lineItems, newLine()] });
  const removeLine = (id) => update({ lineItems: q.lineItems.filter(li => li.id !== id) });
  const moveLine = (id, dir) => {
    const idx = q.lineItems.findIndex(li => li.id === id);
    if (idx < 0) return;
    const next = [...q.lineItems];
    const target = idx + dir;
    if (target < 0 || target >= next.length) return;
    [next[idx], next[target]] = [next[target], next[idx]];
    update({ lineItems: next });
  };

  const total = quoteTotal(q);

  return (
    <div className="cn-modal-scrim cn-quote-scrim" onClick={onClose}>
      <div className="cn-modal cn-quote-modal" onClick={e => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">Quote v{q.version} · {opp.title}</div>
            <h2 className="cn-modal-title" style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <input
                className="cn-input cn-quote-num"
                value={q.quoteNumber}
                onChange={e => update({ quoteNumber: e.target.value })}
              />
              <QuoteStatus quote={q} />
            </h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-modal-body cn-quote-body">
          <div className="cn-quote-doc-edit">
            <div className="cn-quote-meta-grid">
              <div className="cn-field">
                <label>Issue date</label>
                <input className="cn-input" type="date" value={q.issueDate} onChange={e => update({ issueDate: e.target.value })} />
              </div>
              <div className="cn-field">
                <label>Expires</label>
                <input className="cn-input" type="date" value={q.expiresDate} onChange={e => update({ expiresDate: e.target.value })} />
              </div>
              <div className="cn-field">
                <label>Reference</label>
                <input className="cn-input" value={q.reference} onChange={e => update({ reference: e.target.value })} placeholder="Deal title or PO ref" />
              </div>
              <div className="cn-field">
                <label>Prepared by</label>
                <select className="cn-input" value={q.preparedBy || ""} onChange={e => update({ preparedBy: e.target.value })}>
                  <option value="">— Select —</option>
                  {(window.REPS || []).map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                </select>
              </div>
            </div>

            <div className="cn-quote-billto">
              <div className="cn-field" style={{ flex: 1 }}>
                <label>Bill to (company)</label>
                <input className="cn-input" value={q.billToName} onChange={e => update({ billToName: e.target.value })} />
                <textarea className="cn-textarea" style={{ minHeight: 60, marginTop: 8 }} value={q.billToAddress} onChange={e => update({ billToAddress: e.target.value })} placeholder="Billing address" />
              </div>
              <div className="cn-field" style={{ flex: 1 }}>
                <label>Attention</label>
                <input className="cn-input" value={q.attentionName} onChange={e => update({ attentionName: e.target.value })} placeholder="Contact name" />
                <input className="cn-input cn-mono" style={{ marginTop: 8, fontSize: 12.5 }} value={q.attentionEmail} onChange={e => update({ attentionEmail: e.target.value })} placeholder="email@example.com" />
              </div>
            </div>

            <div className="cn-quote-li-wrap">
              <div className="cn-card-eyebrow" style={{ marginBottom: 8 }}>Line items</div>
              <table className="cn-li-table">
                <thead>
                  <tr>
                    <th style={{ width: 28 }}></th>
                    <th>Mfr Part Number</th>
                    <th style={{ width: 80 }}>Qty</th>
                    <th style={{ width: 160 }}>Condition</th>
                    <th style={{ width: 140 }} className="cn-li-right">Price / unit</th>
                    <th style={{ width: 140 }} className="cn-li-right">Total</th>
                    <th style={{ width: 32 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {q.lineItems.map((li, i) => (
                    <Fragment key={li.id}>
                      <tr>
                        <td className="cn-li-handle">
                          <button className="cn-li-mover" disabled={i === 0} onClick={() => moveLine(li.id, -1)} title="Move up">↑</button>
                          <button className="cn-li-mover" disabled={i === q.lineItems.length - 1} onClick={() => moveLine(li.id, 1)} title="Move down">↓</button>
                        </td>
                        <td>
                          <input

// ── Share modal ────────────────────────────────────────────────────────────
function QuoteShareModal({ quote, opp, account, contact, onClose, onUpdate }) {
  const shareUrl = window.location.origin + window.location.pathname + "?quote=" + quote.shareToken;
  const [copied, setCopied] = useState(false);
  const [, force] = useState(0);

  // Poll for view updates from share view
  useEffect(() => {
    const tick = () => {
      const fresh = readQuotes(opp.id).find(q => q.id === quote.id);
      if (fresh && (fresh.viewedAt !== quote.viewedAt || fresh.viewCount !== quote.viewCount)) {
        onUpdate({ viewedAt: fresh.viewedAt, viewCount: fresh.viewCount, status: fresh.status });
      }
      force(n => n + 1);
    };
    const id = setInterval(tick, 1500);
    return () => clearInterval(id);
  }, [quote.id]);

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(shareUrl);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch {
      // fallback
      const ta = document.createElement("textarea");
      ta.value = shareUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    }
  };

  const markSent = () => {
    onUpdate({ sentAt: new Date().toISOString(), status: quote.status === "viewed" ? "viewed" : "sent" });
  };

  const [trackedSending, setTrackedSending] = useState(false);
  const [trackedResult, setTrackedResult] = useState(null);

  const sendTracked = async () => {
    if (!contact?.email) {
      alert("This contact doesn't have an email address. Add one to their profile first.");
      return;
    }
    if (!window.SEND_VIA_RESEND) {
      alert("Tracked send is only available when Resend is connected. Use the email link instead.");
      return;
    }
    const senderRep = (window.REPS || []).find(r => r.id === quote.preparedBy);
    const senderName = senderRep?.fullName || senderRep?.name || "Chief Negotiators";
    const senderEmail = senderRep?.email || null;
    const total = fmtCurrency(quoteTotal(quote));
    const firstName = (contact?.name || "").split(" ")[0] || "there";
    const campaign = {
      id: "qc-" + quote.id + "-" + Date.now().toString(36),
      name: `Quote ${quote.quoteNumber} — ${opp.title}`,
      fromName: senderName,
      senderEmail,
      subject: `Quote ${quote.quoteNumber} — ${opp.title}`,
      preheader: `Total ${total} · Valid through ${quote.expiresDate}`,
      body: `Hi ${firstName},\n\nQuote ${quote.quoteNumber} ready for review. Total is ${total}, valid through ${quote.expiresDate}.\n\nClick below to view the full breakdown — you can accept or request changes directly from the link.\n\n— ${senderName}\nChief Negotiators`,
      imageUrl: "",
      ctaText: "View & respond to quote →",
      ctaUrl: shareUrl,
    };
    const recipients = [{
      contactId: contact.id,
      email: contact.email,
      ctx: { first_name: firstName, company: opp.title, sender_name: senderName },
    }];
    setTrackedSending(true);
    try {
      await window.sendCampaignViaResend(campaign, recipients);
      markSent();
      setTrackedResult({ ok: true });
      if (window.cnToast) window.cnToast({ title: `Quote ${quote.quoteNumber} sent to ${contact.name}`, sub: "Tracking opens & clicks — check back in a few minutes" });
    } catch (e) {
      console.error("Tracked send failed:", e);
      setTrackedResult({ ok: false, error: e.message });
      if (window.cnToast) window.cnToast({ title: `Send failed`, sub: e.message, kind: "error" });
    } finally {
      setTrackedSending(false);
    }
  };

  const openPreview = () => {
    window.open(shareUrl, "_blank", "noopener");
  };

  const simulateView = () => {
    onUpdate({
      viewedAt: new Date().toISOString(),
      viewCount: (quote.viewCount || 0) + 1,
      status: "viewed",
    });
  };

  const emailHref = (() => {
    const subj = encodeURIComponent(`Quote ${quote.quoteNumber} from Chief Negotiators — ${opp.title}`);
    const body = encodeURIComponent(
`Hi ${(contact?.name || "").split(" ")[0] || "there"},

Please find quote ${quote.quoteNumber} attached at the link below. Total: ${fmtCurrency(quoteTotal(quote))}, valid through ${quote.expiresDate}.

${shareUrl}

Happy to walk through any of the line items or adjust based on your needs.

— Chief Negotiators`);
    return `mailto:${contact?.email || ""}?subject=${subj}&body=${body}`;
  })();

  return (
    <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 200 }}>
      <div className="cn-modal" onClick={e => e.stopPropagation()} style={{ width: 580 }}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">Share quote · v{quote.version}</div>
            <h2 className="cn-modal-title">{quote.quoteNumber}</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-modal-body">
          <div className="cn-field">
            <label>Shareable link</label>
            <div className="cn-share-link">
              <input className="cn-input cn-mono" readOnly value={shareUrl} onFocus={e => e.target.select()} />
              <button className="cn-btn cn-btn--primary" onClick={copy}>{copied ? "✓ Copied" : "Copy"}</button>
            </div>
            <div className="cn-field-help">Anyone with this link can view the quote. No login required.</div>
          </div>

          <div className="cn-share-status">
            <div>
              <div className="cn-card-eyebrow">Delivery</div>
              <div className="cn-share-status-line">
                {quote.sentAt
                  ? <Fragment><span className="cn-q-status-dot cn-q-status-dot--sent"></span> Sent {timeAgo(quote.sentAt)}</Fragment>
                  : <Fragment><span className="cn-q-status-dot cn-q-status-dot--draft"></span> Not yet sent</Fragment>}
              </div>
            </div>
            <div>
              <div className="cn-card-eyebrow">View tracking</div>
              <div className="cn-share-status-line">
                {quote.viewedAt
                  ? <Fragment><span className="cn-q-status-dot cn-q-status-dot--viewed"></span> Viewed {timeAgo(quote.viewedAt)}{quote.viewCount > 1 ? ` · ${quote.viewCount} opens` : ""}</Fragment>
                  : quote.sentAt
                    ? <Fragment><span className="cn-q-status-dot cn-q-status-dot--waiting"></span> Awaiting open…</Fragment>
                    : <Fragment><span className="cn-q-status-dot cn-q-status-dot--draft"></span> Pings here when recipient opens the link</Fragment>}
              </div>
            </div>
          </div>

          <div className="cn-share-actions">
            {window.SEND_VIA_RESEND && contact?.email && (
              <button className="cn-btn cn-btn--primary" onClick={sendTracked} disabled={trackedSending}>
                {trackedSending ? (<Fragment><span className="cn-spinner"></span> Sending…</Fragment>) : (<Fragment>→ Send via tracked email</Fragment>)}
              </button>
            )}
            <a className="cn-btn cn-btn--ghost" href={emailHref} onClick={markSent}>✉ Email via {contact?.name?.split(" ")[0] || "client"}'s default app</a>
            <button className="cn-btn cn-btn--ghost" onClick={() => { openPreview(); markSent(); }}>↗ Open share preview</button>
            <button className="cn-btn cn-btn--ghost" onClick={() => { openPreview(); }}>⤓ Save as PDF</button>
          </div>
          {trackedResult?.ok && (
            <div style={{ marginTop: 10, padding: "10px 12px", background: "#DCE9DE", border: "1px solid #B6D2BB", borderRadius: "var(--cn-r)", color: "var(--cn-pos)", fontSize: 12.5 }}>
              ✓ Sent through Resend. Opens & clicks will update here automatically.
            </div>
          )}
          {trackedResult?.ok === false && (
            <div className="cn-login-error" style={{ marginTop: 10 }}>
              Send failed: {trackedResult.error}
            </div>
          )}
          <div className="cn-field-help" style={{ marginTop: 4 }}>PDF: opens the quote in a new tab, then use your browser's Print → Save as PDF.</div>

          <details className="cn-share-demo">
            <summary>Demo controls</summary>
            <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
              <button className="cn-btn cn-btn--ghost" onClick={simulateView}>Simulate recipient view</button>
              <button className="cn-btn cn-btn--ghost" onClick={() => onUpdate({ sentAt: null, viewedAt: null, viewCount: 0, status: "draft" })}>Reset tracking</button>
            </div>
          </details>
        </div>

        <footer className="cn-modal-foot">
          <div style={{ marginLeft: "auto" }}>
            <button className="cn-btn cn-btn--primary" onClick={onClose}>Done</button>
          </div>
        </footer>
      </div>
    </div>
  );
}

// ── Public share view (?quote=TOKEN) ───────────────────────────────────────
function QuoteShareView({ token }) {
  const [resolved, setResolved] = useState(null);
  const [notFound, setNotFound] = useState(false);
  const [decision, setDecision] = useState(null); // local feedback after action
  const [showDecline, setShowDecline] = useState(false);
  const [declineReason, setDeclineReason] = useState("");

  useEffect(() => {
    const hit = lookupByToken(token);
    if (!hit) { setNotFound(true); return; }
    setResolved(hit);
    // Register the view
    const list = readQuotes(hit.oppId);
    const next = list.map(q => q.id === hit.quoteId
      ? { ...q, viewedAt: new Date().toISOString(), viewCount: (q.viewCount || 0) + 1, status: q.status === "draft" ? "viewed" : (q.status === "sent" ? "viewed" : q.status) }
      : q);
    writeQuotes(hit.oppId, next);
  }, [token]);

  if (notFound) {
    return (
      <div className="cn-loading">
        <div style={{ textAlign: "center" }}>
          <h2 style={{ fontFamily: "var(--cn-serif)", fontSize: 32, marginBottom: 8 }}>Quote not found</h2>
          <p style={{ color: "var(--cn-mute)" }}>This link may have expired or the quote was deleted.</p>
        </div>
      </div>
    );
  }
  if (!resolved) return <div className="cn-loading"><div className="cn-loading-text">Loading quote…</div></div>;

  const q = resolved.quote;
  const total = quoteTotal(q);
  const preparer = (window.REPS || []).find(r => r.id === q.preparedBy);
  const decided = q.status === "accepted" || q.status === "declined";

  const recordDecision = (status, extra = {}) => {
    const list = readQuotes(resolved.oppId);
    const prevQuote = list.find(x => x.id === resolved.quoteId);
    const prevStatus = prevQuote?.status || "sent";
    const next = list.map(x => x.id === resolved.quoteId
      ? { ...x, status, decidedAt: new Date().toISOString(), ...extra }
      : x);
    writeQuotes(resolved.oppId, next);
    setResolved({ ...resolved, quote: next.find(x => x.id === resolved.quoteId) });
    setDecision(status);

    // On accept: queue a sale notification for the rep's CRM session.
    if (status === "accepted") {
      try {
        const acceptedQuote = next.find(x => x.id === resolved.quoteId);
        const total = quoteTotal(acceptedQuote);
        const pending = JSON.parse(localStorage.getItem("cn-pending-sales") || "[]");
        pending.push({
          id: "ps-" + Math.random().toString(36).slice(2, 10),
          oppId: resolved.oppId,
          quoteId: resolved.quoteId,
          quoteNumber: acceptedQuote.quoteNumber,
          quoteVersion: acceptedQuote.version,
          accountName: acceptedQuote.billToName || "",
          contactName: acceptedQuote.attentionName || "",
          totalCents: Math.round(total * 100),
          prevQuoteStatus: prevStatus,
          at: new Date().toISOString(),
          processed: false,
        });
        localStorage.setItem("cn-pending-sales", JSON.stringify(pending));
      } catch (e) {
        console.warn("Failed to queue sale notification:", e);
      }
    }
  };

  return (
    <div className="cn-share-page">
      <div className="cn-share-toolbar">
        <div className="cn-share-toolbar-brand">
          <span className="cn-brand-name" style={{ fontSize: 14, color: "var(--cn-ink)" }}>Chief Negotiators</span>
          <span className="cn-brand-sub">Quote · {q.quoteNumber}</span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="cn-btn cn-btn--ghost" onClick={() => window.print()}>⤓ Save as PDF</button>
          <button className="cn-btn cn-btn--primary" onClick={() => window.print()}>Print</button>
        </div>
      </div>

      <article className="cn-quote-doc">
        <header className="cn-qd-head">
          <div>
            <div className="cn-qd-brand">Chief Negotiators</div>
            <div className="cn-qd-tag">Procurement & Sourcing</div>
          </div>
          <div className="cn-qd-stamp">
            <div className="cn-qd-stamp-label">Quotation</div>
            <div className="cn-qd-stamp-num cn-mono">{q.quoteNumber}</div>
            <div className="cn-qd-stamp-meta">
              <div><span>Issued</span><span className="cn-mono">{q.issueDate}</span></div>
              <div><span>Expires</span><span className="cn-mono">{q.expiresDate}</span></div>
              <div><span>Version</span><span className="cn-mono">v{q.version}</span></div>
            </div>
          </div>
        </header>

        <div className="cn-qd-parties">
          <div>
            <div className="cn-qd-eyebrow">Bill to</div>
            <div className="cn-qd-party-name">{q.billToName}</div>
            <div className="cn-qd-party-addr">{q.billToAddress}</div>
            {q.attentionName && (
              <div className="cn-qd-party-attn">
                <div className="cn-qd-eyebrow" style={{ marginTop: 10 }}>Attention</div>
                {q.attentionName}{q.attentionEmail && <span className="cn-mono" style={{ color: "var(--cn-mute)", marginLeft: 6 }}>· {q.attentionEmail}</span>}
              </div>
            )}
          </div>
          <div>
            <div className="cn-qd-eyebrow">Reference</div>
            <div>{q.reference || "—"}</div>
            {preparer && (
              <Fragment>
                <div className="cn-qd-eyebrow" style={{ marginTop: 10 }}>Prepared by</div>
                <div>{preparer.name}{preparer.email && <span className="cn-mono" style={{ color: "var(--cn-mute)", marginLeft: 6 }}>· {preparer.email}</span>}</div>
              </Fragment>
            )}
          </div>
        </div>

        <table className="cn-qd-table">
          <thead>
            <tr>
              <th>Mfr Part Number</th>
              <th style={{ width: 70, textAlign: "right" }}>Qty</th>
              <th style={{ width: 160 }}>Condition</th>
              <th style={{ width: 130, textAlign: "right" }}>Price / unit</th>
              <th style={{ width: 140, textAlign: "right" }}>Total</th>
            </tr>
          </thead>
          <tbody>
            {q.lineItems.map(li => (
              <tr key={li.id}>
                <td>
                  <div className="cn-mono cn-qd-pn">{li.partNumber || "—"}</div>
                  {li.description && <div className="cn-qd-desc">{li.description}</div>}
                </td>
                <td className="cn-mono" style={{ textAlign: "right" }}>{li.qty}</td>
                <td>{li.condition}</td>
                <td className="cn-mono" style={{ textAlign: "right" }}>{fmtCurrency(li.unitPrice)}</td>
                <td className="cn-mono" style={{ textAlign: "right" }}>{fmtCurrency(lineTotal(li))}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr>
              <td colSpan={4} style={{ textAlign: "right" }}>Total</td>
              <td className="cn-mono cn-qd-grand" style={{ textAlign: "right" }}>{fmtCurrency(total)}</td>
            </tr>
          </tfoot>
        </table>

        {q.notes && (
          <section className="cn-qd-notes">
            <div className="cn-qd-eyebrow">Notes</div>
            <p>{q.notes}</p>
          </section>
        )}

        {q.terms && (
          <section className="cn-qd-terms">
            <div className="cn-qd-eyebrow">Terms & conditions</div>
            <p>{q.terms}</p>
          </section>
        )}

        <footer className="cn-qd-foot">
          <div>Thank you for the opportunity.</div>
          <div className="cn-mono" style={{ color: "var(--cn-mute)" }}>{q.quoteNumber} · v{q.version} · {q.issueDate}</div>
        </footer>

        {!decided && !decision && (
          <section className="cn-qd-decision">
            {!showDecline ? (
              <Fragment>
                <div className="cn-qd-decision-lead">
                  <div className="cn-qd-eyebrow">Your response</div>
                  <div className="cn-qd-decision-text">Ready to move forward? Accept to confirm this quote, or let us know if changes are needed.</div>
                </div>
                <div className="cn-qd-decision-actions">
                  <button className="cn-btn cn-btn--ghost" onClick={() => setShowDecline(true)}>Decline</button>
                  <button className="cn-btn cn-btn--win" onClick={() => recordDecision("accepted")}>✓ Accept quote</button>
                </div>
              </Fragment>
            ) : (
              <Fragment>
                <div style={{ flex: 1 }}>
                  <div className="cn-qd-eyebrow" style={{ marginBottom: 6 }}>Decline this quote</div>
                  <textarea
                    className="cn-textarea"
                    value={declineReason}
                    onChange={e => setDeclineReason(e.target.value)}
                    placeholder="Optional: what didn't work? (pricing, lead time, condition, etc.)"
                    style={{ minHeight: 70 }}
                  />
                </div>
                <div className="cn-qd-decision-actions">
                  <button className="cn-btn cn-btn--ghost" onClick={() => { setShowDecline(false); setDeclineReason(""); }}>Cancel</button>
                  <button className="cn-btn cn-btn--lose" onClick={() => recordDecision("declined", { declineReason: declineReason.trim() || null })}>Submit decline</button>
                </div>
              </Fragment>
            )}
          </section>
        )}

        {(decided || decision) && (
          <section className={`cn-qd-decided cn-qd-decided--${q.status}`}>
            <div className="cn-qd-decided-icon">{q.status === "accepted" ? "✓" : "✕"}</div>
            <div>
              <div className="cn-qd-decided-title">
                {q.status === "accepted" ? "Quote accepted" : "Quote declined"}
              </div>
              <div className="cn-qd-decided-sub">
                {q.status === "accepted"
                  ? <Fragment>Confirmed {timeAgo(q.decidedAt)}. We'll be in touch to finalize next steps.</Fragment>
                  : <Fragment>Recorded {timeAgo(q.decidedAt)}.{q.declineReason && <Fragment> Note: “{q.declineReason}”</Fragment>}</Fragment>}
              </div>
            </div>
          </section>
        )}
      </article>
    </div>
  );
}

}

  const idx = list.findIndex(x => x.id === t.id);
  if (idx >= 0) list[idx] = t; else list.unshift(t);
  writeJSON(T_KEY, list);
  return list;
}
function deleteTemplate(id) {
  const list = readTemplates().filter(t => t.id !== id);
  writeJSON(T_KEY, list);
  return list;
}

function readCampaigns() { return readJSON(C_KEY, []); }
function saveCampaign(c) {
  const list = readCampaigns();
  const idx = list.findIndex(x => x.id === c.id);
  if (idx >= 0) list[idx] = c; else list.unshift(c);
  writeJSON(C_KEY, list);
  return list;
}
function deleteCampaign(id) {
  const list = readCampaigns().filter(c => c.id !== id);
  writeJSON(C_KEY, list);

}

function readWarmLeads() { return new Set(readJSON(WL_KEY, [])); }
function toggleWarmLead(contactId) {
  const set = readWarmLeads();
  if (set.has(contactId)) set.delete(contactId); else set.add(contactId);
  writeJSON(WL_KEY, [...set]);
  return set;
}

// ── Tiny helpers ───────────────────────────────────────────────────────────
function timeAgoSimple(iso) {
  if (!iso) return "";
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24);
  return d + "d ago";
}

function mergeFields(text, ctx) {
  return (text || "").replace(/\{\{(\w+)\}\}/g, (_, key) => ctx[key] != null ? ctx[key] : `{{${key}}}`);
}

// ── Mock send pipeline (swap for provider API) ─────────────────────────────
// Realistic-shape engagement: opens trickle in over 24h, clicks follow opens.
function simulateSend(campaign) {
  const recipients = campaign.recipients || [];
  const now = Date.now();
  const events = [];
  recipients.forEach(r => {
    // Bounce ~2%
    if (Math.random() < 0.02) {
      events.push({ contactId: r.contactId, type: "bounced", at: new Date(now + 1000 * 60 * (Math.random() * 2 + 0.5)).toISOString() });
      return;
    }
    // Open ~38% within 24h
    if (Math.random() < 0.38) {
      const openDelayMin = Math.pow(Math.random(), 2) * 60 * 24; // weighted toward early opens
      const openAt = new Date(now + openDelayMin * 60_000).toISOString();
      events.push({ contactId: r.contactId, type: "opened", at: openAt });
      // Click ~30% of opens
      if (Math.random() < 0.30) {
        events.push({ contactId: r.contactId, type: "clicked", at: new Date(new Date(openAt).getTime() + Math.random() * 30 * 60_000).toISOString() });
      }
      // Reply ~6% of opens
      if (Math.random() < 0.06) {
        events.push({ contactId: r.contactId, type: "replied", at: new Date(new Date(openAt).getTime() + Math.random() * 4 * 60 * 60_000).toISOString() });
      }
      // Unsub ~1% of opens
      if (Math.random() < 0.01) {
        events.push({ contactId: r.contactId, type: "unsubscribed", at: new Date(new Date(openAt).getTime() + Math.random() * 60_000).toISOString() });
      }
    }
  });
  return events;
}

function campaignStats(c) {
  const events = c.events || [];
  const sent = (c.recipients || []).length || c.recipient_count || 0;
  const now = Date.now();
  const past = (ev) => new Date(ev.at).getTime() <= now;
  const delivered_events = events.filter(e => e.type === "delivered" && past(e));
  const opens = events.filter(e => e.type === "opened" && past(e));
  const clicks = events.filter(e => e.type === "clicked" && past(e));
  const bounced = events.filter(e => e.type === "bounced" && past(e));
  const replied = events.filter(e => e.type === "replied" && past(e));
  const unsubbed = events.filter(e => e.type === "unsubscribed" && past(e));
  const uniqueOpens = new Set(opens.map(e => e.contactId)).size;
  const uniqueClicks = new Set(clicks.map(e => e.contactId)).size;
  // Prefer counting from delivered events when present (real send path);
  // fall back to sent-minus-bounced (simulation path).
  const delivered = delivered_events.length > 0
    ? new Set(delivered_events.map(e => e.contactId)).size
    : Math.max(sent - bounced.length, 0);
  return {
    sent,
    delivered,
    bounced: bounced.length,
    opens: opens.length,
    uniqueOpens,
    clicks: clicks.length,
    uniqueClicks,
    replied: replied.length,
    unsubbed: unsubbed.length,
    openRate: delivered ? uniqueOpens / delivered : 0,
    clickRate: delivered ? uniqueClicks / delivered : 0,
    replyRate: delivered ? replied.length / delivered : 0,
  };
}

// ── Audience filter ────────────────────────────────────────────────────────
function applyAudience(filter, scenario) {
  const all = scenario.contacts;
  const warmSet = readWarmLeads();
  return all.filter(c => {
    if (filter.warmOnly && !warmSet.has(c.id)) return false;
    if (filter.tiers && filter.tiers.length && !filter.tiers.includes(c.tier || "Influencer")) return false;
    if (filter.industries && filter.industries.length) {
      const acct = window.accountOf(c.accountId, scenario);
      if (!acct || !filter.industries.includes(acct.industry)) return false;
    }
    if (filter.hasEmail !== false && !c.email) return false;
    return true;
  });
}

function WarmLeadsScreen({ scenario, currentUser }) {
  const [warmSet, setWarmSet] = useState(() => readWarmLeads());

  // Auto-suggested: contacts at won/lost accounts not touched in 60+ days,
  // or contacts whose deals have all gone closed-lost
  const sixtyDaysAgo = Date.now() - 60 * 86400000;
  const isQuiet = (c) => {
    if (!c.lastTouchIso) return true;
    return new Date(c.lastTouchIso).getTime() < sixtyDaysAgo;
  };

  const suggested = scenario.contacts.filter(c => {
    if (warmSet.has(c.id)) return false;
    const oppHistory = scenario.opps.filter(o => o.contactId === c.id);
    const hasWon = oppHistory.some(o => o.stage === "won");
    const allLost = oppHistory.length > 0 && oppHistory.every(o => o.stage === "lost");
    const openDeal = oppHistory.some(o => o.stage !== "won" && o.stage !== "lost");
    if (openDeal) return false; // they have an active deal, not "warm"
    return (hasWon || allLost) && isQuiet(c);
  });

  const flagged = scenario.contacts.filter(c => warmSet.has(c.id));

  const toggle = (id) => {
    toggleWarmLead(id);
    setWarmSet(readWarmLeads());
  };

  return (
    <div className="cn-page" style={{ padding: 0, gap: 22 }}>
      <div className="cn-warm-intro">

          <div><div className="cn-strip-label">Flagged warm</div><div className="cn-strip-value">{flagged.length}</div></div>
          <div><div className="cn-strip-label">Suggested</div><div className="cn-strip-value">{suggested.length}</div></div>

        <div style={{ padding: "14px 22px", borderBottom: "1px solid var(--cn-line)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <h3 className="cn-side-title" style={{ margin: 0 }}>
            <span style={{ color: "var(--cn-copper)", marginRight: 8 }}>★</span>
            Your warm leads <span style={{ color: "var(--cn-mute)", fontWeight: 400, fontFamily: "var(--cn-sans)", fontSize: 13 }}>· {flagged.length}</span>
          </h3>
        </div>
        {flagged.length === 0 ? (
          <div style={{ padding: "30px 22px", textAlign: "center", color: "var(--cn-mute)" }}>

        ) : (

            <tbody>{flagged.map(c => <WarmRow key={c.id} c={c} scenario={scenario} onUnflag={() => toggle(c.id)} flagged />)}</tbody>
          </table>
        )}
      </section>

      <section className="cn-card cn-card--flush">

            <strong>Email sending is currently simulated.</strong> The builder generates realistic-shape analytics (opens, clicks, replies) so you can see the full flow.
            To go live, wire <span className="cn-mono">simulateSend()</span> in <span className="cn-mono">outreach.jsx</span> to your provider (Postmark, Resend, SendGrid).
          </div>
        </div>
      )}

      <div className="cn-toolbar" style={{ marginBottom: 16 }}>
        <div style={{ color: "var(--cn-mute)", fontSize: 13 }}>{list.length} campaign{list.length === 1 ? "" : "s"}</div>
        <button className="cn-btn cn-btn--primary" onClick={() => setBuilderOpen(true)}>+ New campaign</button>
      </div>

      {list.length === 0 ? (
        <section className="cn-card" style={{ textAlign: "center", padding: 60 }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>✉</div>
          <h3 style={{ fontFamily: "var(--cn-serif)", fontSize: 22, margin: "0 0 8px" }}>No campaigns yet</h3>
          <p style={{ color: "var(--cn-mute)", margin: "0 0 20px" }}>Build a multi-recipient email with images, CTAs, and track who opens and clicks.</p>
          <button className="cn-btn cn-btn--primary" onClick={() => setBuilderOpen(true)}>+ Build your first campaign</button>
        </section>
      ) : (
        <section className="cn-card cn-card--flush">
          <table className="cn-table">
            <thead>
              <tr>
                <th>Campaign</th>
                <th>Status</th>
                <th style={{ textAlign: "right" }}>Sent</th>
                <th style={{ textAlign: "right" }}>Open rate</th>
                <th style={{ textAlign: "right" }}>Click rate</th>
                <th>Sent at</th>
              </tr>
            </thead>
            <tbody>
              {list.map(c => {
                const s = campaignStats(c);
                return (
                  <tr key={c.id} className="cn-tr-link" onClick={() => setDetailId(c.id)}>
                    <td>
                      <div className="cn-cell-primary">{c.name}</div>
                      <div className="cn-cell-secondary">{c.subject || "—"}</div>
                    </td>
                    <td><span className={`cn-q-pill cn-camp-status--${c.status}`}>{c.status}</span></td>
                    <td className="cn-mono" style={{ textAlign: "right" }}>{s.sent.toLocaleString()}</td>
                    <td className="cn-mono" style={{ textAlign: "right" }}>{(s.openRate * 100).toFixed(1)}%</td>
                    <td className="cn-mono" style={{ textAlign: "right" }}>{(s.clickRate * 100).toFixed(1)}%</td>
                    <td className="cn-cell-secondary">{c.sentAt ? timeAgoSimple(c.sentAt) : "—"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </section>
      )}

      {builderOpen && <CampaignBuilder scenario={scenario} currentUser={currentUser} onClose={() => setBuilderOpen(false)} onSaved={(c) => { refresh(); setBuilderOpen(false); setDetailId(c.id); setToast({ title: `Sent “${c.name}”`, sub: `${(c.recipients || []).length} recipient${(c.recipients || []).length === 1 ? "" : "s"} · ${c.viaResend ? "tracking opens & clicks now" : "using simulated send"}` }); }} />}
      {detail && <CampaignDetail campaign={detail} scenario={scenario} onClose={() => setDetailId(null)} onDelete={() => { setList(deleteCampaign(detail.id)); setDetailId(null); }} />}
      {toast && (
        <div className="cn-toast cn-toast--success" role="status" aria-live="polite">
          <span className="cn-toast-tick">✓</span>
          <div style={{ flex: 1 }}>
            <div className="cn-toast-title">{toast.title}</div>
            <div className="cn-toast-sub">{toast.sub}</div>
          </div>
          <button className="cn-toast-x" onClick={() => setToast(null)} aria-label="Dismiss">✕</button>
        </div>
      )}
    </Fragment>
  );
}

// ── Campaign Builder (multi-step modal) ────────────────────────────────────
function CampaignBuilder({ scenario, currentUser, onClose, onSaved, initialManualIds }) {
  const [step, setStep] = useState(0);
  const [sending, setSending] = useState(false);
  const [sentResult, setSentResult] = useState(null);
  const [c, setC] = useState({
    id: newId("c"),
    name: "Untitled campaign",
    audienceMode: (initialManualIds && initialManualIds.length > 0) ? "manual" : "manual", // "manual" | "filter"
    manualIds: initialManualIds || [],          // array of contact IDs picked individually
    audience: { warmOnly: false, tiers: [], industries: [], hasEmail: true },
    subject: "",
    fromName: currentUser?.fullName || currentUser?.name || "",
    preheader: "",
    body: "Hi {{first_name}},\n\n",
    imageUrl: "",
    ctaText: "",
    ctaUrl: "",
    status: "draft",
    sentAt: null,
    events: [],
    createdAt: new Date().toISOString(),
  });

  const update = (patch) => setC(cc => ({ ...cc, ...patch }));
  const updateAudience = (patch) => setC(cc => ({ ...cc, audience: { ...cc.audience, ...patch } }));

  // Resolve current matches based on mode
  const matches = c.audienceMode === "manual"
    ? scenario.contacts.filter(x => c.manualIds.includes(x.id) && (c.audience.hasEmail === false || x.email))
    : applyAudience(c.audience, scenario);
  const industries = [...new Set(scenario.accounts.map(a => a.industry).filter(Boolean))].sort();

  const [templatePickerOpen, setTemplatePickerOpen] = useState(false);

  const applyTemplate = (t) => {
    if (!t) return;
    update({ subject: t.subject || c.subject, body: t.body || c.body });
    setTemplatePickerOpen(false);
  };

  const send = async () => {
    if (sending) return;
    setSending(true);
    const recipients = matches.map(ct => ({
      contactId: ct.id,
      email: ct.email,
      ctx: {
        first_name: (ct.name || "").split(" ")[0],
        last_name: (ct.name || "").split(" ").slice(1).join(" "),
        company: window.accountOf(ct.accountId, scenario)?.name || "",
        title: ct.title || "",
        sender_name: currentUser?.fullName || currentUser?.name || "",
      },
    }));
    const finalC = {
      ...c,
      recipients,
      senderEmail: currentUser?.email || null,
      status: "sent",
      sentAt: new Date().toISOString(),
    };
    // Append signature into body so providers send it as part of the message.
    const sig = (c.signature != null ? c.signature : readSignature()).trim();
    if (sig && !finalC.body.includes(sig)) {
      finalC.body = (finalC.body || "").replace(/\s+$/, "") + "\n\n" + sig;
    }

    // Try real send via Resend if enabled; fall back to simulation.
    let viaResend = false;
    if (window.SEND_VIA_RESEND) {
      try {
        const result = await window.sendCampaignViaResend(finalC, recipients);
        finalC.events = [];
        finalC.viaResend = true;
        viaResend = true;
        console.log("Resend send result:", result);
      } catch (err) {
        let msg = err.message || "";
        try {
          if (err.context && typeof err.context.json === "function") {
            const body = await err.context.json();
            msg = body.error + (body.details ? " — " + JSON.stringify(body.details) : "");
          }
        } catch {}
        if (!msg) msg = "Unknown error. Open browser console + Supabase Edge Functions logs.";
        console.error("Resend send failed:", err, msg);
        alert("Resend send failed:\n\n" + msg + "\n\nCheck Supabase Dashboard → Edge Functions → send-campaign → Logs for details.\n\nFalling back to simulated send so you can keep working.");
        finalC.events = simulateSend(finalC);
      }
    } else {
      finalC.events = simulateSend(finalC);
    }
    saveCampaign(finalC);
    setSending(false);
    setSentResult({ count: recipients.length, viaResend, campaign: finalC });
  };

  const finish = () => {
    if (sentResult) onSaved(sentResult.campaign);
  };

  const stepNames = ["Audience", "Content", "Review"];

  return (
    <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 160 }}>
      <div className="cn-modal cn-camp-modal" onClick={e => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div style={{ flex: 1 }}>
            <div className="cn-card-eyebrow">New email campaign · step {step + 1} of 3</div>
            <input className="cn-input cn-quote-num" value={c.name} onChange={e => update({ name: e.target.value })} />
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-camp-steps">
          {stepNames.map((s, i) => (
            <div key={s} className={`cn-camp-step ${i === step ? "is-current" : i < step ? "is-done" : ""}`} onClick={() => i < step && setStep(i)}>
              <span className="cn-camp-step-num">{i < step ? "✓" : i + 1}</span>
              <span>{s}</span>
            </div>
          ))}
        </div>

        <div className="cn-modal-body cn-camp-body">
          {step === 0 && (
            <Fragment>
              <div className="cn-camp-mode">
                <button className={`cn-camp-mode-tab ${c.audienceMode === "manual" ? "is-active" : ""}`} onClick={() => update({ audienceMode: "manual" })}>
                  <div className="cn-camp-mode-name">Pick recipients</div>
                  <div className="cn-camp-mode-sub">Hand-select specific contacts or paste in prospects</div>
                </button>
                <button className={`cn-camp-mode-tab ${c.audienceMode === "filter" ? "is-active" : ""}`} onClick={() => update({ audienceMode: "filter" })}>
                  <div className="cn-camp-mode-name">Filter contacts</div>
                  <div className="cn-camp-mode-sub">Send to everyone matching a set of rules</div>
                </button>
              </div>

              {c.audienceMode === "manual" && (
                <ManualRecipientPicker
                  scenario={scenario}
                  manualIds={c.manualIds}
                  onChange={(ids) => update({ manualIds: ids })}
                  onAddProspect={(prospect) => {
                    // create a synthetic contact in scenario for one-off prospects
                    const pid = "prospect-" + Math.random().toString(36).slice(2, 9);
                    scenario.contacts.push({ id: pid, name: prospect.name, email: prospect.email, title: prospect.note || "Prospect", accountId: null, tier: "Influencer" });
                    update({ manualIds: [...c.manualIds, pid] });
                  }}
                />
              )}

              {c.audienceMode === "filter" && (
                <Fragment>
                  <div className="cn-field">
                    <label>Audience filter</label>
                    <div className="cn-camp-audience">
                      <label className="cn-camp-check">
                        <input type="checkbox" checked={c.audience.warmOnly} onChange={e => updateAudience({ warmOnly: e.target.checked })} />
                        <span>Warm leads only <span style={{ color: "var(--cn-mute)" }}>({readWarmLeads().size} flagged)</span></span>
                      </label>
                      <label className="cn-camp-check">
                        <input type="checkbox" checked={c.audience.hasEmail !== false} onChange={e => updateAudience({ hasEmail: e.target.checked })} />
                        <span>Has email address</span>
                      </label>
                    </div>
                  </div>

                  <div className="cn-field">
                    <label>Contact tier</label>
                    <div className="cn-chip-row">
                      {["Champion", "Decision Maker", "Influencer", "Gatekeeper"].map(t => (
                        <button key={t} className={`cn-chip-btn ${c.audience.tiers.includes(t) ? "is-active" : ""}`}
                          onClick={() => updateAudience({ tiers: c.audience.tiers.includes(t) ? c.audience.tiers.filter(x => x !== t) : [...c.audience.tiers, t] })}>
                          {t}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="cn-field">
                    <label>Industry</label>
                    <div className="cn-chip-row">
                      {industries.map(i => (
                        <button key={i} className={`cn-chip-btn ${c.audience.industries.includes(i) ? "is-active" : ""}`}
                          onClick={() => updateAudience({ industries: c.audience.industries.includes(i) ? c.audience.industries.filter(x => x !== i) : [...c.audience.industries, i] })}>
                          {i}
                        </button>
                      ))}
                    </div>
                  </div>
                </Fragment>
              )}

              <div className="cn-camp-match">
                <div className="cn-card-eyebrow">Recipients</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 14, marginTop: 6 }}>
                  <div style={{ fontFamily: "var(--cn-serif)", fontSize: 44, lineHeight: 1, color: "var(--cn-copper)" }}>{matches.length}</div>
                  <div style={{ color: "var(--cn-mute)", fontSize: 13 }}>
                    {c.audienceMode === "manual" ? "hand-picked" : `of ${scenario.contacts.length} contacts`}
                  </div>
                </div>
                {matches.length > 0 && (
                  <div className="cn-stack-avatars" style={{ marginTop: 12 }}>
                    {matches.slice(0, 8).map(m => <span key={m.id} className="cn-avatar cn-avatar--xs">{m.name.split(" ").map(n => n[0]).join("").slice(0, 2)}</span>)}
                    {matches.length > 8 && <span className="cn-avatar cn-avatar--xs cn-avatar--more">+{matches.length - 8}</span>}
                  </div>
                )}
              </div>
            </Fragment>
          )}

          {step === 1 && (
            <Fragment>
              <div style={{ display: "flex", gap: 12, marginBottom: 18, alignItems: "center" }}>
                <button className="cn-btn cn-btn--ghost" onClick={() => setTemplatePickerOpen(true)}>↺ Start from template</button>
                <span style={{ color: "var(--cn-mute)", fontSize: 12.5 }}>Or write from scratch below.</span>
              </div>
              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>From name</label>
                  <input className="cn-input" value={c.fromName} onChange={e => update({ fromName: e.target.value })} placeholder="Anya Reinhardt" />
                </div>
                <div className="cn-field" style={{ flex: 2 }}>
                  <label>Subject line</label>
                  <input className="cn-input" value={c.subject} onChange={e => update({ subject: e.target.value })} placeholder="Quick question about sourcing — {{company}}" />
                </div>
              </div>
              <div className="cn-field">
                <label>Preheader <span style={{ color: "var(--cn-mute)", textTransform: "none", letterSpacing: 0, fontSize: 11 }}>· The preview text shown in inbox</span></label>
                <input className="cn-input" value={c.preheader} onChange={e => update({ preheader: e.target.value })} placeholder="A line that nudges people to open…" />
              </div>
              <div className="cn-field">
                <label>Hero image URL <span style={{ color: "var(--cn-mute)", textTransform: "none", letterSpacing: 0, fontSize: 11 }}>· Optional. Paste a URL or upload to your CDN.</span></label>
                <input className="cn-input cn-mono" style={{ fontSize: 12 }} value={c.imageUrl} onChange={e => update({ imageUrl: e.target.value })} placeholder="https://..." />
              </div>
              <div className="cn-field">
                <label>Body</label>
                <textarea className="cn-textarea" style={{ minHeight: 220 }} value={c.body} onChange={e => update({ body: e.target.value })} />
              </div>
              <SignatureField
                value={c.signature != null ? c.signature : readSignature()}
                onChange={(sig, saveAsDefault) => { update({ signature: sig }); if (saveAsDefault) writeSignature(sig); }}
              />
              <div className="cn-merge-help">
                <div className="cn-card-eyebrow">Merge fields</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
                  {["first_name", "last_name", "company", "title", "sender_name"].map(f => (
                    <button key={f} className="cn-chip-btn" onClick={() => update({ body: c.body + ` {{${f}}}` })}>{`{{${f}}}`}</button>
                  ))}
                </div>
              </div>
              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>CTA button text</label>
                  <input className="cn-input" value={c.ctaText} onChange={e => update({ ctaText: e.target.value })} placeholder="Book a 15-minute call" />
                </div>
                <div className="cn-field" style={{ flex: 2 }}>
                  <label>CTA URL</label>
                  <input className="cn-input cn-mono" style={{ fontSize: 12 }} value={c.ctaUrl} onChange={e => update({ ctaUrl: e.target.value })} placeholder="https://..." />
                </div>
              </div>
            </Fragment>
          )}

          {step === 2 && (
            <Fragment>
              <div className="cn-camp-review-strip">
                <div><div className="cn-strip-label">Recipients</div><div className="cn-strip-value">{matches.length}</div></div>
                <div><div className="cn-strip-label">From</div><div className="cn-strip-value" style={{ fontSize: 14 }}>{c.fromName || "—"}</div></div>
                <div><div className="cn-strip-label">Subject</div><div className="cn-strip-value" style={{ fontSize: 13 }}>{c.subject || "—"}</div></div>
              </div>
              <div className="cn-card-eyebrow" style={{ marginTop: 18, marginBottom: 8 }}>Email preview</div>
              <EmailPreview campaign={c} sampleContact={matches[0]} scenario={scenario} currentUser={currentUser} />
            </Fragment>
          )}
        </div>

        <footer className="cn-modal-foot">
          {sentResult ? (
            <Fragment>
              <div style={{ flex: 1, color: "var(--cn-pos)", fontWeight: 500, display: "flex", alignItems: "center", gap: 10 }}>
                <span className="cn-success-tick">✓</span>
                Sent to {sentResult.count} {sentResult.count === 1 ? "recipient" : "recipients"}. {sentResult.viaResend ? "Tracking opens & clicks now." : ""}
              </div>
              <button className="cn-btn cn-btn--primary" onClick={finish}>View analytics →</button>
            </Fragment>
          ) : (
            <Fragment>
              {step > 0 ? <button className="cn-btn cn-btn--ghost" onClick={() => setStep(step - 1)} disabled={sending}>← Back</button> : <button className="cn-btn cn-btn--ghost" onClick={onClose} disabled={sending}>Cancel</button>}
              <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
                {step < 2 && (
                  <button className="cn-btn cn-btn--primary" onClick={() => setStep(step + 1)} disabled={step === 0 && matches.length === 0}>
                    Next: {stepNames[step + 1]} →
                  </button>
                )}
                {step === 2 && (
                  <button className="cn-btn cn-btn--primary" onClick={send} disabled={sending || matches.length === 0 || !c.subject}>
                    {sending ? (
                      <Fragment>
                        <span className="cn-spinner"></span>
                        Sending…
                      </Fragment>
                    ) : (
                      <Fragment>
                        Send to {matches.length} {matches.length === 1 ? "recipient" : "recipients"} →
                      </Fragment>
                    )}
                  </button>
                )}
              </div>
            </Fragment>
          )}
        </footer>
      </div>
      {templatePickerOpen && (
        <TemplatePicker
          onClose={() => setTemplatePickerOpen(false)}
          onPick={applyTemplate}
        />
      )}
    </div>
  );
}

  const ctx = sampleContact ? {
    first_name: (sampleContact.name || "").split(" ")[0],
    last_name: (sampleContact.name || "").split(" ").slice(1).join(" "),
    company: window.accountOf(sampleContact.accountId, scenario)?.name || "",
    title: sampleContact.title || "",
    sender_name: currentUser?.fullName || currentUser?.name || campaign.fromName || "",
  } : { first_name: "Friend", company: "Acme Corp", sender_name: campaign.fromName || "You" };
  const subject = mergeFields(campaign.subject, ctx);
  const body = mergeFields(campaign.body, ctx);
  return (
    <div className="cn-email-preview">
      <div className="cn-email-header">
        <div><span className="cn-email-from">{campaign.fromName || "Sender name"}</span> <span className="cn-email-to">to {sampleContact?.email || "recipient@example.com"}</span></div>

          </div>
        )}
        <div className="cn-email-text">{body || "(empty body)"}</div>
        {campaign.ctaText && (
          <div style={{ textAlign: "center", margin: "24px 0 8px" }}>
            <a href={campaign.ctaUrl || "#"} className="cn-email-cta" onClick={e => e.preventDefault()}>{campaign.ctaText}</a>
          </div>
        )}
        <div className="cn-email-foot">
          Chief Negotiators · <a href="#" onClick={e => e.preventDefault()}>Unsubscribe</a>
        </div>
      </div>
    </div>
  );
}

// ── Campaign Detail / Analytics ────────────────────────────────────────────
function CampaignDetail({ campaign: campaignProp, scenario, onClose, onDelete }) {
  // Local copy of campaign so we can merge in polled events without depending on
  // the parent re-rendering through localStorage roundtrips.
  const [campaign, setCampaign] = useState(campaignProp);
  const [pollError, setPollError] = useState(null);

  // Always try to load real events from Supabase if a campaign id exists.
  // If RLS or network fails we'll surface the error instead of silently 0%.
  useEffect(() => {
    let mounted = true;
    const pull = async () => {
      if (!window.loadCampaignEvents) return;
      try {
        const events = await window.loadCampaignEvents(campaignProp.id);
        if (!mounted) return;
        const merged = { ...campaignProp, events, viaResend: true };
        setCampaign(merged);
        saveCampaign(merged); // also persist so the list view's rates update
        setPollError(null);
      } catch (e) {
        if (!mounted) return;
        console.error("loadCampaignEvents failed:", e);
        setPollError(e.message || String(e));
      }
    };
    pull();
    const id = setInterval(pull, 6000);
    return () => { mounted = false; clearInterval(id); };
  }, [campaignProp.id]);

  const s = campaignStats(campaign);
  const events = (campaign.events || []).filter(e => new Date(e.at).getTime() <= Date.now())
    .sort((a, b) => new Date(b.at) - new Date(a.at));

  // Build per-contact engagement
  const byContact = {};
  (campaign.recipients || []).forEach(r => {
    byContact[r.contactId] = { contactId: r.contactId, opened: false, openedAt: null, clicked: false, clickedAt: null, replied: false, bounced: false };
  });
  events.forEach(e => {
    if (!byContact[e.contactId]) return;
    if (e.type === "opened" && !byContact[e.contactId].opened) { byContact[e.contactId].opened = true; byContact[e.contactId].openedAt = e.at; }
    if (e.type === "clicked") { byContact[e.contactId].clicked = true; byContact[e.contactId].clickedAt = e.at; }
    if (e.type === "replied") byContact[e.contactId].replied = true;
    if (e.type === "bounced") byContact[e.contactId].bounced = true;
  });
  const engaged = Object.values(byContact).filter(b => b.opened || b.clicked).sort((a, b) => {
    // rank: clicked > opened
    const rank = (b) => (b.clicked ? 2 : 0) + (b.opened ? 1 : 0);
    return rank(b) - rank(a);
  });

  // Build hourly opens chart for last 24h
  const buckets = new Array(24).fill(0);
  const sentTime = new Date(campaign.sentAt || Date.now()).getTime();
  events.filter(e => e.type === "opened").forEach(e => {
    const hoursSinceSend = Math.floor((new Date(e.at).getTime() - sentTime) / 3_600_000);
    if (hoursSinceSend >= 0 && hoursSinceSend < 24) buckets[hoursSinceSend]++;
  });
  const maxBucket = Math.max(...buckets, 1);

  return (
    <div className="cn-modal-scrim" onClick={onClose} style={{ zIndex: 160 }}>
      <div className="cn-modal cn-camp-modal" onClick={e => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">Campaign analytics</div>
            <h2 className="cn-modal-title">{campaign.name}</h2>
            <div style={{ color: "var(--cn-mute)", fontSize: 12.5, marginTop: 4 }}>
              {campaign.subject} · sent {timeAgoSimple(campaign.sentAt)}
            </div>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-modal-body">
          {pollError && (
            <div className="cn-login-error" style={{ marginBottom: 18 }}>

// ── Banner / hero image picker ─────────────────────────────────────────────
function BannerImagePicker({ value, onChange, label = "Banner image" }) {
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    if (f.size > 1_500_000) {
      if (!confirm("This image is larger than 1.5MB and may be stripped by some email clients. Use it anyway?")) return;
    }
    const reader = new FileReader();
    reader.onload = () => onChange(reader.result);
    reader.readAsDataURL(f);
    e.target.value = "";
  };
  return (
    <div className="cn-field">
      <label>{label} <span style={{ color: "var(--cn-mute)", textTransform: "none", letterSpacing: 0, fontSize: 11 }}>· optional, upload or paste a URL</span></label>
      <div className="cn-img-picker">
        <div className="cn-img-picker-thumb">
          {value ? <img src={value} alt="banner" /> : <span>no image</span>}
        </div>
        <div className="cn-img-picker-controls">
          <div className="cn-img-picker-row">
            <label className="cn-img-picker-upload">
              ⤴ Upload image
              <input type="file" accept="image/*" onChange={onFile} />
            </label>
            {value && <button type="button" className="cn-img-picker-clear" onClick={() => onChange("")}>Remove</button>}
          </div>
          <input
            className="cn-input cn-mono"
            style={{ fontSize: 12 }}
            value={value && value.startsWith("data:") ? "" : (value || "")}
            onChange={(e) => onChange(e.target.value)}
            placeholder={value && value.startsWith("data:") ? "(uploaded file — replace by pasting a URL)" : "https://..."}
          />
        </div>
      </div>
    </div>
  );
}
