        owner_id: draft.ownerId || null,
      });
      window.cnToast && window.cnToast({ title: `Saved ${draft.name.trim()}`, sub: "Contact updated" });
      onSaved && onSaved();
      setEditing(false);
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  const deleteContact = async () => {
    if (!confirm(`Delete ${contact.name}? Their activities and deals will stay in the timeline but be unlinked.`)) return;
    setBusy(true); setError(null);
    try {
      await window.deleteContact(contact.id);
      window.cnToast && window.cnToast({ title: `Deleted ${contact.name}`, kind: "success" });
      onSaved && onSaved();
      onBack();
    } catch (e) { setError(e.message); setBusy(false); }
  };

  return (
    <div className="cn-page cn-page--detail">
      <div className="cn-detail-head">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button className="cn-back" onClick={onBack}>← Back</button>
          {!editing ? (
            <div style={{ display: "flex", gap: 8 }}>
              <button className="cn-btn cn-btn--primary" onClick={() => setComposeOpen(true)} disabled={!contact?.email} title={contact?.email ? "" : "No email on file"}>✉ Email</button>
              <button className="cn-btn cn-btn--ghost" onClick={() => {
                if (contactOpps.length === 0) {
                  if (confirm("This contact has no deals yet. Create one first?")) onNewOpp && onNewOpp(contact);
                  return;
                }
                setQuickQuoteOppId(contactOpps.length === 1 ? contactOpps[0].id : "ask");
              }}>$ Quote</button>
              <button className="cn-btn cn-btn--ghost" onClick={() => setEditing(true)}>Edit contact</button>
              <button className="cn-btn cn-btn--danger" onClick={deleteContact} disabled={busy}>Delete</button>
            </div>
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <button className="cn-btn cn-btn--ghost" onClick={() => setEditing(false)} disabled={busy}>Cancel</button>
              <button className="cn-btn cn-btn--primary" onClick={saveEdits} disabled={busy}>{busy ? "Saving…" : "Save"}</button>
            </div>
          )}
        </div>

        <div className="cn-detail-hero">
          <div className="cn-avatar cn-avatar--xl">{draft.name.split(" ").map(n => n[0]).join("").slice(0, 2) || "?"}</div>
          <div className="cn-detail-meta">
            {editing ? (
              <div className="cn-card-eyebrow" style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span>Company</span>
                <select
                  className="cn-input"
                  style={{ width: "auto", padding: "4px 10px", fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase" }}
                  value={draft.accountId || ""}
                  onChange={e => setDraft(d => ({ ...d, accountId: e.target.value }))}
                >
                  <option value="">— None —</option>
                  {scenario.accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                </select>
              </div>
            ) : (
              <div className="cn-card-eyebrow">{account?.name || "—"}{account?.industry ? " · " + account.industry : ""}</div>
            )}
            {editing ? (
              <Fragment>
                <input className="cn-input cn-detail-name-input" value={draft.name} onChange={e => setDraft(d => ({ ...d, name: e.target.value }))} />
                <input className="cn-input cn-detail-sub-input" value={draft.title} onChange={e => setDraft(d => ({ ...d, title: e.target.value }))} placeholder="Title" />
              </Fragment>
            ) : (
              <Fragment>
                <h1 className="cn-detail-name">{contact.name}</h1>
                <div className="cn-detail-sub">{contact.title || "—"}{account?.hq ? " · " + account.hq : ""}</div>
              </Fragment>
            )}
            <div className="cn-detail-chips">
              {editing ? (
                <Fragment>
                  <select className="cn-input" style={{ width: "auto", padding: "4px 10px" }} value={draft.tier} onChange={e => setDraft(d => ({ ...d, tier: e.target.value }))}>
                    {["Champion", "Decision Maker", "Influencer", "Gatekeeper"].map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <select className="cn-input" style={{ width: "auto", padding: "4px 10px" }} value={draft.ownerId} onChange={e => setDraft(d => ({ ...d, ownerId: e.target.value }))}>
                    <option value="">— Unassigned —</option>
                    {window.REPS.map(r => <option key={r.id} value={r.id}>Owner: {r.name}</option>)}
                  </select>
                </Fragment>
              ) : (
                <Fragment>
                  <span className={`cn-tier cn-tier--${tier.toLowerCase().replace(" ", "-")}`}>{tier}</span>
                  {(() => {
                    const owner = contact.ownerId && window.repOf(contact.ownerId);
                    return owner ? (
                      <span className="cn-chip" style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                        <span className="cn-avatar cn-avatar--xs cn-avatar--copper">{owner.initials}</span>
                        Owned by {owner.name}
                      </span>
                    ) : (
                      <span className="cn-chip" style={{ fontStyle: "italic" }}>Unassigned</span>
                    );
                  })()}
                </Fragment>
              )}
              {contact.lastTouch && <span className="cn-chip">Last touch · {contact.lastTouch}</span>}
            </div>
          </div>
          {!editing && (
            <div className="cn-detail-actions">
              <button className="cn-btn cn-btn--ghost" onClick={onLogCall}>☎ Log call</button>
              <button className="cn-btn cn-btn--primary" onClick={() => onNewOpp && onNewOpp(contact.id)}>+ New opportunity</button>
            </div>
          )}
        </div>

        {error && <div className="cn-login-error" style={{ marginTop: 12 }}>{error}</div>}

        <div className="cn-detail-strip">
          <div className="cn-strip-item">
            <div className="cn-strip-label">Open pipeline</div>
            <div className="cn-strip-value">{window.fmtUSD(totalOpen, { compact: true })}</div>
          </div>
          <div className="cn-strip-item">
            <div className="cn-strip-label">Closed with us</div>
            <div className="cn-strip-value">{window.fmtUSD(totalWon, { compact: true })}</div>
          </div>
          <div className="cn-strip-item">
            <div className="cn-strip-label">Email</div>
            {editing ? (
              <input className="cn-input cn-mono" style={{ marginTop: 2, fontSize: 12 }} value={draft.email} onChange={e => setDraft(d => ({ ...d, email: e.target.value }))} placeholder="email" />
            ) : (
              <div className="cn-strip-value cn-strip-value--mono">{contact.email || "—"}</div>
            )}
          </div>
          <div className="cn-strip-item">
            <div className="cn-strip-label">Direct</div>
            {editing ? (
              <input className="cn-input cn-mono" style={{ marginTop: 2, fontSize: 12 }} value={draft.phone} onChange={e => setDraft(d => ({ ...d, phone: e.target.value }))} placeholder="phone" />
            ) : (
              <div className="cn-strip-value cn-strip-value--mono">{contact.phone || "—"}</div>
            )}
          </div>
        </div>
      </div>

      <div className="cn-detail-body">
        <div className="cn-detail-main">
          <div className="cn-tabs cn-tabs--underline">
            {[
              { id: "timeline", label: "Timeline" },
              { id: "calls", label: `Calls (${activities.filter(a => a.type === "call").length})` },
              { id: "emails", label: `Emails (${activities.filter(a => a.type === "email").length})` },
              { id: "notes", label: "Notes" },
              { id: "files", label: "Files" },
            ].map(t => (
              <button key={t.id} className={`cn-tab ${tab === t.id ? "is-active" : ""}`} onClick={() => setTab(t.id)}>
                {t.label}
              </button>
            ))}
          </div>

          <div className="cn-timeline">
            {(tab === "timeline" ? activities : activities.filter(a => a.type === tab.slice(0, -1))).map((a, i) => (
              <div key={a.id} className="cn-tl-item cn-tl-item--clickable" onClick={() => onEditActivity && onEditActivity(a)}>
                <div className="cn-tl-spine">
                  <div className={`cn-tl-dot cn-tl-dot--${a.type}`}>
                    {a.type === "call" && "☎"}
                    {a.type === "email" && "✉"}
                    {a.type === "note" && "✎"}
                    {a.type === "won" && "✓"}
                  </div>
                  {i < activities.length - 1 && <div className="cn-tl-line"></div>}
                </div>
                <div className="cn-tl-content">
                  <div className="cn-tl-head">
                    <span className="cn-tl-title">
                      {a.type === "call" && "Call logged"}
                      {a.type === "email" && a.subject}
                      {a.type === "note" && "Internal note"}
                      {a.type === "won" && "Deal won"}
                    </span>
                    <span className="cn-tl-when">{a.when}</span>
                  </div>
                  <div className="cn-tl-meta">
                    <span className="cn-avatar cn-avatar--xs">{window.repOf(a.ownerId).initials}</span>
                    <span>{window.repOf(a.ownerId).name}</span>
                    {a.duration && <span>· {a.duration} min</span>}
                    {a.sentiment && <span className={`cn-chip cn-chip--${a.sentiment}`}>{a.sentiment}</span>}
                  </div>
                  {a.summary && <p className="cn-tl-body">{a.summary}</p>}
                  {a.snippet && <p className="cn-tl-body cn-tl-body--quote">{a.snippet}</p>}
                  {a.recording && (
                    <div className="cn-recording">
                      <button className="cn-play">▶</button>
                      <div className="cn-wave">
                        {Array.from({ length: 48 }).map((_, j) => (
                          <span key={j} style={{ height: `${20 + Math.abs(Math.sin(j * 0.7 + a.id.length)) * 60}%` }}></span>
                        ))}
                      </div>
                      <span className="cn-mono cn-recording-dur">{Math.floor(a.duration / 60) || 0}:{String(a.duration % 60).padStart(2, "0")}</span>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>

        <aside className="cn-detail-side">
          <section className="cn-card">
            <h3 className="cn-side-title">Open opportunities</h3>
            <div className="cn-side-list">
              {contactOpps.filter(o => o.stage !== "won" && o.stage !== "lost").map(o => (
                <div key={o.id} className="cn-side-deal" onClick={() => onOpenOpp && onOpenOpp(o.id)}>
                  <div className="cn-side-deal-title">{o.title}</div>
                  <div className="cn-side-deal-meta">
                    <StagePill stage={o.stage} />
                    <span className="cn-mono">{window.fmtUSD(o.value, { compact: true })}</span>
                  </div>
                </div>
              ))}
              {contactOpps.filter(o => o.stage !== "won" && o.stage !== "lost").length === 0 && (
                <div className="cn-side-empty">No open deals.</div>
              )}
            </div>
          </section>

          <section className="cn-card">
            <h3 className="cn-side-title">Account</h3>
            <div className="cn-side-acct">
              <div className="cn-side-acct-name">{account.name}</div>
              <div className="cn-side-acct-row"><span>Industry</span><span>{account.industry}</span></div>
              <div className="cn-side-acct-row"><span>HQ</span><span>{account.hq}</span></div>
              <div className="cn-side-acct-row"><span>Headcount</span><span className="cn-mono">{account.size}</span></div>
              <div className="cn-side-acct-row"><span>Web</span><span className="cn-mono">{account.website}</span></div>
            </div>
          </section>

          <section className="cn-card">
            <h3 className="cn-side-title">Other contacts at {account.name}</h3>
            <div className="cn-side-list">
              {scenario.contacts.filter(c => c.accountId === account.id && c.id !== contact.id).map(c => (
                <button key={c.id} className="cn-side-person" onClick={() => window.location.hash = `#contact-${c.id}`}>
                  <span className="cn-avatar cn-avatar--xs">{c.name.split(" ").map(n => n[0]).join("").slice(0, 2)}</span>
                  <span>
                    <div className="cn-side-person-name">{c.name}</div>
                    <div className="cn-side-person-title">{c.title}</div>
                  </span>
                </button>
              ))}
            </div>
          </section>
        </aside>
      </div>
      {composeOpen && window.ContactComposeDrawer && (
        <window.ContactComposeDrawer
          scenario={scenario}
          currentUser={currentUser}
          initialContactId={contact.id}
          onClose={() => setComposeOpen(false)}
          onSaved={() => { onSaved && onSaved(); }}
        />
      )}
      {quickQuoteOppId && window.QuickQuoteFromContact && (
        <window.QuickQuoteFromContact
          scenario={scenario}
          contact={contact}
          oppId={quickQuoteOppId}
          currentUser={currentUser}
          onClose={() => setQuickQuoteOppId(null)}
        />
      )}
    </div>
  );
}

Object.assign(window, { Pipeline, Contacts, ContactDetail });

</script>
<script type="text/babel" data-source="reports.jsx">
// Reports, Activity, Accounts screens
function Reports({ scenario, currentUser, isFounder, permissions }) {
  const opps = scenario.opps;
  const restricted = !isFounder && permissions === "strict";
  const won = opps.filter(o => o.stage === "won");
  const visibleWon = restricted ? won.filter(o => o.ownerId === currentUser.id) : won;
  const totalRevenue = visibleWon.reduce((s, o) => s + o.value, 0);
  const totalCommission = visibleWon.reduce((s, o) => s + o.value * o.commissionRate, 0);

  // Commission by rep (filtered if restricted)
  const visibleReps = restricted ? window.REPS.filter(r => r.id === currentUser.id) : window.REPS;
  const byRep = visibleReps.map(rep => {
    const repWon = won.filter(o => o.ownerId === rep.id);
    const repOpen = opps.filter(o => o.ownerId === rep.id && o.stage !== "won" && o.stage !== "lost");
    const repCommission = repWon.reduce((s, o) => s + o.value * o.commissionRate, 0);
    const repProjected = repOpen.reduce((s, o) => s + o.value * o.commissionRate * window.stageOf(o.stage).prob, 0);
    const repRevenue = repWon.reduce((s, o) => s + o.value, 0);
    return { rep, repWon, repOpen, repCommission, repProjected, repRevenue };
  });

  // Commission by product
  const byProduct = {};
  visibleWon.forEach(o => {
    const cat = o.product.split("—")[0].trim();
    if (!byProduct[cat]) byProduct[cat] = { revenue: 0, commission: 0, count: 0 };
    byProduct[cat].revenue += o.value;
    byProduct[cat].commission += o.value * o.commissionRate;
    byProduct[cat].count += 1;
  });
  const productList = Object.entries(byProduct).map(([name, d]) => ({ name, ...d }));
  const maxProductRev = Math.max(...productList.map(p => p.revenue), 1);

  // Monthly revenue chart (faked from data)
  const months = ["Jan", "Feb", "Mar", "Apr", "May"];
  const monthlyRev = [180_000, 720_000, 290_000, 540_000, 1_650_000];
  const maxMonth = Math.max(...monthlyRev);

  return (
    <div className="cn-page">
      {restricted && (
        <div className="cn-perm-banner">
          <span className="cn-perm-icon">⚿</span>
          <span><strong>Permission scope · Strict.</strong> You can see your own commission only. Team-wide reports are restricted to Founder access.</span>
        </div>
      )}
      <section className="cn-kpi-row">
        <div className="cn-kpi cn-kpi--hero">
          <div className="cn-kpi-eyebrow">{restricted ? "Your" : "Team"} · Closed revenue · YTD</div>
          <div className="cn-kpi-value">{window.fmtUSD(totalRevenue, { compact: true })}</div>
          <div className="cn-kpi-foot"><span className="cn-pos">▲ 22.4%</span><span className="cn-kpi-foot-sep">vs YTD 2025</span></div>
        </div>
        <div className="cn-kpi">
          <div className="cn-kpi-eyebrow">Commission paid</div>
          <div className="cn-kpi-value cn-kpi-value--copper">{window.fmtUSD(totalCommission, { compact: true })}</div>
          <div className="cn-kpi-foot"><span>{visibleWon.length} deals settled</span></div>
        </div>
        <div className="cn-kpi">
          <div className="cn-kpi-eyebrow">Avg deal size</div>
          <div className="cn-kpi-value">{window.fmtUSD(visibleWon.length ? totalRevenue / visibleWon.length : 0, { compact: true })}</div>
          <div className="cn-kpi-foot"><span>Median {window.fmtUSD(visibleWon.length ? visibleWon.sort((a,b) => a.value - b.value)[Math.floor(visibleWon.length/2)].value : 0, { compact: true })}</span></div>
        </div>
        <div className="cn-kpi">
          <div className="cn-kpi-eyebrow">Sales cycle</div>
          <div className="cn-kpi-value">62<span className="cn-kpi-unit">days</span></div>
          <div className="cn-kpi-foot"><span>Created → Closed Won, median</span></div>
        </div>
      </section>

      <div className="cn-grid-2">
        <section className="cn-card">
          <div className="cn-card-head">
            <div>
              <div className="cn-card-eyebrow">Revenue curve</div>
              <h2 className="cn-card-title">Monthly closed revenue</h2>
            </div>
            <div className="cn-legend">
              <span className="cn-legend-dot cn-legend-dot--ink"></span>2026
              <span className="cn-legend-dot cn-legend-dot--copper" style={{ marginLeft: 16 }}></span>2025
            </div>
          </div>
          <div className="cn-chart">
            <div className="cn-chart-bars">
              {monthlyRev.map((v, i) => (
                <div key={i} className="cn-chart-col">
                  <div className="cn-chart-stack">
                    <div className="cn-chart-bar cn-chart-bar--prior" style={{ height: `${(monthlyRev[i] * 0.7 / maxMonth) * 100}%` }}></div>
                    <div className="cn-chart-bar" style={{ height: `${(v / maxMonth) * 100}%` }}></div>
                  </div>
                  <div className="cn-chart-x">{months[i]}</div>
                  <div className="cn-chart-val cn-mono">{window.fmtUSD(v, { compact: true })}</div>
                </div>
              ))}
            </div>
          </div>
        </section>

        <section className="cn-card">
          <div className="cn-card-head">
            <div>
              <div className="cn-card-eyebrow">Revenue mix</div>
              <h2 className="cn-card-title">By product line</h2>
            </div>
          </div>
          <div className="cn-bars-vert">
            {productList.map(p => (
              <div key={p.name} className="cn-vbar">
                <div className="cn-vbar-head">
                  <span className="cn-vbar-name">{p.name}</span>
                  <span className="cn-vbar-vals">
                    <span className="cn-mono">{window.fmtUSD(p.revenue, { compact: true })}</span>
                    <span className="cn-vbar-comm cn-copper cn-mono">+{window.fmtUSD(p.commission, { compact: true })}</span>
                  </span>
                </div>
                <div className="cn-vbar-track">
                  <div className="cn-vbar-fill" style={{ width: `${(p.revenue / maxProductRev) * 100}%` }}></div>
                </div>
                <div className="cn-vbar-meta">{p.count} deal{p.count > 1 ? "s" : ""}</div>
              </div>
            ))}
          </div>
        </section>
      </div>

      <section className="cn-card">
        <div className="cn-card-head">
          <div>
            <div className="cn-card-eyebrow">Compensation</div>
            <h2 className="cn-card-title">Commission breakdown by rep</h2>
          </div>
          <div className="cn-legend">
            <span className="cn-mono cn-cell-secondary">Flat % of deal value · varies by deal</span>
          </div>
        </div>
        <table className="cn-table">
          <thead>
            <tr>
              <th>Rep</th>
              <th style={{ textAlign: "right" }}>Deals won</th>
              <th style={{ textAlign: "right" }}>Open deals</th>
              <th style={{ textAlign: "right" }}>Revenue · YTD</th>
              <th style={{ textAlign: "right" }}>Commission earned</th>
              <th style={{ textAlign: "right" }}>Projected (weighted)</th>
            </tr>
          </thead>
          <tbody>
            {byRep.map(({ rep, repWon, repOpen, repRevenue, repCommission, repProjected }) => {
              const isMe = rep.id === currentUser.id;
              return (
                <tr key={rep.id} className={isMe ? "cn-tr-highlight" : ""}>
                  <td>
                    <div className="cn-row-person">
                      <span className="cn-avatar cn-avatar--copper">{rep.initials}</span>
                      <span>
                        <div className="cn-cell-primary">{rep.name}{isMe && <span className="cn-you-tag"> · you</span>}</div>
                        <div className="cn-cell-secondary">{rep.role}</div>
                      </span>
                    </div>
                  </td>
                  <td className="cn-mono" style={{ textAlign: "right" }}>{repWon.length}</td>
                  <td className="cn-mono" style={{ textAlign: "right" }}>{repOpen.length}</td>
                  <td className="cn-mono" style={{ textAlign: "right" }}>{window.fmtUSD(repRevenue, { compact: true })}</td>
                  <td className="cn-mono cn-copper" style={{ textAlign: "right" }}>{window.fmtUSD(repCommission, { compact: true })}</td>
                  <td className="cn-mono cn-cell-secondary" style={{ textAlign: "right" }}>+{window.fmtUSD(repProjected, { compact: true })}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </section>

      <section className="cn-card">
        <div className="cn-card-head">
          <div>
            <div className="cn-card-eyebrow">Settled payouts</div>
            <h2 className="cn-card-title">Recent commission events</h2>
          </div>
          <button className="cn-link">Export CSV →</button>
        </div>
        <table className="cn-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Deal</th>
              <th>Account</th>
              <th>Rep</th>
              <th style={{ textAlign: "right" }}>Deal value</th>
              <th style={{ textAlign: "right" }}>Rate</th>
              <th style={{ textAlign: "right" }}>Commission</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            {visibleWon.map(o => {
              const acct = window.accountOf(o.accountId, scenario);
              const rep = window.repOf(o.ownerId);
              return (
                <tr key={o.id}>
                  <td className="cn-mono cn-cell-secondary">{o.close}</td>
                  <td className="cn-cell-primary">{o.title}</td>
                  <td>{acct.name}</td>
                  <td><span className="cn-avatar cn-avatar--xs">{rep.initials}</span> <span style={{ marginLeft: 6 }}>{rep.name}</span></td>
                  <td className="cn-mono" style={{ textAlign: "right" }}>{window.fmtUSD(o.value, { compact: true })}</td>
                  <td className="cn-mono cn-cell-secondary" style={{ textAlign: "right" }}>{(o.commissionRate * 100).toFixed(1)}%</td>
                  <td className="cn-mono cn-copper" style={{ textAlign: "right" }}>{window.fmtUSD(o.value * o.commissionRate, { compact: true })}</td>
                  <td><span className="cn-status cn-status--paid">Paid</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </section>
    </div>
  );
}

function Accounts({ scenario, onOpenContact, onNewAccount, onEditAccount }) {
  if (scenario.accounts.length === 0) {
    return (
      <div className="cn-page">
        <section className="cn-card" style={{ textAlign: "center", padding: 60 }}>
          <h3 style={{ fontFamily: "var(--cn-serif)", fontSize: 22, margin: "0 0 8px" }}>No accounts yet</h3>
          <p style={{ color: "var(--cn-mute)", margin: "0 0 20px" }}>Companies you sell to live here. Each contact and deal belongs to an account.</p>
          <button className="cn-btn cn-btn--primary" onClick={onNewAccount}>+ Add your first account</button>
        </section>
      </div>
    );
  }
  return (
    <div className="cn-page">
      <div className="cn-toolbar">
        <div></div>
        <div className="cn-toolbar-right">
          <button className="cn-btn cn-btn--primary" onClick={onNewAccount}>+ New account</button>
        </div>
      </div>
      <section className="cn-card cn-card--flush">
        <table className="cn-table">
          <thead>
            <tr>
              <th>Account</th>
              <th>Owner</th>
              <th>Industry</th>
              <th>HQ</th>
              <th>Headcount</th>
              <th style={{ textAlign: "right" }}>Open pipeline</th>
              <th style={{ textAlign: "right" }}>Closed</th>
              <th>Contacts</th>
            </tr>
          </thead>
          <tbody>
            {scenario.accounts.map(a => {
              const acctOpps = scenario.opps.filter(o => o.accountId === a.id);
              const open = acctOpps.filter(o => o.stage !== "won" && o.stage !== "lost").reduce((s, o) => s + o.value, 0);
              const closed = acctOpps.filter(o => o.stage === "won").reduce((s, o) => s + o.value, 0);
              const contacts = scenario.contacts.filter(c => c.accountId === a.id);
              const owner = a.ownerId && window.repOf(a.ownerId);
              return (
                <tr key={a.id} className="cn-tr-link" onClick={() => onEditAccount(a)}>
                  <td>
                    <div className="cn-cell-primary">{a.name}</div>
                    <div className="cn-cell-secondary cn-mono">{a.website}</div>
                  </td>
                  <td>
                    {owner ? (
                      <div className="cn-row-person">
                        <span className="cn-avatar cn-avatar--xs cn-avatar--copper">{owner.initials}</span>
                        <span style={{ fontSize: 12.5 }}>{owner.name}</span>
                      </div>
                    ) : (
                      <span className="cn-cell-secondary" style={{ fontStyle: "italic" }}>Unassigned</span>
                    )}
                  </td>
                  <td>{a.industry}</td>
                  <td>{a.hq}</td>
                  <td className="cn-mono">{a.size}</td>
                  <td className="cn-mono" style={{ textAlign: "right" }}>{window.fmtUSD(open, { compact: true })}</td>
                  <td className="cn-mono cn-copper" style={{ textAlign: "right" }}>{window.fmtUSD(closed, { compact: true })}</td>
                  <td>
                    <div className="cn-stack-avatars" onClick={(e) => e.stopPropagation()}>
                      {contacts.slice(0, 3).map(c => (
                        <span key={c.id} className="cn-avatar cn-avatar--xs" onClick={() => onOpenContact(c.id)} title={c.name}>
                          {c.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
                        </span>
                      ))}
                      {contacts.length > 3 && <span className="cn-avatar cn-avatar--xs cn-avatar--more">+{contacts.length - 3}</span>}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </section>
    </div>
  );
}

function ActivityScreen({ scenario, onOpenContact, onOpenOpp, onLogCall }) {
  const [filter, setFilter] = useState("all");
  const filtered = scenario.activities.filter(a => filter === "all" || a.type === filter);

  return (
    <div className="cn-page">
      <div className="cn-toolbar">
        <div className="cn-tabs">
          {[
            { id: "all", label: "Everything" },
            { id: "call", label: "Calls" },
            { id: "email", label: "Emails" },
            { id: "note", label: "Notes" },
            { id: "task", label: "Tasks" },
          ].map(t => (
            <button key={t.id} className={`cn-tab ${filter === t.id ? "is-active" : ""}`} onClick={() => setFilter(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="cn-toolbar-right">
          <button className="cn-btn cn-btn--ghost">Export</button>
          <button className="cn-btn cn-btn--primary" onClick={onLogCall}>☎ Log call</button>
        </div>
      </div>

      <section className="cn-card">
        <ul className="cn-feed">
          {filtered.map(a => {
            const c = a.contactId && window.contactOf(a.contactId, scenario);
            const acct = c && window.accountOf(c.accountId, scenario);
            const opp = a.oppId && scenario.opps.find(o => o.id === a.oppId);
            return (
              <li key={a.id} className="cn-feed-item cn-feed-item--clickable" onClick={() => onEditActivity && onEditActivity(a)}>
                <div className={`cn-feed-icon cn-feed-icon--${a.type}`}>
                  {a.type === "call" && "☎"}
                  {a.type === "email" && "✉"}
                  {a.type === "note" && "✎"}
                  {a.type === "won" && "✓"}
                  {a.type === "task" && "◯"}
                </div>
                <div className="cn-feed-body">
                  <div className="cn-feed-head">
                    <span className="cn-feed-who">
                      <span className="cn-avatar cn-avatar--xs">{window.repOf(a.ownerId).initials}</span>
                      <strong>{window.repOf(a.ownerId).name.split(" ")[0]}</strong>
                      <span className="cn-feed-verb">
                        {a.type === "call" && "called"}
                        {a.type === "email" && "emailed"}
                        {a.type === "note" && "noted"}
                        {a.type === "task" && "scheduled"}
                        {a.type === "won" && "closed"}
                      </span>
                      {c && <button className="cn-link-inline" onClick={() => onOpenContact(c.id)}>{c.name}</button>}
                    </span>
                    <span className="cn-feed-when">{a.when}</span>
                  </div>
                  {a.summary && <p className="cn-feed-text">{a.summary}</p>}
                  {a.subject && (
                    <div className="cn-feed-email">
                      <div className="cn-feed-email-subj">{a.subject}</div>
                      <div className="cn-feed-email-snip">{a.snippet}</div>
                    </div>
                  )}
                  <div className="cn-feed-foot">
                    {a.duration && <span className="cn-chip">{a.duration} min</span>}
                    {a.sentiment && <span className={`cn-chip cn-chip--${a.sentiment}`}>{a.sentiment}</span>}
                    {opp && <span className="cn-feed-link" onClick={() => onOpenOpp && onOpenOpp(opp.id)}>{opp.title}</span>}
                    {acct && <span className="cn-feed-acct">· {acct.name}</span>}
                  </div>
                </div>
              </li>
            );
          })}
        </ul>
      </section>
    </div>
  );
}

Object.assign(window, { Reports, Accounts, ActivityScreen });

</script>
<script type="text/babel" data-source="modals.jsx">
// Modals/drawers: Log Call, New Opportunity, Opp Detail, New Contact, New Account
// All wired to Supabase via window.insertActivity / insertOpportunity / insertContact / insertAccount.

function LogCallDrawer({ open, onClose, scenario, currentUser, onSaved }) {
  const [contactId, setContactId] = useState(scenario.contacts[0]?.id || "");
  const [oppLink, setOppLink] = useState("");
  const [duration, setDuration] = useState(25);
  const [sentiment, setSentiment] = useState("positive");
  const [outcome, setOutcome] = useState("Advance to negotiation");
  const [summary, setSummary] = useState("");
  const [isRecording, setIsRecording] = useState(false);
  const [recordingTime, setRecordingTime] = useState(0);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (!isRecording) return;
    const t = setInterval(() => setRecordingTime(s => s + 1), 1000);
    return () => clearInterval(t);
  }, [isRecording]);

  useEffect(() => {
    if (open) {
      setContactId(scenario.contacts[0]?.id || "");
      setOppLink("");
      setDuration(25);
      setSentiment("positive");
      setSummary("");
      setIsRecording(false);
      setRecordingTime(0);
      setError(null);
    }
  }, [open]);

  if (!open) return null;

  if (scenario.contacts.length === 0) {
    return (
      <div className="cn-drawer-scrim" onClick={onClose}>
        <aside className="cn-drawer" onClick={e => e.stopPropagation()}>
          <header className="cn-drawer-head">
            <div>
              <div className="cn-card-eyebrow">Log call</div>
              <h2 className="cn-drawer-title">No contacts yet</h2>
            </div>
            <button className="cn-icon-btn" onClick={onClose}>✕</button>
          </header>
          <div className="cn-drawer-body">
            <p style={{ color: "var(--cn-mute)", lineHeight: 1.6 }}>
              Add a contact first, then you can log calls against them. Go to Contacts &rarr; New contact.
            </p>
          </div>
        </aside>
      </div>
    );
  }

  const contact = scenario.contacts.find(c => c.id === contactId) || scenario.contacts[0];
  const account = window.accountOf(contact.accountId, scenario);
  const contactOpps = scenario.opps.filter(o => o.contactId === contactId);

  const isDirty = () => summary.trim().length > 0 || isRecording;

  const save = async () => {
    setSaving(true);
    setError(null);
    try {
      await window.insertActivity({
        type: "call",
        owner_id: currentUser?.id,
        contact_id: contactId,
        opportunity_id: oppLink || null,
        duration_min: duration,
        summary,
        sentiment,
        occurred_at: new Date().toISOString(),
      });
      const cName = scenario.contacts.find(c => c.id === contactId)?.name || "contact";
      window.cnToast({ title: `Call logged with ${cName}`, sub: `${duration} min · ${sentiment} · added to timeline` });
      onSaved && onSaved();
      onClose();
    } catch (e) {
      setError(e.message);
    } finally {
      setSaving(false);
    }
  };

  return (
    <div className="cn-drawer-scrim" onClick={window.makeBackdropHandler(isDirty, onClose)}>
      <aside className="cn-drawer" onClick={e => e.stopPropagation()}>
        <header className="cn-drawer-head">
          <div>
            <div className="cn-card-eyebrow">Log call</div>
            <h2 className="cn-drawer-title">New call entry</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-drawer-body">
          <div className="cn-field">
            <label>Contact</label>
            <SearchableSelect
              value={contactId}
              onChange={setContactId}
              options={scenario.contacts.map(c => {
                const a = window.accountOf(c.accountId, scenario);
                return { value: c.id, label: c.name, subtext: `${c.title ? c.title + " · " : ""}${a?.name || "—"}` };
              })}
              placeholder="Search by name, title or company…"
            />
            <div className="cn-field-help">{contact.title} · {account?.name || "—"} · <span className="cn-mono">{contact.phone}</span></div>
          </div>

          <div className="cn-field">
            <label>Linked opportunity</label>
            <SearchableSelect
              value={oppLink}
              onChange={setOppLink}
              options={[{ value: "", label: "— None —" }, ...contactOpps.map(o => ({ value: o.id, label: o.title, subtext: window.fmtUSD(o.value, { compact: true }) + " · " + window.stageOf(o.stage)?.label }))]}
              placeholder="Search deals…"
            />
          </div>

          <div className="cn-recorder">
            <div className="cn-recorder-controls">
              <button
                className={`cn-rec-btn ${isRecording ? "is-rec" : ""}`}
                onClick={() => { setIsRecording(!isRecording); if (!isRecording) setRecordingTime(0); }}
              >
                <span className="cn-rec-dot"></span>
                {isRecording ? "Stop recording" : "Start recording"}
              </button>
              <div className="cn-rec-meta cn-mono">
                {isRecording && <span className="cn-rec-live">● LIVE</span>}
                {String(Math.floor(recordingTime / 60)).padStart(2, "0")}:{String(recordingTime % 60).padStart(2, "0")}
              </div>
            </div>
            <div className="cn-rec-wave">
              {Array.from({ length: 64 }).map((_, j) => (
                <span
                  key={j}
                  style={{
                    height: isRecording
                      ? `${20 + Math.abs(Math.sin(j * 0.5 + recordingTime * 0.3)) * 70}%`
                      : `${15 + Math.abs(Math.sin(j * 0.7)) * 30}%`,
                    opacity: isRecording ? 1 : 0.3,
                  }}
                ></span>
              ))}
            </div>
            <div className="cn-rec-foot">
              Recording is decorative in this prototype. Real call recording would integrate with Twilio or Zoom.
            </div>
          </div>

          <div className="cn-field-row">
            <div className="cn-field" style={{ flex: 1 }}>
              <label>Duration</label>
              <div className="cn-stepper">
                <button onClick={() => setDuration(Math.max(1, duration - 5))}>−</button>
                <span className="cn-mono">{duration} min</span>
                <button onClick={() => setDuration(duration + 5)}>+</button>
              </div>
            </div>
            <div className="cn-field" style={{ flex: 1 }}>
              <label>Sentiment</label>
              <div className="cn-segmented cn-segmented--full">
                {["positive", "neutral", "negative"].map(s => (
                  <button key={s} className={sentiment === s ? "is-active" : ""} onClick={() => setSentiment(s)}>{s}</button>
                ))}
              </div>
            </div>
          </div>

          <div className="cn-field">
            <label>Outcome</label>
            <div className="cn-chip-row">
              {["Advance to discovery", "Advance to proposal", "Advance to negotiation", "Holding pattern", "Closed lost"].map(o => (
                <button key={o} className={`cn-chip-btn ${outcome === o ? "is-active" : ""}`} onClick={() => setOutcome(o)}>{o}</button>
              ))}
            </div>
          </div>

          <div className="cn-field">
            <label>Notes</label>
            <textarea
              className="cn-textarea"
              rows="6"
              placeholder="Discussion, next steps, objections, decision criteria…"
              value={summary}
              onChange={e => setSummary(e.target.value)}
            ></textarea>
          </div>

          {error && <div className="cn-login-error">{error}</div>}
        </div>

        <footer className="cn-drawer-foot">
          <button className="cn-btn cn-btn--ghost" onClick={onClose} disabled={saving}>Cancel</button>
          <button className="cn-btn cn-btn--primary" onClick={save} disabled={saving}>
            {saving ? "Saving…" : "Save call · update timeline"}
          </button>
        </footer>
      </aside>
    </div>
  );
}

function NewOppModal({ open, onClose, scenario, currentUser, onSaved, prefillContactId }) {
  const [title, setTitle] = useState("");
  const [accountId, setAccountId] = useState("");
  const [contactId, setContactId] = useState("");
  const [brand, setBrand] = useState("");
  const [brandOther, setBrandOther] = useState("");
  const [productSubtype, setProductSubtype] = useState("");
  const [stage, setStage] = useState("prospect");
  const [value, setValue] = useState(500000);
  const [rate, setRate] = useState(4.5);
  const [ownerId, setOwnerId] = useState(currentUser?.id || "");
  const [closeDate, setCloseDate] = useState(() => {
    const d = new Date(); d.setMonth(d.getMonth() + 3);
    return d.toISOString().slice(0, 10);
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [showQuickContact, setShowQuickContact] = useState(false);
  const [qcName, setQcName] = useState("");
  const [qcEmail, setQcEmail] = useState("");
  const [qcTitle, setQcTitle] = useState("");
  const [qcSaving, setQcSaving] = useState(false);

  useEffect(() => {
    if (open) {
      setTitle("");
      // If a contact was prefilled (e.g. "New opp from contact detail"), use their account
      if (prefillContactId) {
        const c = scenario.contacts.find(x => x.id === prefillContactId);
        setAccountId(c?.accountId || scenario.accounts[0]?.id || "");
        setContactId(prefillContactId);
      } else {
        setAccountId(scenario.accounts[0]?.id || "");
        setContactId("");
      }
      setBrand("");
      setBrandOther("");
      setProductSubtype("");
      setStage("prospect");
      setValue(500000);
      setRate(4.5);
      setOwnerId(currentUser?.id || "");
      setError(null);
      setShowQuickContact(false);
      setQcName(""); setQcEmail(""); setQcTitle("");
    }
  }, [open, currentUser?.id, prefillContactId]);

  if (!open) return null;

  const accountContacts = scenario.contacts.filter(c => c.accountId === accountId);

  const brandLabel = brand === "Other" ? brandOther : brand;
  const productString = brandLabel
    ? (productSubtype ? `${brandLabel} — ${productSubtype}` : brandLabel)
    : "";

  const isDirty = () => title.trim().length > 0 || qcName.trim().length > 0 || brand !== "";

  const addQuickContact = async () => {
    if (!qcName.trim()) { setError("Contact name is required."); return; }
    if (!accountId) { setError("Pick an account first."); return; }
    setQcSaving(true); setError(null);
    try {
      const inserted = await window.insertContact({
        name: qcName.trim(),
        title: qcTitle.trim(),
        email: qcEmail.trim(),
        phone: "",
        tier: "Influencer",
        account_id: accountId,
        owner_id: ownerId || currentUser?.id || null,
      });
      // Optimistically add to scenario so the dropdown shows it without a full reload
      const newC = {
        id: inserted?.id || ("tmp-" + Math.random().toString(36).slice(2, 8)),
        name: qcName.trim(),
        title: qcTitle.trim(),
        email: qcEmail.trim(),
        accountId,
        tier: "Influencer",
      };
      if (inserted?.id) {
        scenario.contacts.unshift({ ...newC, id: inserted.id });
        setContactId(inserted.id);
      } else {
        scenario.contacts.unshift(newC);
        setContactId(newC.id);
      }
      onSaved && onSaved();
      setShowQuickContact(false);
      setQcName(""); setQcEmail(""); setQcTitle("");
      window.cnToast({ title: `Added ${newC.name}`, sub: `Linked as primary contact on this new deal` });
    } catch (e) { setError(e.message); }
    finally { setQcSaving(false); }
  };

  const save = async () => {
    if (!title.trim()) { setError("Deal title is required."); return; }
    if (!accountId) { setError("Pick an account."); return; }
    setSaving(true);
    setError(null);
    try {
      const inserted = await window.insertOpportunity({
        title: title.trim(),
        account_id: accountId,
        contact_id: contactId || accountContacts[0]?.id || null,
        owner_id: ownerId,
        product: productString,
        value_cents: Math.round(value * 100),
        commission_rate: rate / 100,
        stage,
        expected_close: closeDate,
      });
      const acctName = window.accountOf(accountId, scenario)?.name || "";
      window.cnToast({
        title: `Opportunity created — ${title.trim()}`,
        sub: `${acctName} · ${window.fmtUSD(value, { compact: true })} · stage: ${window.stageOf(stage)?.label}`,
      });
      onSaved && onSaved();
      onClose();
    } catch (e) {
      setError(e.message);
    } finally {
      setSaving(false);
    }
  };

  const BRAND_OPTIONS = ["NVIDIA", "AMD", "Cisco", "Juniper", "Dell", "Arista", "Mellanox", "Other"];

  return (
    <div className="cn-modal-scrim" onClick={window.makeBackdropHandler(isDirty, onClose)}>
      <div className="cn-modal" onClick={e => e.stopPropagation()}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">New opportunity</div>
            <h2 className="cn-modal-title">Open a deal</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-modal-body">
          {scenario.accounts.length === 0 ? (
            <p style={{ color: "var(--cn-mute)", lineHeight: 1.6 }}>
              You don't have any accounts yet. Go to Accounts &rarr; New account first.
            </p>
          ) : (
            <Fragment>
              <div className="cn-field">
                <label>Deal title</label>
                <input className="cn-input" placeholder="e.g. H200 cluster — 128 nodes" value={title} onChange={e => setTitle(e.target.value)} autoFocus />
              </div>

              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 2 }}>
                  <label>Account</label>
                  <SearchableSelect
                    value={accountId}
                    onChange={(v) => { setAccountId(v); setContactId(""); }}
                    options={scenario.accounts.map(a => ({ value: a.id, label: a.name, subtext: a.industry }))}
                    placeholder="Search accounts…"
                  />
                </div>
                <div className="cn-field" style={{ flex: 2 }}>
                  <label>Primary contact</label>
                  <SearchableSelect
                    value={contactId}
                    onChange={setContactId}
                    options={[
                      { value: "", label: "— None —" },
                      ...accountContacts.map(c => ({ value: c.id, label: c.name, subtext: c.title }))
                    ]}
                    placeholder={accountContacts.length === 0 ? "No contacts at this account yet" : "Search contacts…"}
                  />
                  {!showQuickContact && (
                    <button type="button" className="cn-link" style={{ marginTop: 6, fontSize: 12 }} onClick={() => setShowQuickContact(true)}>
                      + Add a new contact at this account
                    </button>
                  )}
                </div>
              </div>

              {showQuickContact && (
                <div className="cn-quick-add">
                  <div className="cn-card-eyebrow" style={{ marginBottom: 10 }}>New contact at {window.accountOf(accountId, scenario)?.name || "this account"}</div>
                  <div className="cn-field-row">
                    <div className="cn-field" style={{ flex: 1, marginBottom: 0 }}>
                      <label>Name</label>
                      <input className="cn-input" value={qcName} onChange={e => setQcName(e.target.value)} placeholder="Jane Doe" autoFocus />
                    </div>
                    <div className="cn-field" style={{ flex: 1, marginBottom: 0 }}>
                      <label>Title</label>
                      <input className="cn-input" value={qcTitle} onChange={e => setQcTitle(e.target.value)} placeholder="VP Procurement" />
                    </div>
                  </div>
                  <div className="cn-field" style={{ marginBottom: 10 }}>
                    <label>Email</label>
                    <input className="cn-input cn-mono" style={{ fontSize: 13 }} value={qcEmail} onChange={e => setQcEmail(e.target.value)} placeholder="jane@company.com" />
                  </div>
                  <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                    <button type="button" className="cn-btn cn-btn--ghost" onClick={() => { setShowQuickContact(false); setQcName(""); setQcEmail(""); setQcTitle(""); }} disabled={qcSaving}>Cancel</button>
                    <button type="button" className="cn-btn cn-btn--primary" onClick={addQuickContact} disabled={qcSaving || !qcName.trim()}>
                      {qcSaving ? "Adding…" : "+ Add contact"}
                    </button>
                  </div>
                </div>
              )}

              <div className="cn-field">
                <label>Product line</label>
                <div className="cn-chip-row" style={{ marginBottom: 8 }}>
                  {BRAND_OPTIONS.map(b => (
                    <button key={b} type="button" className={`cn-chip-btn ${brand === b ? "is-active" : ""}`} onClick={() => setBrand(b)}>{b}</button>
                  ))}
                </div>
                <div className="cn-field-row" style={{ marginBottom: 0 }}>
                  {brand === "Other" && (
                    <div className="cn-field" style={{ flex: 1, marginBottom: 0 }}>
                      <input className="cn-input" placeholder="Brand name" value={brandOther} onChange={e => setBrandOther(e.target.value)} />
                    </div>
                  )}
                  <div className="cn-field" style={{ flex: 2, marginBottom: 0 }}>
                    <input className="cn-input" placeholder={brand === "NVIDIA" ? "e.g. H200, DGX H100, L40S, L4…" : brand === "Cisco" ? "e.g. Nexus 9000, Catalyst 9300…" : brand === "Juniper" ? "e.g. QFX5220, MX480…" : brand === "Dell" ? "e.g. PowerEdge XE9680, PowerSwitch…" : "Model / subtype (optional)"} value={productSubtype} onChange={e => setProductSubtype(e.target.value)} />
                  </div>
                </div>
                {productString && <div className="cn-field-help" style={{ marginTop: 6 }}>Will save as: <span className="cn-mono">{productString}</span></div>}
              </div>

              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>Deal value (USD)</label>
                  <div className="cn-money-input">
                    <span>$</span>
                    <input className="cn-input cn-mono" value={value.toLocaleString()} onChange={e => setValue(parseInt(e.target.value.replace(/,/g, "") || "0", 10))} />
                  </div>
                </div>
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>Commission rate</label>
                  <div className="cn-money-input">
                    <input className="cn-input cn-mono" type="number" step="0.1" value={rate} onChange={e => setRate(parseFloat(e.target.value) || 0)} />
                    <span>%</span>
                  </div>
                </div>
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>Expected commission</label>
                  <div className="cn-readout cn-mono cn-copper">{window.fmtUSD(Math.round(value * (rate / 100)))}</div>
                </div>
              </div>

              <div className="cn-field">
                <label>Stage</label>
                <div className="cn-stage-picker">
                  {window.STAGES.filter(s => s.id !== "won" && s.id !== "lost").map(s => (
                    <button key={s.id} className={`cn-stage-step ${stage === s.id ? "is-active" : ""}`} onClick={() => setStage(s.id)}>
                      <span className="cn-stage-step-label">{s.label}</span>
                      <span className="cn-stage-step-prob cn-mono">{(s.prob * 100).toFixed(0)}%</span>
                    </button>
                  ))}
                </div>
              </div>

              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>Owner</label>
                  <select className="cn-input" value={ownerId} onChange={e => setOwnerId(e.target.value)}>
                    {window.REPS.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                  </select>
                </div>
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>Expected close</label>
                  <input className="cn-input" type="date" value={closeDate} onChange={e => setCloseDate(e.target.value)} />
                </div>
              </div>

              {error && <div className="cn-login-error">{error}</div>}
            </Fragment>
          )}
        </div>

        <footer className="cn-modal-foot">
          <button className="cn-btn cn-btn--ghost" onClick={onClose} disabled={saving}>Cancel</button>
          <button className="cn-btn cn-btn--primary" onClick={save} disabled={saving || scenario.accounts.length === 0}>
            {saving ? "Creating…" : "Create opportunity"}
          </button>
        </footer>
      </div>
    </div>
  );
}

function NewContactModal({ open, onClose, scenario, currentUser, onSaved }) {
  const [name, setName] = useState("");
  const [title, setTitle] = useState("");
  const [email, setEmail] = useState("");
  const [phone, setPhone] = useState("");
  const [tier, setTier] = useState("Influencer");
  const [accountId, setAccountId] = useState("");
  const [ownerId, setOwnerId] = useState(currentUser?.id || "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (open) {
      setName(""); setTitle(""); setEmail(""); setPhone("");
      setTier("Influencer"); setAccountId(scenario.accounts[0]?.id || "");
      setOwnerId(currentUser?.id || "");
      setError(null);

    if (!accountId) { setError("Pick an account."); return; }

      onClose();

      setError(e.message);
    } finally {
      setSaving(false);
    }

  return (
    <div className="cn-modal-scrim" onClick={window.makeBackdropHandler(isDirty, onClose)}>
      <div className="cn-modal" onClick={e => e.stopPropagation()} style={{ width: 560 }}>

            <div className="cn-card-eyebrow">New contact</div>

function NewAccountModal({ open, onClose, onSaved, account = null, currentUser }) {
  const isEdit = !!account;
  const [name, setName] = useState("");
  const [industry, setIndustry] = useState("");
  const [hq, setHq] = useState("");
  const [size, setSize] = useState("");
  const [website, setWebsite] = useState("");
  const [ownerId, setOwnerId] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (open) {
      setName(account?.name || "");
      setIndustry(account?.industry || "");
      setHq(account?.hq || "");
      setSize(account?.size || "");
      setWebsite(account?.website || "");
      setOwnerId(account?.ownerId || currentUser?.id || "");
      setError(null);
    }
  }, [open, account?.id, currentUser?.id]);

  if (!open) return null;

  const isDirty = () => name.trim().length > 0 || industry.trim().length > 0 || hq.trim().length > 0;

  const save = async () => {
    if (!name.trim()) { setError("Account name is required."); return; }
    setSaving(true); setError(null);
    try {
      if (isEdit) {
        await window.updateAccount(account.id, { name: name.trim(), industry, hq, size, website, owner_id: ownerId || null });
        window.cnToast({ title: `Saved ${name.trim()}`, sub: "Account updated" });
      } else {
        await window.insertAccount({ name: name.trim(), industry, hq, size, website, owner_id: ownerId || null });
        window.cnToast({ title: `Added ${name.trim()}`, sub: industry ? `Industry: ${industry}` : "New account created" });
      }
      onSaved && onSaved();
      onClose();
    } catch (e) {
      setError(e.message);
    } finally {
      setSaving(false);
    }
  };

  const remove = async () => {
    if (!confirm(`Delete ${account.name}? Contacts and deals linked to this account will be unlinked.`)) return;
    setSaving(true); setError(null);
    try {
      await window.deleteAccount(account.id);
      window.cnToast({ title: `Deleted ${account.name}`, kind: "success" });
      onSaved && onSaved();
      onClose();
    } catch (e) { setError(e.message); setSaving(false); }
  };

  return (
    <div className="cn-modal-scrim" onClick={window.makeBackdropHandler(isDirty, onClose)}>
      <div className="cn-modal" onClick={e => e.stopPropagation()} style={{ width: 540 }}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">{isEdit ? "Edit account" : "New account"}</div>
            <h2 className="cn-modal-title">{isEdit ? account.name : "Add a company"}</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-modal-body">
          <div className="cn-field">
            <label>Company name</label>
            <input className="cn-input" value={name} onChange={e => setName(e.target.value)} autoFocus placeholder="e.g. Lumen Compute Labs" />
          </div>
          <div className="cn-field-row">
            <div className="cn-field" style={{ flex: 1 }}>
              <label>Industry</label>
              <input className="cn-input" value={industry} onChange={e => setIndustry(e.target.value)} placeholder="AI Research" />
            </div>
            <div className="cn-field" style={{ flex: 1 }}>
              <label>Headcount</label>
              <input className="cn-input" value={size} onChange={e => setSize(e.target.value)} placeholder="120" />
            </div>
          </div>
          <div className="cn-field-row">
            <div className="cn-field" style={{ flex: 1 }}>
              <label>HQ</label>
              <input className="cn-input" value={hq} onChange={e => setHq(e.target.value)} placeholder="Palo Alto, CA" />
            </div>
            <div className="cn-field" style={{ flex: 1 }}>
              <label>Website</label>
              <input className="cn-input" value={website} onChange={e => setWebsite(e.target.value)} placeholder="company.com" />
            </div>
          </div>
          <div className="cn-field">
            <label>Owner</label>
            <select className="cn-input" value={ownerId} onChange={e => setOwnerId(e.target.value)}>
              <option value="">— Unassigned —</option>
              {window.REPS.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
            <div className="cn-field-help">The rep who owns this account. Visible across the team — but only the owner should touch it.</div>
          </div>
          {error && <div className="cn-login-error">{error}</div>}
        </div>

        <footer className="cn-modal-foot">
          {isEdit && <button className="cn-btn cn-btn--danger" onClick={remove} disabled={saving}>Delete</button>}
          <div style={{ marginLeft: "auto", display: "flex", gap: 10 }}>
            <button className="cn-btn cn-btn--ghost" onClick={onClose} disabled={saving}>Cancel</button>
            <button className="cn-btn cn-btn--primary" onClick={save} disabled={saving}>
              {saving ? (isEdit ? "Saving…" : "Adding…") : (isEdit ? "Save changes" : "Add account")}
            </button>
          </div>
        </footer>
      </div>
    </div>
  );
}

function OppDetailDrawer({ open, onClose, oppId, scenario, onOpenContact, onSaved }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(null);
  const [original, setOriginal] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (!open || !oppId) return;
    const o = scenario.opps.find(o => o.id === oppId);
    if (o) {
      const seed = {
        title: o.title,
        product: o.product || "",
        value: o.value,
        commissionRate: o.commissionRate,
        stage: o.stage,
        ownerId: o.ownerId,
        contactId: o.contactId,
        accountId: o.accountId,
        close: o.close || "",
      };
      setDraft(seed);
      setOriginal(seed);
      setEditing(false);
      setError(null);
    }
  }, [open, oppId]);

  if (!open || !oppId || !draft) return null;
  const opp = scenario.opps.find(o => o.id === oppId);
  if (!opp) return null;
  const acct = window.accountOf(opp.accountId, scenario);
  const contact = window.contactOf(opp.contactId, scenario);
  const oppActivities = scenario.activities.filter(a => a.oppId === opp.id);
  const rep = window.repOf(opp.ownerId);
  const draftAcct = window.accountOf(draft.accountId, scenario);
  const accountContacts = scenario.contacts.filter(c => c.accountId === draft.accountId);

  const isDirty = () => editing && original && JSON.stringify(draft) !== JSON.stringify(original);

  const STAGE_ORDER = ["prospect", "discovery", "proposal", "negotiation", "won"];

  const changeStage = async (newStage) => {
    setBusy(true); setError(null);
    try {
      await window.updateOpportunity(opp.id, { stage: newStage });
      onSaved && onSaved();
      // optimistic: also update draft so UI reflects
      setDraft(d => ({ ...d, stage: newStage }));
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  const advance = () => {
    const idx = STAGE_ORDER.indexOf(opp.stage);
    if (idx >= 0 && idx < STAGE_ORDER.length - 1) changeStage(STAGE_ORDER[idx + 1]);
  };

  const saveEdits = async () => {
    setBusy(true); setError(null);
    try {
      await window.updateOpportunity(opp.id, {
        title: draft.title,
        product: draft.product,
        value_cents: Math.round(draft.value * 100),
        commission_rate: draft.commissionRate,
        owner_id: draft.ownerId,
        contact_id: draft.contactId || null,
        account_id: draft.accountId,
        stage: draft.stage,
        expected_close: draft.close || null,
      });
      window.cnToast({ title: `Saved ${draft.title}`, sub: "Opportunity updated" });
      onSaved && onSaved();
      setOriginal(draft);
      setEditing(false);
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  const deleteOpp = async () => {
    if (!confirm(`Delete "${opp.title}"? This cannot be undone.`)) return;
    setBusy(true); setError(null);
    try {
      await window.deleteOpportunity(opp.id);
      window.cnToast({ title: `Deleted ${opp.title}`, kind: "success" });
      onSaved && onSaved();
      onClose();
    } catch (e) { setError(e.message); }
    finally { setBusy(false); }
  };

  return (
    <div className="cn-drawer-scrim" onClick={window.makeBackdropHandler(isDirty, onClose)}>
      <aside className="cn-drawer cn-drawer--wide" onClick={e => e.stopPropagation()}>
        <header className="cn-drawer-head">
          <div>
            <div className="cn-card-eyebrow">{(editing ? draftAcct : acct)?.name || "—"} · {(editing ? draft.product : opp.product) || "—"}</div>
            {editing ? (
              <input className="cn-input cn-drawer-title-input" value={draft.title} onChange={e => setDraft(d => ({ ...d, title: e.target.value }))} placeholder="Deal title" />
            ) : (
              <h2 className="cn-drawer-title">{opp.title}</h2>
            )}
          </div>
          <button className="cn-icon-btn" onClick={() => isDirty() ? (confirm("You have unsaved changes. Discard?") && (setEditing(false), onClose())) : onClose()}>✕</button>
        </header>

        <div className="cn-drawer-body">
          <div className="cn-opp-strip">
            <div>
              <div className="cn-strip-label">Value</div>
              {editing ? (
                <div className="cn-money-input" style={{ marginTop: 4 }}>
                  <span>$</span>
                  <input className="cn-input cn-mono" value={draft.value.toLocaleString()} onChange={e => setDraft(d => ({ ...d, value: parseInt(e.target.value.replace(/,/g, "") || "0", 10) }))} />
                </div>
              ) : (
                <div className="cn-strip-value cn-mono">{window.fmtUSD(opp.value)}</div>
              )}
            </div>
            <div><div className="cn-strip-label">Stage</div><div><StagePill stage={opp.stage} /></div></div>
            <div>
              <div className="cn-strip-label">Commission</div>
              {editing ? (
                <div className="cn-money-input" style={{ marginTop: 4 }}>
                  <input className="cn-input cn-mono" type="number" step="0.1" value={(draft.commissionRate * 100).toFixed(1)} onChange={e => setDraft(d => ({ ...d, commissionRate: (parseFloat(e.target.value) || 0) / 100 }))} />
                  <span>%</span>
                </div>
              ) : (
                <div className="cn-strip-value cn-mono cn-copper">{window.fmtUSD(Math.round(opp.value * opp.commissionRate))}</div>
              )}
            </div>
            <div>
              <div className="cn-strip-label">Owner</div>
              {editing ? (
                <select className="cn-input" value={draft.ownerId || ""} onChange={e => setDraft(d => ({ ...d, ownerId: e.target.value }))} style={{ marginTop: 4 }}>
                  {window.REPS.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                </select>
              ) : (
                <div className="cn-strip-value">{rep ? <Fragment><span className="cn-avatar cn-avatar--xs">{rep.initials}</span> {rep.name}</Fragment> : "—"}</div>
              )}
            </div>
            <div><div className="cn-strip-label">Close</div>{editing ? (
              <input className="cn-input" type="date" value={draft.close ? new Date(draft.close).toISOString().slice(0,10) : ""} onChange={e => setDraft(d => ({ ...d, close: e.target.value }))} style={{ marginTop: 4 }} />
            ) : (
              <div className="cn-strip-value">{opp.close}</div>
            )}</div>
          </div>

          {editing && (
            <section className="cn-edit-extras">
              <div className="cn-card-eyebrow" style={{ marginBottom: 10 }}>Account & contact</div>
              <div className="cn-field-row">
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>Account</label>
                  <SearchableSelect
                    value={draft.accountId}
                    onChange={(v) => setDraft(d => ({ ...d, accountId: v, contactId: "" }))}
                    options={scenario.accounts.map(a => ({ value: a.id, label: a.name, subtext: a.industry }))}
                    placeholder="Search accounts…"
                  />
                </div>
                <div className="cn-field" style={{ flex: 1 }}>
                  <label>Primary contact</label>
                  <SearchableSelect
                    value={draft.contactId || ""}
                    onChange={(v) => setDraft(d => ({ ...d, contactId: v }))}
                    options={[
                      { value: "", label: "— None —" },
                      ...accountContacts.map(c => ({ value: c.id, label: c.name, subtext: c.title }))
                    ]}
                    placeholder={accountContacts.length === 0 ? "No contacts at this account" : "Search contacts…"}
                  />
                </div>
              </div>
              <div className="cn-field">
                <label>Product / brand</label>
                <input className="cn-input" value={draft.product} onChange={e => setDraft(d => ({ ...d, product: e.target.value }))} placeholder="e.g. NVIDIA — H200" />
              </div>
              <div className="cn-field">
                <label>Stage</label>
                <div className="cn-stage-picker">
                  {window.STAGES.filter(s => s.id !== "won" && s.id !== "lost").map(s => (
                    <button key={s.id} type="button" className={`cn-stage-step ${draft.stage === s.id ? "is-active" : ""}`} onClick={() => setDraft(d => ({ ...d, stage: s.id }))}>
                      <span className="cn-stage-step-label">{s.label}</span>
                      <span className="cn-stage-step-prob cn-mono">{(s.prob * 100).toFixed(0)}%</span>
                    </button>
                  ))}
                </div>
              </div>
            </section>
          )}

          {!editing && opp.stage !== "won" && opp.stage !== "lost" && (
            <section style={{ marginTop: 20 }}>
              <div className="cn-card-eyebrow">Move this deal</div>
              <div className="cn-stage-actions">
                <button className="cn-btn cn-btn--ghost" onClick={advance} disabled={busy || opp.stage === "negotiation"}>
                  → Advance to {STAGE_ORDER[STAGE_ORDER.indexOf(opp.stage) + 1] ? window.stageOf(STAGE_ORDER[STAGE_ORDER.indexOf(opp.stage) + 1]).label : "—"}
                </button>
                <button className="cn-btn cn-btn--win" onClick={() => changeStage("won")} disabled={busy}>✓ Mark Won</button>
                <button className="cn-btn cn-btn--lose" onClick={() => changeStage("lost")} disabled={busy}>✕ Mark Lost</button>
              </div>
            </section>
          )}

          <section style={{ marginTop: 24 }}>
            <div className="cn-card-eyebrow">Stage progression</div>
            <div className="cn-progress">
              {window.STAGES.filter(s => s.id !== "lost").map((s, i, arr) => {
                const idx = arr.findIndex(x => x.id === opp.stage);
                const state = i < idx ? "done" : i === idx ? "current" : "future";
                return (
                  <button key={s.id} className={`cn-progress-step cn-progress-step--${state} cn-progress-step--clickable`} onClick={() => changeStage(s.id)} disabled={busy || editing}>
                    <div className="cn-progress-dot">{state === "done" ? "✓" : i + 1}</div>
                    <div className="cn-progress-label">{s.label}</div>
                  </button>
                );
              })}
            </div>
          </section>

          {!editing && (
            <window.QuotesSection
              opp={opp}
              account={acct}
              contact={contact}
              onValueUpdated={onSaved}
            />
          )}

          {contact && !editing && (
            <section style={{ marginTop: 28 }}>
              <h3 className="cn-side-title">Primary contact</h3>
              <button className="cn-contact-row" onClick={() => onOpenContact(contact.id)}>
                <span className="cn-avatar">{contact.name.split(" ").map(n => n[0]).join("").slice(0, 2)}</span>
                <span>
                  <div className="cn-cell-primary">{contact.name}</div>
                  <div className="cn-cell-secondary">{contact.title} · {contact.email}</div>
                </span>
                <span className="cn-link" style={{ marginLeft: "auto" }}>Open &rarr;</span>
              </button>
            </section>
          )}

          {oppActivities.length > 0 && !editing && (
            <section style={{ marginTop: 28 }}>
              <h3 className="cn-side-title">Activity on this deal</h3>
              <div className="cn-timeline">
                {oppActivities.map((a, i) => (
                  <div key={a.id} className="cn-tl-item">
                    <div className="cn-tl-spine">

}

function EditActivityModal({ open, onClose, activity, scenario, onSaved }) {
  const [type, setType] = useState("note");
  const [summary, setSummary] = useState("");
  const [subject, setSubject] = useState("");
  const [sentiment, setSentiment] = useState("neutral");
  const [duration, setDuration] = useState(25);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (open && activity) {
      setType(activity.type || "note");
      setSummary(activity.summary || "");
      setSubject(activity.subject || "");
      setSentiment(activity.sentiment || "neutral");
      setDuration(activity.duration || 25);
      setError(null);
    }
  }, [open, activity?.id]);

  if (!open || !activity) return null;

  const save = async () => {
    setSaving(true); setError(null);
    try {
      await window.updateActivity(activity.id, {
        type, summary, subject,
        sentiment: type === "call" ? sentiment : null,
        duration_min: type === "call" ? duration : null,
      });
      onSaved && onSaved();
      onClose();
    } catch (e) { setError(e.message); }
    finally { setSaving(false); }
  };

  const remove = async () => {
    if (!confirm("Delete this entry? This cannot be undone.")) return;
    setSaving(true); setError(null);
    try {
      await window.deleteActivity(activity.id);
      onSaved && onSaved();
      onClose();
    } catch (e) { setError(e.message); setSaving(false); }
  };

  return (
    <div className="cn-modal-scrim" onClick={onClose}>
      <div className="cn-modal" onClick={e => e.stopPropagation()} style={{ width: 580 }}>
        <header className="cn-modal-head">
          <div>
            <div className="cn-card-eyebrow">Edit activity</div>
            <h2 className="cn-modal-title">{activity.when}</h2>
          </div>
          <button className="cn-icon-btn" onClick={onClose}>✕</button>
        </header>

        <div className="cn-modal-body">
          <div className="cn-field">
            <label>Type</label>
            <div className="cn-segmented cn-segmented--full">
              {["call", "email", "note", "task"].map(s => (
                <button key={s} className={type === s ? "is-active" : ""} onClick={() => setType(s)}>{s}</button>
              ))}
            </div>
          </div>

          {type === "email" && (
            <div className="cn-field">
              <label>Subject</label>
              <input className="cn-input" value={subject} onChange={e => setSubject(e.target.value)} placeholder="Email subject" />
            </div>
          )}

          {type === "call" && (
            <div className="cn-field-row">
              <div className="cn-field" style={{ flex: 1 }}>
                <label>Duration</label>
                <div className="cn-stepper">
                  <button onClick={() => setDuration(Math.max(1, duration - 5))}>−</button>
                  <span className="cn-mono">{duration} min</span>
                  <button onClick={() => setDuration(duration + 5)}>+</button>
                </div>
              </div>
              <div className="cn-field" style={{ flex: 1 }}>
                <label>Sentiment</label>
                <div className="cn-segmented cn-segmented--full">
                  {["positive", "neutral", "negative"].map(s => (
                    <button key={s} className={sentiment === s ? "is-active" : ""} onClick={() => setSentiment(s)}>{s}</button>
                  ))}
                </div>
              </div>
            </div>
          )}

          <div className="cn-field">
            <label>{type === "task" ? "Task" : "Notes"}</label>
            <textarea className="cn-textarea" rows="6" value={summary} onChange={e => setSummary(e.target.value)} />
          </div>

          {error && <div className="cn-login-error">{error}</div>}
        </div>

        <footer className="cn-modal-foot">
          <button className="cn-btn cn-btn--danger" onClick={remove} disabled={saving}>Delete</button>
          <div style={{ marginLeft: "auto", display: "flex", gap: 10 }}>
            <button className="cn-btn cn-btn--ghost" onClick={onClose} disabled={saving}>Cancel</button>
            <button className="cn-btn cn-btn--primary" onClick={save} disabled={saving}>{saving ? "Saving…" : "Save changes"}</button>
          </div>
        </footer>
      </div>
    </div>
  );
}
