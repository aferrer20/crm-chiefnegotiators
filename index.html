<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chief Negotiators · CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ─────────── Design tokens ─────────── */
:root {
  /* Paper / ink */
  --cn-paper: #F4EEE3;
  --cn-paper-2: #FAF5EC;
  --cn-card: #FCF9F3;
  --cn-ink: #1A1612;
  --cn-ink-2: #2D2620;
  --cn-mute: #7A6F60;
  --cn-mute-2: #A39682;
  --cn-line: #E5DBC6;
  --cn-line-2: #EFE7D4;

  /* Copper (brand) */
  --cn-copper: #B47148;
  --cn-copper-soft: #D89A6E;
  --cn-copper-deep: #8B5535;
  --cn-copper-wash: #F4E4D3;

  /* Status */
  --cn-pos: #3D6B47;
  --cn-neg: #8B3A2F;
  --cn-warn: #A07A2A;

  /* Sidebar (dark) */
  --cn-side: #1A1612;
  --cn-side-2: #211C16;
  --cn-side-ink: #E8DFC9;
  --cn-side-mute: #8F8472;
  --cn-side-line: #2E2820;

  /* Type */
  --cn-serif: 'Instrument Serif', 'Source Serif Pro', Georgia, serif;
  --cn-sans: 'Inter Tight', -apple-system, system-ui, sans-serif;
  --cn-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;

  --cn-r: 6px;
  --cn-r-lg: 10px;
  --cn-shadow: 0 1px 2px rgba(26, 22, 18, 0.04), 0 0 0 1px var(--cn-line);
  --cn-shadow-lift: 0 12px 32px -8px rgba(26, 22, 18, 0.15), 0 0 0 1px var(--cn-line);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--cn-sans);
  background: var(--cn-paper);
  color: var(--cn-ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─────────── App layout ─────────── */
.cn-app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
  min-width: 1200px;
}
.cn-main { display: flex; flex-direction: column; min-width: 0; }
.cn-content { flex: 1; overflow-y: auto; }

/* ─────────── Sidebar ─────────── */
.cn-sidebar {
  background: var(--cn-side);
  color: var(--cn-side-ink);
  display: flex;
  flex-direction: column;
  padding: 22px 14px;
  border-right: 1px solid var(--cn-side-line);
  position: sticky;
  top: 0;
  height: 100vh;
}
.cn-brand {
  padding: 0 4px 18px;
  border-bottom: 1px solid var(--cn-side-line);
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}.cn-brand-logo {
  width: 100%;
  max-width: 120px;
  height: auto;
  object-fit: contain;
  display: block;
  image-rendering: -webkit-optimize-contrast;
  filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.55)) drop-shadow(0 0 1px rgba(255, 200, 140, 0.15));
}
.cn-brand-text { text-align: center; line-height: 1.05; margin-top: 0; }
.cn-brand-name {
  font-family: var(--cn-serif);
  font-size: 20px;
  letter-spacing: 0.14em;
  color: var(--cn-side-ink);
  text-transform: uppercase;
}
.cn-brand-sub {
  font-size: 8.5px;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--cn-copper);
  margin-top: 3px;
}

.cn-nav { display: flex; flex-direction: column; gap: 1px; flex: 1; }
.cn-nav-section {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cn-side-mute);
  padding: 0 10px 8px;
  margin-top: 4px;
}
.cn-nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px;
  background: none; border: none;
  color: var(--cn-side-ink);
  font: inherit;
  font-size: 13px;
  text-align: left;
  border-radius: 5px;
  cursor: pointer;
  opacity: 0.78;
  transition: all 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cn-nav-item > span:last-child {
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.cn-nav-item:hover { background: var(--cn-side-2); opacity: 1; }
.cn-nav-item.is-active {
  background: var(--cn-side-2);
  opacity: 1;
  box-shadow: inset 2px 0 0 var(--cn-copper);
}
.cn-nav-icon {
  display: inline-block; width: 16px; text-align: center;
  color: var(--cn-side-mute);
  font-size: 12px;
}
.cn-nav-item.is-active .cn-nav-icon { color: var(--cn-copper); }
.cn-nav-pin .cn-nav-icon { font-size: 10px; }
.cn-nav-pin { font-size: 12.5px; opacity: 0.72; }

.cn-sidebar-foot { padding-top: 14px; border-top: 1px solid var(--cn-side-line); }
.cn-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 6px; min-width: 0;
  background: none; border: none; font: inherit;
  text-align: left; width: 100%; cursor: pointer;
  border-radius: 6px;
  transition: background 0.12s;
}
.cn-user:hover { background: var(--cn-side-2); }
.cn-user > div:not(.cn-avatar) { min-width: 0; flex: 1; }
.cn-user-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--cn-side-ink); }
.cn-user-role { font-size: 11px; color: var(--cn-side-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cn-user-chev { color: var(--cn-side-mute); font-size: 11px; flex: none; }

/* ─────────── Topbar ─────────── */
.cn-topbar {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 22px 40px 18px;
  background: var(--cn-paper);
  border-bottom: 1px solid var(--cn-line);
  gap: 24px;
}
.cn-breadcrumb {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--cn-mute); display: flex; gap: 8px; margin-bottom: 6px;
  white-space: nowrap;
}
.cn-bc-wrap { display: inline-flex; gap: 8px; align-items: baseline; }
.cn-bc-sep { color: var(--cn-mute-2); }
.cn-bc-current { color: var(--cn-copper); }
.cn-page-title {
  font-family: var(--cn-serif);
  font-size: 34px;
  font-weight: 400;
  margin: 0;
  letter-spacing: -0.01em;
  line-height: 1;
  white-space: nowrap;
}
.cn-topbar-right { display: flex; gap: 10px; align-items: center; }

.cn-search {
  position: relative;
  display: flex; align-items: center;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  padding: 0 12px;
  width: 320px;
  height: 36px;
}
.cn-search input {
  border: none; outline: none; background: none;
  font: inherit; flex: 1; padding: 0 8px;
  color: var(--cn-ink);
}
.cn-search input::placeholder { color: var(--cn-mute-2); }
.cn-search-icon { color: var(--cn-mute); font-size: 14px; }
.cn-search-kbd {
  font-family: var(--cn-mono); font-size: 11px;
  color: var(--cn-mute); border: 1px solid var(--cn-line);
  border-radius: 3px; padding: 1px 5px;
  background: var(--cn-paper-2);
}

/* ─────────── Buttons ─────────── */
.cn-btn {
  display: inline-flex; align-items: center; gap: 7px;
  font: inherit; font-size: 13px; font-weight: 500;
  padding: 8px 14px;
  height: 36px;
  border-radius: var(--cn-r);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.cn-btn--primary {
  background: var(--cn-ink);
  color: var(--cn-paper-2);
  border: 1px solid var(--cn-ink);
  position: relative;
}
.cn-btn--primary:hover { background: var(--cn-ink-2); }
.cn-btn--ghost {
  background: var(--cn-card);
  color: var(--cn-ink);
  border: 1px solid var(--cn-line);
}
.cn-btn--ghost:hover { background: var(--cn-paper-2); border-color: var(--cn-mute-2); }

.cn-icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--cn-r);
  border: 1px solid var(--cn-line);
  background: var(--cn-card);
  cursor: pointer; font: inherit;
  color: var(--cn-mute);
}
.cn-icon-btn:hover { background: var(--cn-paper-2); color: var(--cn-ink); }

.cn-link {
  background: none; border: none; font: inherit;
  color: var(--cn-copper); font-size: 12px; font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  padding: 0;
}
.cn-link:hover { color: var(--cn-copper-deep); }
.cn-link-inline {
  background: none; border: none; font: inherit;
  color: var(--cn-ink); font-weight: 600;
  cursor: pointer; padding: 0;
  border-bottom: 1px solid transparent;
}
.cn-link-inline:hover { border-bottom-color: var(--cn-copper); }

/* ─────────── Page ─────────── */
.cn-page { padding: 28px 40px 60px; display: flex; flex-direction: column; gap: 22px; }
.cn-page--detail { padding: 0; }

/* ─────────── KPI row ─────────── */
.cn-kpi-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--cn-line);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
  overflow: hidden;
}
.cn-kpi {
  background: var(--cn-card);
  padding: 22px 24px 20px;
  display: flex; flex-direction: column;
  gap: 10px;
}
.cn-kpi--hero { background: var(--cn-paper-2); }
.cn-kpi-eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  font-weight: 500;
  line-height: 1.3;
}
.cn-kpi-value {
  font-family: var(--cn-serif);
  font-size: 44px;
  line-height: 0.95;
  letter-spacing: -0.02em;
  font-weight: 400;
  margin-top: 4px;
}
.cn-kpi-value--copper { color: var(--cn-copper); }
.cn-kpi-unit { font-size: 0.5em; color: var(--cn-mute); margin-left: 4px; }
.cn-kpi-foot {
  font-size: 12px; color: var(--cn-mute);
  display: flex; gap: 8px; align-items: center;
}
.cn-kpi-foot-pri { color: var(--cn-ink); font-weight: 500; }
.cn-kpi-foot-sep { color: var(--cn-mute-2); }
.cn-pos { color: var(--cn-pos); font-weight: 600; }
.cn-neg { color: var(--cn-neg); font-weight: 600; }

/* ─────────── Cards ─────────── */
.cn-card {
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
  padding: 22px;
}
.cn-card--flush { padding: 0; overflow: hidden; }
.cn-card-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
}
.cn-card-head > div:first-child,
.cn-modal-head > div:first-child,
.cn-drawer-head > div:first-child {
  display: flex; flex-direction: column; gap: 8px;
  min-width: 0;
  flex: 1;
}
.cn-modal-head .cn-card-eyebrow,
.cn-drawer-head .cn-card-eyebrow { white-space: nowrap; }
.cn-modal-title, .cn-drawer-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cn-card-eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  font-weight: 500;
  display: block;
  line-height: 1.3;
}
.cn-card-title {
  font-family: var(--cn-serif);
  font-size: 22px;
  font-weight: 400;
  margin: 0;
  letter-spacing: -0.005em;
  line-height: 1.05;
  display: block;
}
.cn-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
}

/* ─────────── Stage pill / colors ─────────── */
.cn-stage {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 500;
  padding: 3px 9px 3px 8px;
  border-radius: 100px;
  border: 1px solid;
  white-space: nowrap;
}
.cn-stage::before {
  content: ""; width: 5px; height: 5px; border-radius: 50%;
  background: currentColor; opacity: 0.7;
}
.cn-stage--prospect { color: #6B6358; border-color: #D8CFBA; background: #F0E9D8; }
.cn-stage--discovery { color: #4F5B6E; border-color: #C7D1DD; background: #E6EBF1; }
.cn-stage--proposal { color: #6B4A2C; border-color: #E3CBAE; background: #F2E1CC; }
.cn-stage--negotiation { color: #8B5535; border-color: #DEB58D; background: #EBD2B7; }
.cn-stage--won { color: var(--cn-pos); border-color: #B6D2BB; background: #DCE9DE; }
.cn-stage--lost { color: var(--cn-neg); border-color: #DAB4AC; background: #ECD4CE; }

/* ─────────── Stage bars (dashboard) ─────────── */
.cn-stagebars { display: flex; flex-direction: column; gap: 14px; }
.cn-stagebar { display: flex; flex-direction: column; gap: 7px; }
.cn-stagebar-label {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 13px;
}
.cn-stagebar-name { font-weight: 500; }
.cn-stagebar-meta { color: var(--cn-mute); font-size: 12px; }
.cn-stagebar-track {
  height: 8px;
  background: var(--cn-paper-2);
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid var(--cn-line);
}
.cn-stagebar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cn-copper-soft), var(--cn-copper));
  transition: width 0.4s;
}
.cn-stagebar-fill.is-won {
  background: linear-gradient(90deg, #8FAE94, var(--cn-pos));
}

/* ─────────── Tasks ─────────── */
.cn-tasks { list-style: none; padding: 0; margin: 0; }
.cn-task {
  display: flex; gap: 12px; padding: 12px 0;
  border-bottom: 1px solid var(--cn-line-2);
}
.cn-task:last-child { border-bottom: none; }
.cn-task-body { flex: 1; }
.cn-task-title { font-size: 13.5px; font-weight: 500; }
.cn-task-meta {
  display: flex; gap: 7px; align-items: center;
  font-size: 11.5px; color: var(--cn-mute);
  margin-top: 4px;
  flex-wrap: wrap;
}
.cn-task-when { color: var(--cn-copper); font-weight: 500; white-space: nowrap; }
.cn-checkbox {
  appearance: none;
  width: 16px; height: 16px;
  border: 1.5px solid var(--cn-mute-2);
  border-radius: 3px;
  cursor: pointer;
  margin-top: 1px;
  background: var(--cn-card);
}
.cn-checkbox:checked {
  background: var(--cn-copper); border-color: var(--cn-copper);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 6 L5 8.5 L9.5 4' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
}

/* ─────────── Avatar ─────────── */
.cn-avatar {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--cn-paper);
  border: 1px solid var(--cn-line);
  color: var(--cn-ink);
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.04em;
}
.cn-avatar--xs { width: 20px; height: 20px; font-size: 9px; }
.cn-avatar--xl { width: 76px; height: 76px; font-size: 22px;
  font-family: var(--cn-serif); font-weight: 400; letter-spacing: 0;
  background: var(--cn-paper-2); border: 1px solid var(--cn-line);
}
.cn-avatar--copper {
  background: linear-gradient(135deg, var(--cn-copper-soft), var(--cn-copper));
  color: #fff; border-color: var(--cn-copper-deep);
}
.cn-avatar--more {
  background: var(--cn-paper-2); color: var(--cn-mute);
  font-size: 9px;
}
.cn-stack-avatars { display: flex; }
.cn-stack-avatars > * { margin-left: -6px; cursor: pointer; }
.cn-stack-avatars > *:first-child { margin-left: 0; }

/* ─────────── Feed ─────────── */
.cn-feed { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 18px; }
.cn-feed-item { display: flex; gap: 14px; }
.cn-feed-icon {
  flex: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 13px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  color: var(--cn-mute);
}
.cn-feed-icon--call { color: var(--cn-copper); background: var(--cn-copper-wash); border-color: #E5CCAF; }
.cn-feed-icon--email { color: #4F5B6E; }
.cn-feed-icon--note { color: var(--cn-warn); }
.cn-feed-icon--won { color: var(--cn-pos); background: #DCE9DE; border-color: #B6D2BB; }
.cn-feed-icon--task { color: var(--cn-mute); }

.cn-feed-body { flex: 1; min-width: 0; }
.cn-feed-head {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 12px; margin-bottom: 4px;
}
.cn-feed-who {
  font-size: 13px;
  line-height: 1.7;
}
.cn-feed-who .cn-avatar {
  vertical-align: -4px;
  margin-right: 4px;
}
.cn-feed-who strong { margin-right: 4px; }
.cn-feed-who .cn-link-inline { white-space: nowrap; }
.cn-feed-verb { color: var(--cn-mute); margin-right: 4px; }
.cn-feed-when { font-size: 11.5px; color: var(--cn-mute); flex: none; white-space: nowrap; }
.cn-feed-text {
  margin: 4px 0 0;
  font-size: 13px; line-height: 1.55;
  color: var(--cn-ink-2);
  text-wrap: pretty;
}
.cn-feed-email {
  margin-top: 6px;
  border-left: 2px solid var(--cn-copper);
  padding: 4px 12px;
  background: var(--cn-paper-2);
  border-radius: 0 4px 4px 0;
}
.cn-feed-email-subj { font-size: 12.5px; font-weight: 600; }
.cn-feed-email-snip { font-size: 12px; color: var(--cn-mute); margin-top: 2px; }
.cn-feed-foot {
  margin-top: 8px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  font-size: 11.5px;
}
.cn-feed-link {
  color: var(--cn-copper); font-weight: 500; cursor: pointer;
  border-bottom: 1px dotted var(--cn-copper);
}
.cn-feed-acct { color: var(--cn-mute); }
.cn-feed-item--clickable { cursor: pointer; padding: 8px; margin: -8px; border-radius: var(--cn-r); transition: background 0.12s; }
.cn-feed-item--clickable:hover { background: var(--cn-paper-2); }
.cn-tl-item--clickable { cursor: pointer; border-radius: var(--cn-r); transition: background 0.12s; padding: 4px; margin: -4px; }
.cn-tl-item--clickable:hover { background: var(--cn-paper-2); }

.cn-chip {
  display: inline-flex; padding: 2px 8px;
  font-size: 11px; font-weight: 500;
  background: var(--cn-paper-2); color: var(--cn-mute);
  border: 1px solid var(--cn-line);
  border-radius: 100px;
  text-transform: capitalize;
}
.cn-chip--positive { color: var(--cn-pos); background: #E6EFE7; border-color: #B6D2BB; }
.cn-chip--neutral { color: var(--cn-mute); }
.cn-chip--negative { color: var(--cn-neg); background: #F2DED9; border-color: #DAB4AC; }
.cn-chip--quiet { background: transparent; }

/* ─────────── Tables ─────────── */
.cn-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.cn-table--quiet { font-size: 12.5px; }
.cn-table thead th {
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cn-mute);
  padding: 12px 16px;
  border-bottom: 1px solid var(--cn-line);
  background: var(--cn-paper-2);
  white-space: nowrap;
}
.cn-table tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--cn-line-2);
  vertical-align: middle;
}
.cn-table tbody tr:last-child td { border-bottom: none; }
.cn-perm-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  background: var(--cn-copper-wash);
  border: 1px solid #E5CCAF;
  border-left: 3px solid var(--cn-copper);
  border-radius: var(--cn-r);
  font-size: 13px;
  color: var(--cn-copper-deep);
  line-height: 1.5;
}
.cn-perm-icon {
  font-size: 16px;
  color: var(--cn-copper);
  flex: none;
}
.cn-tr-link { cursor: pointer; transition: background 0.1s; }
.cn-tr-link:hover { background: var(--cn-paper-2); }
.cn-tr-highlight { background: linear-gradient(90deg, var(--cn-copper-wash) 0%, transparent 70%); }
.cn-tr-highlight td:first-child { border-left: 2px solid var(--cn-copper); }
.cn-you-tag { font-family: var(--cn-mono); font-size: 10px; color: var(--cn-copper); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.cn-cell-primary { font-weight: 500; color: var(--cn-ink); white-space: nowrap; }
.cn-cell-secondary { font-size: 12px; color: var(--cn-mute); }
.cn-mono { font-family: var(--cn-mono); font-feature-settings: "tnum"; font-size: 12.5px; letter-spacing: -0.02em; }
.cn-copper { color: var(--cn-copper); }
.cn-row-person { display: flex; align-items: center; gap: 10px; white-space: nowrap; }

/* Tiers */
.cn-tier {
  display: inline-block;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
  white-space: nowrap;
}
.cn-tier--champion { background: var(--cn-copper-wash); color: var(--cn-copper-deep); }
.cn-tier--decision-maker { background: #E0DAC8; color: var(--cn-ink); }
.cn-tier--influencer { background: var(--cn-paper-2); color: var(--cn-mute); border: 1px solid var(--cn-line); }
.cn-tier--gatekeeper { background: #EDE3E0; color: #6B4A45; }

/* ─────────── Toolbar / tabs ─────────── */
.cn-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.cn-toolbar-right { display: flex; gap: 8px; align-items: center; }

.cn-tabs { display: flex; gap: 2px; }
.cn-tab {
  background: none; border: none; font: inherit;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: var(--cn-r);
  color: var(--cn-mute);
  cursor: pointer;
  white-space: nowrap;
}
.cn-tab.is-active { color: var(--cn-ink); background: var(--cn-card); box-shadow: 0 0 0 1px var(--cn-line); font-weight: 500; }
.cn-tabs--underline { border-bottom: 1px solid var(--cn-line); margin-bottom: 24px; }
.cn-tabs--underline .cn-tab {
  border-radius: 0;
  border-bottom: 2px solid transparent;
  padding: 10px 4px;
  margin-right: 22px;
  box-shadow: none;
  background: none;
}
.cn-tabs--underline .cn-tab.is-active {
  border-bottom-color: var(--cn-copper);
  color: var(--cn-ink);
  background: none;
}

.cn-segmented {
  display: inline-flex;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  padding: 2px;
  gap: 1px;
}
.cn-segmented button {
  background: none; border: none; font: inherit;
  font-size: 12.5px;
  padding: 6px 12px;
  border-radius: 4px;
  color: var(--cn-mute);
  cursor: pointer;
  text-transform: capitalize;
}
.cn-segmented button.is-active {
  background: var(--cn-ink); color: var(--cn-paper-2);
}
.cn-segmented--full { display: flex; }
.cn-segmented--full button { flex: 1; }

/* ─────────── Inputs ─────────── */
.cn-input, .cn-textarea {
  font: inherit; font-size: 13.5px;
  padding: 10px 12px;
  border: 1px solid var(--cn-line);
  background: var(--cn-card);
  border-radius: var(--cn-r);
  color: var(--cn-ink);
  width: 100%;
}
.cn-input:focus, .cn-textarea:focus {
  outline: none; border-color: var(--cn-copper);
  box-shadow: 0 0 0 3px rgba(180,113,72,0.15);
}
.cn-input--wide { max-width: 320px; }
.cn-textarea { font-family: var(--cn-sans); resize: vertical; min-height: 110px; }

.cn-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.cn-field label {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--cn-mute); font-weight: 500;
}
.cn-field-help { font-size: 11.5px; color: var(--cn-mute); }
.cn-field-row { display: flex; gap: 12px; margin-bottom: 18px; }
.cn-field-row .cn-field { margin-bottom: 0; }

.cn-money-input {
  display: flex; align-items: center;
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  background: var(--cn-card);
}
.cn-money-input span {
  padding: 0 10px; color: var(--cn-mute); font-family: var(--cn-mono);
  font-size: 13px;
}
.cn-money-input .cn-input { border: none; box-shadow: none; }
.cn-readout {
  padding: 10px 12px;
  border: 1px dashed var(--cn-copper);
  background: var(--cn-copper-wash);
  border-radius: var(--cn-r);
  font-size: 16px;
}

.cn-stepper {
  display: flex; align-items: center;
  border: 1px solid var(--cn-line); border-radius: var(--cn-r);
  background: var(--cn-card);
  overflow: hidden;
}
.cn-stepper button {
  background: none; border: none; font: inherit;
  width: 36px; height: 36px;
  cursor: pointer; font-size: 16px;
  color: var(--cn-mute);
}
.cn-stepper button:hover { background: var(--cn-paper-2); color: var(--cn-ink); }
.cn-stepper span { flex: 1; text-align: center; font-size: 13px; }

.cn-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.cn-chip-btn {
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: 100px;
  padding: 5px 11px;
  font: inherit; font-size: 12px;
  color: var(--cn-mute);
  cursor: pointer;
  white-space: nowrap;
}
.cn-chip-btn:hover { border-color: var(--cn-mute-2); color: var(--cn-ink); }
.cn-chip-btn.is-active {
  background: var(--cn-ink); color: var(--cn-paper-2);
  border-color: var(--cn-ink);
}

.cn-tasklets { display: flex; flex-direction: column; gap: 8px; }
.cn-tasklet {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px;
}
.cn-tasklet input { accent-color: var(--cn-copper); }

/* ─────────── Kanban ─────────── */
.cn-kanban {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 14px;
  margin-top: 4px;
}
.cn-col {
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
  padding: 12px;
  display: flex; flex-direction: column;
  min-height: 480px;
}
.cn-col-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 4px 12px;
  border-bottom: 1px solid var(--cn-line);
  margin-bottom: 12px;
}
.cn-col-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.cn-col-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.6; }
.cn-col-count {
  font-size: 11px; color: var(--cn-mute);
  background: var(--cn-card); padding: 1px 7px; border-radius: 100px;
  border: 1px solid var(--cn-line);
  font-family: var(--cn-mono);
}
.cn-col-value { font-size: 11.5px; color: var(--cn-mute); }
.cn-col-body { display: flex; flex-direction: column; gap: 8px; }

.cn-deal-card {
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  padding: 12px;
  cursor: pointer;
  transition: all 0.12s;
  display: flex; flex-direction: column; gap: 6px;
}
.cn-deal-card:hover {
  border-color: var(--cn-copper-soft);
  box-shadow: 0 4px 12px -4px rgba(180,113,72,0.18);
  transform: translateY(-1px);
}
.cn-deal-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
.cn-deal-acct { font-size: 11.5px; color: var(--cn-mute); }
.cn-deal-value {
  font-family: var(--cn-serif); font-size: 22px; font-weight: 400;
  letter-spacing: -0.01em; margin-top: 2px; color: var(--cn-ink);
}
.cn-deal-meta { display: flex; gap: 4px; }
.cn-deal-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 4px; padding-top: 8px;
  border-top: 1px solid var(--cn-line-2);
  font-size: 11px;
}
.cn-deal-close { color: var(--cn-mute); }

/* ─────────── Detail page ─────────── */
.cn-detail-head {
  padding: 24px 40px 0;
  background: var(--cn-paper-2);
  border-bottom: 1px solid var(--cn-line);
}
.cn-back {
  background: none; border: none; font: inherit;
  color: var(--cn-mute); font-size: 12px;
  cursor: pointer; padding: 0;
  margin-bottom: 16px;
}
.cn-back:hover { color: var(--cn-ink); }
.cn-detail-hero {
  display: flex; align-items: center; gap: 24px;
  padding-bottom: 22px;
}
.cn-detail-meta { flex: 1; min-width: 0; }
.cn-detail-name {
  font-family: var(--cn-serif);
  font-size: 44px;
  font-weight: 400;
  margin: 4px 0 6px;
  letter-spacing: -0.01em;
  line-height: 1;
}
.cn-detail-sub { font-size: 14px; color: var(--cn-mute); }
.cn-detail-chips { display: flex; gap: 8px; margin-top: 10px; }
.cn-detail-actions { display: flex; gap: 8px; }
.cn-detail-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--cn-line);
  border-top: 1px solid var(--cn-line);
  margin: 0 -40px;
  padding: 0 0px;
}
.cn-strip-item {
  padding: 16px 40px;
  background: var(--cn-paper-2);
  display: flex; flex-direction: column; gap: 4px;
}
.cn-strip-label {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--cn-mute); font-weight: 500;
}
.cn-strip-value { font-size: 17px; font-weight: 500; }
.cn-strip-value--mono { font-family: var(--cn-mono); font-size: 13px; }

.cn-detail-body {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 32px;
  padding: 28px 40px 60px;
}
.cn-detail-main { min-width: 0; }
.cn-detail-side { display: flex; flex-direction: column; gap: 16px; }
.cn-side-title {
  font-family: var(--cn-serif);
  font-size: 18px; font-weight: 400;
  margin: 0 0 12px;
  letter-spacing: -0.005em;
}

/* ─────────── Timeline ─────────── */
.cn-timeline { display: flex; flex-direction: column; }
.cn-tl-item { display: flex; gap: 14px; padding-bottom: 18px; }
.cn-tl-spine {
  display: flex; flex-direction: column; align-items: center;
  flex: none; width: 32px;
}
.cn-tl-dot {
  width: 32px; height: 32px; border-radius: 50%;
  display: grid; place-items: center; font-size: 12px;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  color: var(--cn-mute);
  flex: none;
}
.cn-tl-dot--call { color: var(--cn-copper); background: var(--cn-copper-wash); border-color: #E5CCAF; }
.cn-tl-dot--email { color: #4F5B6E; }
.cn-tl-dot--note { color: var(--cn-warn); }
.cn-tl-dot--won { color: var(--cn-pos); background: #DCE9DE; border-color: #B6D2BB; }
.cn-tl-line { flex: 1; width: 1px; background: var(--cn-line); margin: 4px 0; }
.cn-tl-content { flex: 1; padding-bottom: 6px; min-width: 0; }
.cn-tl-head { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
.cn-tl-title { font-weight: 500; font-size: 14px; }
.cn-tl-when { font-size: 11.5px; color: var(--cn-mute); }
.cn-tl-meta {
  display: flex; gap: 8px; align-items: center;
  margin-top: 6px;
  font-size: 12px; color: var(--cn-mute);
  flex-wrap: wrap;
}
.cn-tl-meta .cn-avatar { flex: none; }
.cn-tl-body {
  margin: 8px 0 0;
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--cn-ink-2);
  text-wrap: pretty;
}
.cn-tl-body--quote {
  border-left: 2px solid var(--cn-copper);
  padding-left: 12px;
  font-style: italic;
  color: var(--cn-mute);
}

/* ─────────── Recording ─────────── */
.cn-recording {
  margin-top: 10px;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
}
.cn-play {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--cn-copper); color: white;
  border: none; cursor: pointer;
  font-size: 11px; padding-left: 2px;
  display: grid; place-items: center;
  flex: none;
}
.cn-wave {
  flex: 1; display: flex; gap: 2px; align-items: center; height: 24px;
}
.cn-wave span {
  flex: 1; background: var(--cn-copper); opacity: 0.4;
  min-height: 4px; border-radius: 1px;
}
.cn-wave span:nth-child(3n) { opacity: 0.7; }
.cn-recording-dur { color: var(--cn-mute); }

/* ─────────── Side cards ─────────── */
.cn-side-list { display: flex; flex-direction: column; gap: 4px; }
.cn-side-deal {
  padding: 10px 0;
  border-bottom: 1px solid var(--cn-line-2);
  cursor: pointer;
}
.cn-side-deal:last-child { border-bottom: none; }
.cn-side-deal:hover .cn-side-deal-title { color: var(--cn-copper); }
.cn-side-deal-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.cn-side-deal-meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.cn-side-empty { color: var(--cn-mute); font-size: 13px; padding: 8px 0; }

.cn-side-acct-name { font-weight: 600; font-size: 14px; margin-bottom: 10px; }
.cn-side-acct-row {
  display: flex; justify-content: space-between;
  padding: 6px 0;
  font-size: 12.5px;
  border-bottom: 1px dotted var(--cn-line);
}
.cn-side-acct-row span:first-child { color: var(--cn-mute); }
.cn-side-acct-row:last-child { border-bottom: none; }

.cn-side-person {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  background: none; border: none; font: inherit;
  width: 100%; text-align: left; cursor: pointer;
  border-bottom: 1px solid var(--cn-line-2);
}
.cn-side-person:last-child { border-bottom: none; }
.cn-side-person:hover .cn-side-person-name { color: var(--cn-copper); }
.cn-side-person-name { font-size: 13px; font-weight: 500; }
.cn-side-person-title { font-size: 11.5px; color: var(--cn-mute); margin-top: 1px; }

/* ─────────── Charts ─────────── */
.cn-legend {
  font-size: 11.5px; color: var(--cn-mute);
  display: flex; align-items: center; gap: 6px;
}
.cn-legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 4px; }
.cn-legend-dot--ink { background: var(--cn-ink); }
.cn-legend-dot--copper { background: var(--cn-copper); }

.cn-chart { padding: 12px 0 0; }
.cn-chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  height: 220px;
  border-bottom: 1px solid var(--cn-line);
  padding-bottom: 8px;
}
.cn-chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; }
.cn-chart-stack { flex: 1; display: flex; align-items: flex-end; gap: 3px; width: 100%; justify-content: center; }
.cn-chart-bar {
  width: 18px; background: var(--cn-ink);
  border-radius: 2px 2px 0 0;
  min-height: 4px;
  transition: height 0.4s;
}
.cn-chart-bar--prior {
  background: var(--cn-copper-soft);
  opacity: 0.65;
}
.cn-chart-x {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cn-mute);
}
.cn-chart-val {
  font-size: 10.5px; color: var(--cn-mute);
}

.cn-bars-vert { display: flex; flex-direction: column; gap: 18px; padding-top: 6px; }
.cn-vbar { display: flex; flex-direction: column; gap: 6px; }
.cn-vbar-head { display: flex; justify-content: space-between; align-items: baseline; }
.cn-vbar-name { font-size: 13px; font-weight: 500; }
.cn-vbar-vals { display: flex; gap: 10px; align-items: baseline; }
.cn-vbar-comm { font-size: 11.5px; }
.cn-vbar-track {
  height: 6px; background: var(--cn-paper-2); border-radius: 2px;
  border: 1px solid var(--cn-line);
  overflow: hidden;
}
.cn-vbar-fill { height: 100%; background: linear-gradient(90deg, var(--cn-ink-2), var(--cn-ink)); }
.cn-vbar-meta { font-size: 11.5px; color: var(--cn-mute); }

/* Quota */
.cn-quota { display: flex; align-items: center; gap: 10px; }
.cn-quota-track {
  flex: 1; height: 6px; background: var(--cn-paper-2);
  border-radius: 2px; overflow: hidden; position: relative;
  border: 1px solid var(--cn-line);
  display: flex;
}
.cn-quota-fill { background: var(--cn-copper); height: 100%; }
.cn-quota-over { background: var(--cn-pos); height: 100%; }
.cn-quota-pct { font-size: 11px; color: var(--cn-mute); min-width: 36px; text-align: right; }

/* Status pill */
.cn-status {
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--cn-paper-2);
  color: var(--cn-mute);
}
.cn-status--paid { background: #DCE9DE; color: var(--cn-pos); }

/* ─────────── Drawer / Modal ─────────── */
.cn-drawer-scrim, .cn-modal-scrim {
  position: fixed; inset: 0;
  background: rgba(26, 22, 18, 0.32);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex;
  animation: fadeIn 0.15s ease;
}
.cn-drawer-scrim { justify-content: flex-end; }
.cn-modal-scrim { align-items: center; justify-content: center; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes popIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.cn-drawer {
  width: 580px;
  background: var(--cn-paper);
  display: flex; flex-direction: column;
  height: 100vh;
  box-shadow: -16px 0 40px rgba(26, 22, 18, 0.2);
  animation: slideIn 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.cn-drawer--wide { width: 720px; }
.cn-drawer-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 24px 32px 18px;
  border-bottom: 1px solid var(--cn-line);
  gap: 16px;
}
.cn-drawer-title {
  font-family: var(--cn-serif);
  font-size: 28px; font-weight: 400;
  margin: 0; letter-spacing: -0.01em;
  line-height: 1.05;
  white-space: nowrap;
}
.cn-drawer-body { flex: 1; overflow-y: auto; padding: 24px 32px; }
.cn-drawer-foot {
  padding: 16px 32px;
  border-top: 1px solid var(--cn-line);
  display: flex; justify-content: flex-end; gap: 10px;
  background: var(--cn-paper-2);
}

.cn-modal {
  width: 700px;
  max-height: 88vh;
  background: var(--cn-paper);
  border-radius: var(--cn-r-lg);
  display: flex; flex-direction: column;
  box-shadow: 0 24px 64px rgba(26, 22, 18, 0.28);
  animation: popIn 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
  overflow: hidden;
}
.cn-modal-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 22px 28px 16px;
  border-bottom: 1px solid var(--cn-line);
}
.cn-modal-title {
  font-family: var(--cn-serif);
  font-size: 28px; font-weight: 400;
  margin: 0; letter-spacing: -0.01em;
}
.cn-modal-body { padding: 22px 28px; overflow-y: auto; }
.cn-modal-foot {
  padding: 16px 28px;
  border-top: 1px solid var(--cn-line);
  display: flex; justify-content: flex-end; gap: 10px;
  background: var(--cn-paper-2);
}

/* Stage picker */
.cn-stage-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.cn-stage-step {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  cursor: pointer;
  font: inherit;
  text-align: left;
}
.cn-stage-step-label { font-size: 12.5px; font-weight: 500; }
.cn-stage-step-prob { font-size: 11px; color: var(--cn-mute); }
.cn-stage-step.is-active {
  border-color: var(--cn-copper); background: var(--cn-copper-wash);
  box-shadow: 0 0 0 3px rgba(180,113,72,0.12);
}
.cn-stage-step.is-active .cn-stage-step-prob { color: var(--cn-copper-deep); }

/* Recorder */
.cn-recorder {
  border: 1px solid var(--cn-line);
  background: var(--cn-paper-2);
  border-radius: var(--cn-r-lg);
  padding: 16px;
  margin-bottom: 18px;
}
.cn-recorder-controls {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.cn-rec-btn {
  display: inline-flex; align-items: center; gap: 9px;
  background: var(--cn-card); border: 1px solid var(--cn-line);
  font: inherit; font-size: 13px; font-weight: 500;
  padding: 8px 14px; border-radius: var(--cn-r);
  cursor: pointer;
  white-space: nowrap;
}
.cn-rec-btn.is-rec { background: var(--cn-ink); color: var(--cn-paper-2); border-color: var(--cn-ink); }
.cn-rec-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--cn-neg);
}
.cn-rec-btn.is-rec .cn-rec-dot { animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.cn-rec-meta { font-size: 13px; color: var(--cn-mute); display: flex; gap: 10px; align-items: center; }
.cn-rec-live { color: var(--cn-neg); font-weight: 600; font-size: 10.5px; letter-spacing: 0.08em; }
.cn-rec-wave {
  display: flex; gap: 2px; align-items: center;
  height: 40px;
  padding: 0 2px;
}
.cn-rec-wave span {
  flex: 1; background: var(--cn-copper);
  min-height: 4px; border-radius: 1px;
  transition: height 0.1s, opacity 0.1s;
}
.cn-rec-foot {
  font-size: 11.5px; color: var(--cn-mute);
  margin-top: 10px;
  text-align: center;
}

/* Opp drawer strip */
.cn-opp-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--cn-line);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
  overflow: hidden;
}
.cn-opp-strip > div {
  background: var(--cn-paper-2);
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 4px;
}

/* Progress stepper */
.cn-progress {
  display: flex; align-items: center;
  margin-top: 12px;
  padding: 16px 8px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
}
.cn-progress-step {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  position: relative;
  font-size: 11.5px;
}
.cn-progress-step:not(:last-child)::after {
  content: ""; position: absolute;
  top: 13px;
  left: calc(50% + 14px);
  right: calc(-50% + 14px);
  height: 1px;
  background: var(--cn-line);
}
.cn-progress-step--done:not(:last-child)::after { background: var(--cn-copper); }
.cn-progress-dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  color: var(--cn-mute);
  z-index: 1;
}
.cn-progress-step--done .cn-progress-dot { background: var(--cn-copper); color: white; border-color: var(--cn-copper); }
.cn-progress-step--current .cn-progress-dot {
  background: var(--cn-ink); color: var(--cn-paper-2); border-color: var(--cn-ink);
  box-shadow: 0 0 0 3px var(--cn-copper-wash);
}
.cn-progress-label { color: var(--cn-mute); font-weight: 500; }
.cn-progress-step--current .cn-progress-label { color: var(--cn-ink); }
.cn-progress-step--done .cn-progress-label { color: var(--cn-ink-2); }

.cn-contact-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  cursor: pointer; font: inherit;
  width: 100%; text-align: left;
}
.cn-contact-row:hover { background: var(--cn-paper-2); border-color: var(--cn-copper-soft); }

/* ─────────── Login + Loading + Empty States ─────────── */
.cn-login, .cn-loading, .cn-empty {
  min-height: 100vh;
  background: var(--cn-paper);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}
.cn-login-card, .cn-empty-card {
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
  padding: 44px 40px 32px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 20px 60px -20px rgba(26, 22, 18, 0.15);
}
.cn-login-logo img {
  width: auto;
  height: 124px;
  object-fit: contain;
  display: block;
  margin: 0 auto 14px;
  filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.12));
}
.cn-login-brand { margin-bottom: 24px; }
.cn-login-brand .cn-brand-name {
  font-family: var(--cn-serif);
  font-size: 22px;
  letter-spacing: 0.14em;
  color: var(--cn-ink);
  text-transform: uppercase;
}
.cn-login-brand .cn-brand-sub {
  font-size: 8.5px;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--cn-copper);
  margin-top: 3px;
}
.cn-login-title {
  font-family: var(--cn-serif);
  font-size: 32px; font-weight: 400;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.cn-login-sub {
  color: var(--cn-mute);
  font-size: 13px;
  margin: 0 0 28px;
}
.cn-login-form { text-align: left; }
.cn-login-form .cn-field label { text-align: left; }
.cn-login-error {
  color: var(--cn-neg);
  background: #F2DED9;
  border: 1px solid #DAB4AC;
  padding: 10px 12px;
  border-radius: var(--cn-r);
  font-size: 12.5px;
  margin-bottom: 12px;
}
.cn-login-submit {
  width: 100%; height: 42px;
  justify-content: center;
  font-size: 14px;
  margin-top: 6px;
}
.cn-login-foot {
  font-size: 11.5px; color: var(--cn-mute);
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid var(--cn-line-2);
}

.cn-loading {
  flex-direction: column;
  gap: 16px;
}
.cn-loading-logo {
  width: auto;
  height: 88px;
  object-fit: contain;
  animation: cnPulse 1.6s ease-in-out infinite;
}
.cn-loading-text {
  color: var(--cn-mute);
  font-size: 13px;
  letter-spacing: 0.04em;
}
@keyframes cnPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.96); }
}

.cn-empty-card {
  max-width: 480px;
  padding: 48px 40px;
}
.cn-empty-title {
  font-family: var(--cn-serif);
  font-size: 30px; font-weight: 400;
  margin: 0 0 10px;
  letter-spacing: -0.01em;
}
.cn-empty-sub {
  color: var(--cn-mute);
  font-size: 14px;
  line-height: 1.5;
  margin: 0 0 28px;
}
.cn-empty-actions {
  display: flex; gap: 10px; justify-content: center;
}
.cn-empty-foot {
  margin-top: 28px;
  padding-top: 18px;
  border-top: 1px solid var(--cn-line-2);
}

.cn-signout {
  background: none; border: none; font: inherit;
  color: var(--cn-side-mute);
  font-size: 11px;
  cursor: pointer;
  padding: 8px 6px 0;
  text-align: left;
  width: 100%;
}
.cn-signout:hover { color: var(--cn-side-ink); }

/* ─────────── Searchable Select ─────────── */
.cn-ss { position: relative; }
.cn-ss-control {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  cursor: text;
  min-height: 38px;
  font-size: 13.5px;
}
.cn-ss-control:hover { border-color: var(--cn-mute-2); }
.cn-ss-control.is-open {
  border-color: var(--cn-copper);
  box-shadow: 0 0 0 3px rgba(180,113,72,0.15);
}
.cn-ss-input {
  flex: 1; border: none; outline: none; background: none;
  font: inherit; font-size: 13.5px;
  color: var(--cn-ink);
  padding: 0;
  min-width: 0;
}
.cn-ss-value { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.cn-ss-label { color: var(--cn-ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cn-ss-subtext { font-size: 11px; color: var(--cn-mute); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cn-ss-placeholder { flex: 1; color: var(--cn-mute-2); }
.cn-ss-clear {
  background: none; border: none; font: inherit; color: var(--cn-mute);
  cursor: pointer; padding: 2px 4px; font-size: 11px;
}
.cn-ss-clear:hover { color: var(--cn-ink); }
.cn-ss-caret { color: var(--cn-mute); font-size: 10px; }
.cn-ss-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  box-shadow: 0 12px 32px -12px rgba(26,22,18,0.2);
  max-height: 260px;
  overflow-y: auto;
  z-index: 30;
  padding: 4px;
}
.cn-ss-item {
  padding: 8px 10px;
  border-radius: 4px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 1px;
}
.cn-ss-item.is-highlight { background: var(--cn-paper-2); }
.cn-ss-item.is-selected { background: var(--cn-copper-wash); }
.cn-ss-item-label { font-size: 13px; color: var(--cn-ink); }
.cn-ss-item-sub { font-size: 11.5px; color: var(--cn-mute); }
.cn-ss-empty { padding: 10px; color: var(--cn-mute); font-size: 12.5px; text-align: center; }

/* ─────────── Stage / Edit actions ─────────── */
.cn-stage-actions {
  display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
}
.cn-btn--win {
  background: #DCE9DE; color: var(--cn-pos);
  border: 1px solid #B6D2BB;
}
.cn-btn--win:hover { background: #CFE0D2; }
.cn-btn--lose {
  background: #F2DED9; color: var(--cn-neg);
  border: 1px solid #DAB4AC;
}
.cn-btn--lose:hover { background: #ECCFC8; }
.cn-btn--danger {
  background: transparent; color: var(--cn-neg);
  border: 1px solid #DAB4AC;
}
.cn-btn--danger:hover { background: #F2DED9; }
.cn-progress-step--clickable {
  background: none; border: none; font: inherit; cursor: pointer;
  padding: 0;
}
.cn-progress-step--clickable:hover .cn-progress-dot { transform: scale(1.1); }
.cn-progress-step--clickable .cn-progress-dot { transition: transform 0.15s; }
.cn-drawer-title-input {
  font-family: var(--cn-serif);
  font-size: 28px; font-weight: 400;
  padding: 4px 8px;
  border: 1px solid var(--cn-line);
  background: var(--cn-paper-2);
  border-radius: var(--cn-r);
  width: 100%;
}
.cn-detail-name-input {
  font-family: var(--cn-serif);
  font-size: 40px; font-weight: 400;
  letter-spacing: -0.01em;
  padding: 4px 8px;
  margin: 4px 0 6px;
  border: 1px solid var(--cn-line);
  background: var(--cn-card);
  border-radius: var(--cn-r);
  width: 100%;
  line-height: 1;
}
.cn-detail-sub-input {
  font-size: 14px;
  padding: 6px 8px;
  border: 1px solid var(--cn-line);
  background: var(--cn-card);
  border-radius: var(--cn-r);
  width: 100%;
}
/* ─────────── Quotes ─────────── */
.cn-quote-empty {
  display: flex; align-items: center; gap: 16px;
  padding: 18px;
  background: var(--cn-paper-2);
  border: 1px dashed var(--cn-line);
  border-radius: var(--cn-r-lg);
}
.cn-quote-empty-icon {
  width: 44px; height: 44px;
  display: grid; place-items: center;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: 8px;
  color: var(--cn-copper);
  font-size: 20px;
  flex: none;
}
.cn-q-versions { display: flex; flex-direction: column; gap: 8px; }
.cn-q-row {
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px;
  padding: 12px 14px;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  transition: border-color 0.12s, box-shadow 0.12s;
}
.cn-q-row.is-editing {
  border-color: var(--cn-copper);
  box-shadow: 0 0 0 3px rgba(180,113,72,0.10);
}
.cn-q-row-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.cn-q-vtag {
  font-family: var(--cn-serif);
  font-size: 18px;
  letter-spacing: -0.01em;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: 4px;
  padding: 4px 9px;
  color: var(--cn-copper-deep);
  flex: none;
}
.cn-q-row-num { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
.cn-q-row-sub { font-size: 11.5px; color: var(--cn-mute); margin-top: 2px; }
.cn-q-viewed-inline { color: var(--cn-pos); font-weight: 500; }
.cn-q-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex: none; }
.cn-q-row-total {
  font-family: var(--cn-serif);
  font-size: 22px;
  letter-spacing: -0.01em;
}
.cn-q-row-actions { display: flex; gap: 6px; align-items: center; font-size: 12px; }
.cn-q-actsep { color: var(--cn-mute-2); }
.cn-link--pos { color: var(--cn-pos) !important; }
.cn-link--pos:hover { color: #2A4A31 !important; }
.cn-link--neg { color: var(--cn-neg) !important; }
.cn-link--neg:hover { color: #5F2620 !important; }

.cn-q-summary {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  margin-bottom: 10px;
  font-size: 12.5px;
}
.cn-q-summary-sep { color: var(--cn-mute-2); }
.cn-q-status-dot--accepted {
  background: var(--cn-pos);
  box-shadow: 0 0 0 3px rgba(61,107,71,0.18);
}
.cn-q-status-dot--declined { background: var(--cn-neg); }

.cn-q-pill {
  display: inline-flex;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
}
.cn-q-draft { background: var(--cn-paper-2); color: var(--cn-mute); border: 1px solid var(--cn-line); }
.cn-q-sent { background: #E6EBF1; color: #4F5B6E; border: 1px solid #C7D1DD; }
.cn-q-viewed { background: var(--cn-copper-wash); color: var(--cn-copper-deep); border: 1px solid #E5CCAF; }
.cn-q-accepted { background: #DCE9DE; color: var(--cn-pos); border: 1px solid #B6D2BB; }
.cn-q-declined { background: #ECD4CE; color: var(--cn-neg); border: 1px solid #DAB4AC; }

/* Builder modal overrides */
.cn-quote-scrim { z-index: 150; }
.cn-quote-modal {
  width: min(1080px, 96vw);
  max-height: 92vh;
}
.cn-quote-body { padding: 0; }
.cn-quote-doc-edit {
  padding: 24px 28px 28px;
  display: flex; flex-direction: column;
  gap: 22px;
}
.cn-quote-num {
  font-family: var(--cn-serif);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.01em;
  padding: 4px 10px;
  width: auto;
  min-width: 220px;
  background: var(--cn-paper-2);
}
.cn-quote-meta-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.cn-quote-meta-grid .cn-field { margin-bottom: 0; }
.cn-quote-billto {
  display: flex;
  gap: 20px;
  padding: 18px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
}
.cn-quote-billto .cn-field { margin-bottom: 0; }

.cn-quote-li-wrap { margin-top: 4px; }
.cn-li-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  overflow: hidden;
}
.cn-li-table thead th {
  text-align: left;
  font-weight: 500;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cn-mute);
  padding: 10px 10px;
  background: var(--cn-paper-2);
  border-bottom: 1px solid var(--cn-line);
}
.cn-li-table tbody td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--cn-line-2);
  vertical-align: middle;
}
.cn-li-table tbody tr:last-child td { border-bottom: none; }
.cn-li-desc-row td { padding-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--cn-line); }
.cn-li-table tbody tr.cn-li-desc-row:last-child td { border-bottom: none; }
.cn-li-right { text-align: right; }
.cn-li-input {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  font: inherit;
  font-size: 13px;
  padding: 7px 8px;
  border-radius: 4px;
  color: var(--cn-ink);
}
.cn-li-input:hover { background: var(--cn-paper-2); }
.cn-li-input:focus {
  outline: none;
  background: var(--cn-card);
  border-color: var(--cn-copper);
  box-shadow: 0 0 0 2px rgba(180,113,72,0.15);
}
.cn-li-right-input { text-align: right; }
.cn-li-desc { font-size: 12px; color: var(--cn-mute); font-style: italic; }
.cn-li-desc:focus { font-style: normal; color: var(--cn-ink); }
.cn-li-money { display: flex; align-items: center; gap: 2px; }
.cn-li-money > span:first-child { color: var(--cn-mute); font-family: var(--cn-mono); font-size: 12px; padding-left: 6px; }
.cn-li-total {
  font-weight: 500;
  white-space: nowrap;
  padding-right: 14px !important;
}
.cn-li-handle { display: flex; flex-direction: column; gap: 1px; }
.cn-li-mover {
  width: 18px; height: 14px;
  background: none; border: none;
  color: var(--cn-mute-2);
  cursor: pointer;
  font-size: 10px;
  padding: 0;
}
.cn-li-mover:hover:not(:disabled) { color: var(--cn-copper); }
.cn-li-mover:disabled { opacity: 0.3; cursor: not-allowed; }
.cn-li-remove {
  width: 24px; height: 24px;
  background: none; border: none;
  border-radius: 4px;
  color: var(--cn-mute);
  cursor: pointer;
  font-size: 11px;
}
.cn-li-remove:hover:not(:disabled) { background: #F2DED9; color: var(--cn-neg); }
.cn-li-remove:disabled { opacity: 0.3; cursor: not-allowed; }

.cn-quote-foot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.cn-quote-foot-grid .cn-field { margin-bottom: 0; }
.cn-quote-foot-grid .cn-textarea { min-height: 84px; }

.cn-quote-totals {
  display: flex; flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  padding-top: 18px;
  border-top: 1px solid var(--cn-line);
}
.cn-quote-totals-row {
  display: flex; gap: 40px; align-items: baseline;
  font-size: 14px;
}
.cn-quote-totals-row > span:first-child { color: var(--cn-mute); }
.cn-quote-totals-row--final {
  font-family: var(--cn-serif);
  font-size: 36px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--cn-ink);
}
.cn-quote-totals-row--final > span:first-child {
  font-family: var(--cn-sans);
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--cn-mute); font-weight: 500;
}
.cn-quote-totals-meta {
  font-size: 11.5px; color: var(--cn-mute);
}

/* Share modal */
.cn-share-link {
  display: flex; gap: 8px;
}
.cn-share-link .cn-input { font-size: 12px; }
.cn-share-status {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  margin: 20px 0 16px;
}
.cn-share-status-line {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; margin-top: 6px;
}
.cn-q-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--cn-mute-2);
}
.cn-q-status-dot--draft { background: var(--cn-mute-2); }
.cn-q-status-dot--sent { background: #4F5B6E; }
.cn-q-status-dot--viewed { background: var(--cn-pos); box-shadow: 0 0 0 3px rgba(61,107,71,0.18); }
.cn-q-status-dot--waiting {
  background: var(--cn-copper);
  animation: cnPulse 1.6s ease-in-out infinite;
}
.cn-share-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 8px;
}
.cn-share-demo {
  margin-top: 18px;
  font-size: 12px;
  color: var(--cn-mute);
}
.cn-share-demo summary {
  cursor: pointer;
  padding: 4px 0;
  user-select: none;
}

/* Public share document */
.cn-share-page {
  min-height: 100vh;
  background: var(--cn-paper);
  padding: 0 20px 60px;
}
.cn-share-toolbar {
  position: sticky; top: 0; z-index: 5;
  display: flex; justify-content: space-between; align-items: center;
  max-width: 880px; margin: 0 auto;
  padding: 18px 0;
  background: var(--cn-paper);
  border-bottom: 1px solid var(--cn-line);
}
.cn-share-toolbar-brand { display: flex; flex-direction: column; line-height: 1.1; }

.cn-quote-doc {
  max-width: 880px;
  margin: 32px auto 0;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: 4px;
  padding: 56px 60px;
  box-shadow: 0 20px 60px -30px rgba(26, 22, 18, 0.18);
}
.cn-qd-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 32px;
  padding-bottom: 28px;
  border-bottom: 2px solid var(--cn-ink);
  margin-bottom: 28px;
}
.cn-qd-brand {
  font-family: var(--cn-serif);
  font-size: 28px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--cn-ink);
  line-height: 1;
}
.cn-qd-tag {
  font-size: 9px;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--cn-copper);
  margin-top: 6px;
}
.cn-qd-stamp { text-align: right; min-width: 230px; }
.cn-qd-stamp-label {
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cn-mute);
}
.cn-qd-stamp-num {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.02em;
  margin-top: 4px;
  color: var(--cn-copper-deep);
}
.cn-qd-stamp-meta {
  margin-top: 12px;
  display: flex; flex-direction: column; gap: 2px;
  font-size: 12px;
}
.cn-qd-stamp-meta > div {
  display: flex; gap: 16px; justify-content: flex-end;
}
.cn-qd-stamp-meta > div > span:first-child {
  color: var(--cn-mute);
  letter-spacing: 0.08em; text-transform: uppercase; font-size: 10.5px;
}
.cn-qd-parties {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-bottom: 36px;
  font-size: 13.5px;
  line-height: 1.55;
}
.cn-qd-eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  font-weight: 500;
  margin-bottom: 6px;
}
.cn-qd-party-name {
  font-family: var(--cn-serif);
  font-size: 20px;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.cn-qd-party-addr { color: var(--cn-ink-2); white-space: pre-line; }

.cn-qd-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 28px;
  font-size: 13px;
}
.cn-qd-table thead th {
  text-align: left;
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  font-weight: 500;
  padding: 10px 12px;
  border-bottom: 1px solid var(--cn-ink);
}
.cn-qd-table tbody td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--cn-line-2);
  vertical-align: top;
}
.cn-qd-pn { font-size: 13px; font-weight: 500; color: var(--cn-ink); }
.cn-qd-desc { font-size: 12px; color: var(--cn-mute); margin-top: 3px; line-height: 1.5; }
.cn-qd-table tfoot td {
  padding: 18px 12px 10px;
  font-family: var(--cn-serif);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
  border-top: 2px solid var(--cn-ink);
}
.cn-qd-table tfoot td:first-child {
  font-size: 11px;
  font-family: var(--cn-sans);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  font-weight: 500;
}
.cn-qd-grand {
  color: var(--cn-copper-deep);
  font-size: 32px;
}

.cn-qd-notes, .cn-qd-terms {
  margin-bottom: 22px;
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--cn-ink-2);
}
.cn-qd-notes p, .cn-qd-terms p { margin: 0; }
.cn-qd-terms { color: var(--cn-mute); }

.cn-qd-foot {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--cn-line);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px;
}

/* Recipient decision panel */
.cn-qd-decision {
  margin-top: 32px;
  padding: 22px 24px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-left: 3px solid var(--cn-copper);
  border-radius: var(--cn-r);
  display: flex; align-items: flex-end; gap: 20px;
}
.cn-qd-decision-lead { flex: 1; }
.cn-qd-decision-text {
  font-family: var(--cn-serif);
  font-size: 18px;
  letter-spacing: -0.005em;
  margin-top: 4px;
  color: var(--cn-ink);
  max-width: 460px;
}
.cn-qd-decision-actions {
  display: flex; gap: 8px;
  flex: none;
}
.cn-qd-decision-actions .cn-btn { height: 40px; padding: 0 18px; }

.cn-qd-decided {
  margin-top: 32px;
  padding: 20px 24px;
  border-radius: var(--cn-r);
  display: flex; align-items: center; gap: 16px;
}
.cn-qd-decided--accepted {
  background: #DCE9DE;
  border: 1px solid #B6D2BB;
  color: var(--cn-pos);
}
.cn-qd-decided--declined {
  background: #ECD4CE;
  border: 1px solid #DAB4AC;
  color: var(--cn-neg);
}
.cn-qd-decided-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: grid; place-items: center;
  background: currentColor;
  color: var(--cn-paper);
  font-size: 16px;
  flex: none;
}
.cn-qd-decided-title {
  font-family: var(--cn-serif);
  font-size: 22px;
  letter-spacing: -0.005em;
  line-height: 1.1;
}
.cn-qd-decided-sub {
  font-size: 13px;
  color: var(--cn-ink-2);
  margin-top: 4px;
}
.cn-qd-decided--accepted .cn-qd-decided-sub,
.cn-qd-decided--declined .cn-qd-decided-sub { opacity: 0.85; }

@media print {
  .cn-qd-decision { display: none !important; }
}

/* Print: clean PDF output */
@media print {
  body, .cn-share-page { background: white !important; padding: 0 !important; }
  .cn-share-toolbar { display: none !important; }
  .cn-quote-doc {
    max-width: none;
    margin: 0;
    border: none;
    box-shadow: none;
    padding: 32px 40px;
    background: white;
  }
  .cn-qd-table tbody tr { page-break-inside: avoid; }
}

/* Quick-add contact panel inside opp modal */
.cn-quick-add {
  padding: 16px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-left: 3px solid var(--cn-copper);
  border-radius: var(--cn-r);
  margin-top: -6px;
  margin-bottom: 18px;
}
.cn-quick-add .cn-field { margin-bottom: 12px; }

/* Edit-extras section inside Opp drawer */
.cn-edit-extras {
  margin-top: 22px;
  padding: 18px 20px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
}
.cn-edit-extras .cn-field:last-child { margin-bottom: 0; }

/* Toast stack — multiple toasts stack vertically bottom-right */
.cn-toast-stack {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}
.cn-toast-stack > .cn-toast {
  position: relative;
  bottom: auto;
  right: auto;
  pointer-events: auto;
}
.cn-toast-tick--error { background: var(--cn-neg); }
.cn-toast--error { border-left-color: var(--cn-neg); }

/* Sending state + toast */
.cn-spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(244, 238, 227, 0.3);
  border-top-color: var(--cn-paper-2);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: -2px;
  animation: cnSpin 0.6s linear infinite;
}
@keyframes cnSpin {
  to { transform: rotate(360deg); }
}
.cn-success-tick {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--cn-pos);
  color: white;
  font-size: 12px;
  font-weight: 700;
}
@keyframes cnToastIn {
  from { transform: translateX(120%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.cn-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px 14px 16px;
  background: var(--cn-ink);
  color: var(--cn-paper-2);
  border-radius: var(--cn-r);
  box-shadow: 0 18px 40px -10px rgba(26, 22, 18, 0.4);
  animation: cnToastIn 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  max-width: 420px;
  font-size: 13px;
}
.cn-toast--success { border-left: 3px solid var(--cn-pos); }
.cn-toast-tick {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--cn-pos);
  color: white;
  font-size: 12px;
  font-weight: 700;
  flex: none;
}
.cn-toast-title { font-weight: 600; }
.cn-toast-sub { color: rgba(244, 238, 227, 0.7); font-size: 11.5px; margin-top: 2px; }
.cn-toast-x {
  background: none; border: none;
  color: rgba(244, 238, 227, 0.6);
  cursor: pointer;
  font-size: 14px;
  margin-left: 4px;
}
.cn-toast-x:hover { color: var(--cn-paper-2); }

/* ── Sale banner (top-of-app celebration when a quote is accepted) ── */
.cn-sale-stack {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  display: flex; flex-direction: column;
  pointer-events: none;
}
.cn-sale-banner {
  pointer-events: auto;
  background: linear-gradient(180deg, #3D6B47 0%, #2F5A38 100%);
  color: #F4EEE3;
  border-bottom: 1px solid rgba(0,0,0,0.12);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  animation: cn-sale-drop .35s cubic-bezier(.2,.7,.3,1.2) both;
  overflow: hidden;
}
.cn-sale-banner.is-undone {
  background: linear-gradient(180deg, #514741 0%, #3a322d 100%);
  opacity: 0.85;
}
@keyframes cn-sale-drop {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.cn-sale-marquee {
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.18);
  padding: 6px 0;
  white-space: nowrap;
  mask-image: linear-gradient(90deg, transparent 0, #000 8%, #000 92%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 8%, #000 92%, transparent 100%);
}
.cn-sale-marquee-track {
  display: inline-flex;
  gap: 28px;
  animation: cn-sale-marquee 22s linear infinite;
  font-family: var(--cn-serif);
  font-size: 14px;
  letter-spacing: 0.04em;
}
.cn-sale-marquee-item {
  display: inline-flex; align-items: center; gap: 10px;
  color: #F4EEE3;
}
.cn-sale-marquee-icon {
  color: #E8B968;
  font-size: 12px;
  display: inline-block;
}
@keyframes cn-sale-marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.cn-sale-banner.is-undone .cn-sale-marquee { display: none; }
.cn-sale-body {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px 14px;
  max-width: 1400px;
  margin: 0 auto;
}
.cn-sale-body-left { flex: 1; min-width: 0; }
.cn-sale-eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(244, 238, 227, 0.65);
  margin-bottom: 4px;
}
.cn-sale-headline {
  font-family: var(--cn-serif);
  font-size: 20px;
  line-height: 1.25;
  font-weight: 500;
  color: #F4EEE3;
}
.cn-sale-amount {
  color: #E8B968;
  font-weight: 600;
}
.cn-sale-sub {
  margin-top: 3px;
  font-size: 12.5px;
  color: rgba(244, 238, 227, 0.75);
}
.cn-sale-actions { display: flex; align-items: center; gap: 8px; flex: none; }
.cn-sale-btn {
  background: rgba(255,255,255,0.16);
  border: 1px solid rgba(255,255,255,0.22);
  color: #F4EEE3;
  padding: 6px 14px; height: 30px;
  border-radius: var(--cn-r);
  font: inherit; font-size: 12.5px; font-weight: 500;
  cursor: pointer; transition: background .12s ease;
}
.cn-sale-btn:hover { background: rgba(255,255,255,0.26); }
.cn-sale-btn--ghost { background: transparent; }
.cn-sale-btn--ghost:hover { background: rgba(255,255,255,0.12); }
.cn-sale-x {
  background: none; border: none;
  color: rgba(244, 238, 227, 0.7);
  cursor: pointer;
  font-size: 16px; line-height: 1;
  padding: 4px 6px;
}
.cn-sale-x:hover { color: #F4EEE3; }

/* push the main app content down when a banner is shown */
.cn-sale-stack:not(:empty) ~ .cn-app .cn-topbar,
.cn-app:has(+ .cn-sale-stack:not(:empty)) .cn-topbar { /* progressive enhancement */ }

/* Recipient picker */
.cn-camp-mode {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
.cn-camp-mode-tab {
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  padding: 14px 16px;
  text-align: left;
  cursor: pointer;
  font: inherit;
  transition: all 0.12s;
}
.cn-camp-mode-tab:hover { border-color: var(--cn-copper-soft); }
.cn-camp-mode-tab.is-active {
  border-color: var(--cn-copper);
  background: var(--cn-copper-wash);
  box-shadow: 0 0 0 3px rgba(180,113,72,0.12);
}
.cn-camp-mode-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.cn-camp-mode-sub { font-size: 12px; color: var(--cn-mute); }

.cn-rp {
  display: flex; flex-direction: column;
  gap: 18px;
}
.cn-rp-search-wrap { position: relative; }
.cn-rp-suggest {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  box-shadow: 0 12px 32px -12px rgba(26,22,18,0.18);
  z-index: 10;
  max-height: 280px;
  overflow-y: auto;
  padding: 4px;
}
.cn-rp-sug-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  background: none; border: none; font: inherit;
  text-align: left;
  padding: 8px 10px;
  border-radius: 4px;
  cursor: pointer;
}
.cn-rp-sug-item:hover { background: var(--cn-paper-2); }
.cn-rp-sug-text { flex: 1; min-width: 0; }
.cn-rp-empty {
  padding: 10px 4px 0;
  font-size: 12.5px; color: var(--cn-mute);
}
.cn-rp-add-prospect {
  background: none; border: 1px dashed var(--cn-line);
  border-radius: var(--cn-r);
  padding: 10px 14px;
  font: inherit; font-size: 12.5px;
  color: var(--cn-copper);
  cursor: pointer;
  text-align: left;
}
.cn-rp-add-prospect:hover { border-color: var(--cn-copper); background: var(--cn-copper-wash); }

.cn-rp-prospect-form {
  padding: 16px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
}
.cn-rp-prospect-form .cn-field { margin-bottom: 12px; }

.cn-rp-picked {
  padding-top: 6px;
  border-top: 1px solid var(--cn-line);
}
.cn-rp-empty-state {
  padding: 18px;
  text-align: center;
  color: var(--cn-mute);
  font-size: 12.5px;
  background: var(--cn-paper-2);
  border: 1px dashed var(--cn-line);
  border-radius: var(--cn-r);
}
.cn-rp-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.cn-rp-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 8px 5px 6px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: 100px;
  font-size: 12px;
}
.cn-rp-chip-text { display: flex; flex-direction: column; line-height: 1.1; }
.cn-rp-chip-name { font-weight: 500; font-size: 12.5px; }
.cn-rp-chip-email { font-size: 10.5px; color: var(--cn-mute); }
.cn-rp-chip-x {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: none; border: none;
  color: var(--cn-mute);
  cursor: pointer;
  font-size: 10px;
  display: grid; place-items: center;
}
.cn-rp-chip-x:hover { background: var(--cn-neg); color: white; }

/* ─────────── Outreach ─────────── */
.cn-out-banner {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 16px;
  background: var(--cn-copper-wash);
  border: 1px solid #E5CCAF;
  border-left: 3px solid var(--cn-copper);
  border-radius: var(--cn-r);
  font-size: 12.5px;
  color: var(--cn-copper-deep);
  line-height: 1.5;
  margin-bottom: 18px;
}
.cn-out-banner strong { color: var(--cn-ink); }

.cn-out-split {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 1px;
  background: var(--cn-line);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
  overflow: hidden;
  min-height: 580px;
}
.cn-out-list {
  background: var(--cn-paper-2);
  padding: 16px 14px;
  overflow-y: auto;
}
.cn-out-list-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
  padding: 0 6px;
}
.cn-out-cat { margin-bottom: 16px; }
.cn-out-cat-name {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cn-mute);
  padding: 0 8px 6px;
  font-weight: 500;
}
.cn-out-row {
  display: block; width: 100%;
  background: none; border: none;
  text-align: left;
  padding: 9px 10px;
  border-radius: var(--cn-r);
  cursor: pointer;
  font: inherit;
  margin-bottom: 2px;
  position: relative;
}
.cn-out-row:hover { background: var(--cn-card); }
.cn-out-row.is-active {
  background: var(--cn-card);
  box-shadow: inset 2px 0 0 var(--cn-copper);
}
.cn-out-row-title { font-size: 13px; font-weight: 500; padding-right: 56px; }
.cn-out-row-sub {
  font-size: 11.5px; color: var(--cn-mute);
  margin-top: 2px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  padding-right: 56px;
}
.cn-out-row-send {
  position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
  font-size: 11px; font-weight: 600;
  color: var(--cn-copper); background: var(--cn-copper-wash);
  padding: 4px 8px; border-radius: 999px;
  opacity: 0; transition: opacity .12s ease;
  cursor: pointer; user-select: none;
}
.cn-out-row:hover .cn-out-row-send,
.cn-out-row.is-active .cn-out-row-send { opacity: 1; }
.cn-out-row-send:hover { background: var(--cn-copper); color: #fff; }

/* Template picker cards (modal list) */
.cn-tp-card {
  display: block; width: 100%; text-align: left;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  padding: 12px 14px;
  cursor: pointer;
  position: relative;
  font: inherit; color: inherit;
  transition: border-color .12s ease, background .12s ease;
}
.cn-tp-card:hover { border-color: var(--cn-copper); background: var(--cn-card); }
.cn-tp-name { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; }
.cn-tp-subject { font-size: 12.5px; color: var(--cn-ink); margin-bottom: 6px; }
.cn-tp-body {
  font-size: 12px; color: var(--cn-mute); line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.cn-tp-use {
  position: absolute; top: 12px; right: 14px;
  font-size: 11px; font-weight: 600; color: var(--cn-copper);
  opacity: 0; transition: opacity .12s ease;
}
.cn-tp-card:hover .cn-tp-use { opacity: 1; }

/* Quick-send "To" chip */
.cn-qs-to {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
}

/* Banner image picker */
.cn-img-picker {
  display: flex; gap: 10px; align-items: flex-start;
}
.cn-img-picker-thumb {
  width: 96px; height: 64px; flex-shrink: 0;
  background: var(--cn-paper-2);
  border: 1px dashed var(--cn-line);
  border-radius: var(--cn-r);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--cn-mute);
  overflow: hidden;
}
.cn-img-picker-thumb img { width: 100%; height: 100%; object-fit: cover; }
.cn-img-picker-controls { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.cn-img-picker-row { display: flex; gap: 6px; align-items: center; }
.cn-img-picker-upload {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; height: 30px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  font-size: 12px; cursor: pointer;
  transition: border-color .12s ease;
}
.cn-img-picker-upload:hover { border-color: var(--cn-copper); }
.cn-img-picker-upload input { display: none; }
.cn-img-picker-clear {
  background: none; border: none; color: var(--cn-mute);
  font-size: 12px; cursor: pointer; padding: 4px 6px;
}
.cn-img-picker-clear:hover { color: var(--cn-neg); }
.cn-out-edit {
  background: var(--cn-card);
  padding: 24px 28px;
  overflow-y: auto;
}
.cn-out-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--cn-mute);
}
.cn-out-empty-title {
  font-family: var(--cn-serif);
  font-size: 22px;
  color: var(--cn-ink);
  margin-bottom: 6px;
}
.cn-out-empty-sub { font-size: 13px; }
.cn-merge-help {
  margin-top: 18px;
  padding: 14px;
  background: var(--cn-paper-2);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
}

/* Campaigns */
.cn-camp-modal {
  width: min(1080px, 96vw);
  max-height: 92vh;
}
.cn-camp-body {
  padding: 22px 28px 28px;
}
.cn-camp-steps {
  display: flex;
  gap: 0;
  padding: 12px 28px 0;
  background: var(--cn-paper-2);
  border-bottom: 1px solid var(--cn-line);
}
.cn-camp-step {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px 12px;
  font-size: 12.5px;
  color: var(--cn-mute);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: default;
}
.cn-camp-step.is-done { color: var(--cn-ink-2); cursor: pointer; }
.cn-camp-step.is-current {
  color: var(--cn-ink);
  border-bottom-color: var(--cn-copper);
  font-weight: 500;
}
.cn-camp-step-num {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--cn-card);
  border: 1px solid var(--cn-line);
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 600;
}
.cn-camp-step.is-done .cn-camp-step-num {
  background: var(--cn-copper);
  color: white;
  border-color: var(--cn-copper);
}
.cn-camp-step.is-current .cn-camp-step-num {
  background: var(--cn-ink);
  color: var(--cn-paper);
  border-color: var(--cn-ink);
}

.cn-camp-audience { display: flex; flex-direction: column; gap: 6px; }
.cn-camp-check {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px;
  cursor: pointer;
}
.cn-camp-check input { accent-color: var(--cn-copper); }

.cn-camp-match {
  margin-top: 22px;
  padding: 18px 22px;
  background: var(--cn-copper-wash);
  border: 1px solid #E5CCAF;
  border-radius: var(--cn-r-lg);
}
.cn-camp-review-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--cn-line);
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r-lg);
  overflow: hidden;
}
.cn-camp-review-strip > div {
  background: var(--cn-paper-2);
  padding: 14px 18px;
  display: flex; flex-direction: column; gap: 4px;
}

.cn-camp-status--draft { background: var(--cn-paper-2); color: var(--cn-mute); border: 1px solid var(--cn-line); }
.cn-camp-status--sent { background: #DCE9DE; color: var(--cn-pos); border: 1px solid #B6D2BB; }
.cn-camp-status--scheduled { background: #E6EBF1; color: #4F5B6E; border: 1px solid #C7D1DD; }

/* Email preview */
.cn-email-preview {
  max-width: 640px;
  margin: 0 auto;
  border: 1px solid var(--cn-line);
  border-radius: var(--cn-r);
  background: white;
  overflow: hidden;
  box-shadow: 0 12px 40px -16px rgba(26, 22, 18, 0.18);
}
.cn-email-header {
  padding: 14px 22px;
  border-bottom: 1px solid var(--cn-line);
  background: var(--cn-paper-2);
  font-size: 12.5px;
}
.cn-email-from { font-weight: 600; color: var(--cn-ink); }
.cn-email-to { color: var(--cn-mute); }
.cn-email-subject {
  font-family: var(--cn-serif);
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--cn-ink);
  margin-top: 4px;
}
.cn-email-preheader {
  font-size: 12px; color: var(--cn-mute);
  margin-top: 4px;
}
.cn-email-body {
  padding: 28px 32px;
  color: var(--cn-ink-2);
  font-size: 14px;
  line-height: 1.6;
}
.cn-email-image {
  margin: -28px -32px 22px;
  position: relative;
  min-height: 60px;
  background: var(--cn-paper-2);
}
.cn-email-image img {
  width: 100%; height: auto; display: block;
}
.cn-email-image-fallback {
  display: none;
  padding: 30px;
  text-align: center;
  color: var(--cn-mute);
  font-size: 12px;
  background: repeating-linear-gradient(
    45deg,
    var(--cn-paper-2),
    var(--cn-paper-2) 8px,
    var(--cn-paper) 8px,
    var(--cn-paper) 16px
  );
}
.cn-email-text { white-space: pre-wrap; }
.cn-email-cta {
  display: inline-block;
  padding: 12px 28px;
  background: var(--cn-ink);
  color: var(--cn-paper-2);
  font-weight: 500;
  text-decoration: none;
  border-radius: var(--cn-r);
  font-size: 14px;
}
.cn-email-foot {
  margin-top: 28px;
  padding-top: 16px;
  border-top: 1px solid var(--cn-line);
  font-size: 11px;
  color: var(--cn-mute);
  text-align: center;
}
.cn-email-foot a { color: var(--cn-mute); }

.cn-camp-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 140px;
  padding-top: 12px;
  border-bottom: 1px solid var(--cn-line);
}
.cn-camp-chart-col {
  flex: 1;
  display: flex; align-items: flex-end;
  height: 100%;
}
.cn-camp-chart-bar {
  width: 100%;
  background: linear-gradient(180deg, var(--cn-copper-soft), var(--cn-copper));
  border-radius: 2px 2px 0 0;
  min-height: 2px;
  transition: height 0.4s;
}

/* Warm leads */
.cn-warm-intro {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 24px;
  padding: 22px 24px;
  background: var(--cn-copper-wash);
  border: 1px solid #E5CCAF;
  border-radius: var(--cn-r-lg);
}
.cn-warm-stats {
  display: flex; gap: 32px;
  flex: none;
}
.cn-warm-stats .cn-strip-value {
  font-family: var(--cn-serif);
  font-size: 32px;
  color: var(--cn-copper-deep);
}

/* ─────────── Global search dropdown ─────────── */
.cn-search { position: relative; }
.cn-search-results {
  position: absolute;
